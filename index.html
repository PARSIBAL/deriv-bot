<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:radial-gradient(circle at 20% 30%,#0a0f1a,#02060d);font-family:'Segoe UI','Courier New',monospace;padding:20px;min-height:100vh;display:flex;justify-content:center;align-items:center;}

<body>
<div class="container">
  <h1>📈 PICO Z-SCORE PRO <span class="badge">CONSERVADOR + ATR</span></h1>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">WINS</div><div id="statWins" class="stat-value positive">0</div></div>
    <div class="stat-card"><div class="stat-label">LOSSES</div><div id="statLosses" class="stat-value negative">0</div></div>
    <div class="stat-card"><div class="stat-label">WINRATE (20)</div><div id="statWR20" class="stat-value winrate">0%</div></div>
    <div class="stat-card"><div class="stat-label">WINRATE (50)</div><div id="statWR50" class="stat-value winrate">0%</div></div>
  </div>

  <div class="double-row">
    <div class="input-group"><label>🔑 API TOKEN (DERIV)</label><input type="text" id="token" placeholder="Ingresa tu token"></div>
    <div class="input-group"><label>💰 STAKE ($) - recomendado 0.50</label><input type="number" id="stake" value="0.50" step="0.05" min="0.35"></div>
  </div>
  <div class="double-row">
    <div class="input-group"><label>🎯 TAKE PROFIT ($)</label><input type="number" id="tp" value="0.80" step="0.1" min="0.5"></div>
    <div class="input-group"><label>🛡 STOP LOSS ($)</label><input type="number" id="sl" value="0.50" step="0.1" min="0.5"></div>
  </div>
  <div class="double-row">
    <div class="input-group"><label>📉 LÍMITE DIARIO PÉRDIDA ($)</label><input type="number" id="dailyLossLimit" value="5.00" step="0.5" min="1"></div>
    <div class="input-group"><label>⏱️ COOLDOWN (segundos)</label><input type="number" id="cooldownSec" value="150" step="10" min="60"></div>
  </div>

  <div id="assetsContainer" class="triple-row"></div>

  <button class="btn" id="toggle">▶ INICIAR BOT</button>
  <div id="statusMsg" class="status">⚙️ OFFLINE</div>
  <div class="signal-box">🎯 MEJOR SEÑAL: <span id="bestSignal" class="signal-value">---</span></div>

  <div class="indicator-panel">
    <div class="indicator"><div class="indicator-label">ACTIVO ELEGIDO</div><div id="chosenAsset" class="indicator-value">---</div></div>
    <div class="indicator"><div class="indicator-label">LOOKBACK</div><div id="chosenLb" class="indicator-value">---</div></div>
    <div class="indicator"><div class="indicator-label">PÉRDIDA DIARIA</div><div id="dailyLoss" class="indicator-value">$0.00</div></div>
    <div class="indicator"><div class="indicator-label">CONFIANZA</div><div id="confidence" class="indicator-value">0%</div></div>
  </div>

  <canvas id="balanceChart" height="100"></canvas>
  <div class="log" id="logPanel"></div>
</div>

<script>
// ==================== CONFIGURACIÓN CONSERVADORA ====================
const ASSETS = ["R_50", "R_75", "R_100"];
const LOOKBACKS = [10, 25, 50];
// Umbrales de Z-score más altos (conservadores)
const Z_THRESHOLDS = { 10: 1.2, 25: 1.5, 50: 2.0 };
const MIN_VOLATILITY = 0.12;      // volatilidad mínima (0.12)
const ATR_PERIOD = 14;
const ATR_MULTIPLIER_MOVE = 1.5;   // movimiento mínimo > 1.5 * ATR

let candlesMap = { "R_50": [], "R_75": [], "R_100": [] };
let zHistoryMap = {}; // "R_50_10" -> array
let atrMap = { "R_50": 0, "R_75": 0, "R_100": 0 };
let volatilityMap = { "R_50": 0, "R_75": 0, "R_100": 0 };

let ws, running = false, interval;
let balance = 0, profit = 0;
let tradeHistory = [];
let lastTradeTime = 0;
let dailyLoss = 0;           // pérdida neta del día (resetea a medianoche Colombia)
let lastResetDate = null;

// Elementos DOM
const tokenInput = document.getElementById('token');
const stakeInput = document.getElementById('stake');
const tpInput = document.getElementById('tp');
const slInput = document.getElementById('sl');
const dailyLossLimitInput = document.getElementById('dailyLossLimit');
const cooldownInput = document.getElementById('cooldownSec');
const toggleBtn = document.getElementById('toggle');
const statusMsgDiv = document.getElementById('statusMsg');
const bestSignalSpan = document.getElementById('bestSignal');
const chosenAssetSpan = document.getElementById('chosenAsset');
const chosenLbSpan = document.getElementById('chosenLb');
const dailyLossSpan = document.getElementById('dailyLoss');
const confidenceSpan = document.getElementById('confidence');
const logPanel = document.getElementById('logPanel');
const assetsContainer = document.getElementById('assetsContainer');

let balanceChart = new Chart(document.getElementById('balanceChart'), {
  type: 'line',
  data: { labels: [], datasets: [{ label: 'Balance', data: [], borderColor: '#00ffcc', borderWidth: 2, fill: false }] },
  options: { responsive: true, maintainAspectRatio: true }
});

// ========== FUNCIONES AUXILIARES ==========
function addLog(msg) {
  const time = new Date().toLocaleTimeString();
  logPanel.innerHTML += `<div>[${time}] ${msg}</div>`;
  logPanel.scrollTop = logPanel.scrollHeight;
}

function updateWinrateUI() {
  const total = tradeHistory.length;
  if(total === 0) {
    document.getElementById('statWins').innerText = '0';
    document.getElementById('statLosses').innerText = '0';
    document.getElementById('statWR20').innerText = '0%';
    document.getElementById('statWR50').innerText = '0%';
    return;
  }
  const wins = tradeHistory.filter(v=>v===1).length;
  document.getElementById('statWins').innerText = wins;
  document.getElementById('statLosses').innerText = total - wins;
  const wr20 = (tradeHistory.slice(-20).filter(v=>v===1).length / Math.min(20, tradeHistory.length) * 100).toFixed(0);
  const wr50 = (tradeHistory.slice(-50).filter(v=>v===1).length / Math.min(50, tradeHistory.length) * 100).toFixed(0);
  document.getElementById('statWR20').innerText = `${wr20}%`;
  document.getElementById('statWR50').innerText = `${wr50}%`;
}

function updateBalanceUI() {
  let balElem = document.getElementById('balanceBig');
  let profElem = document.getElementById('profitBig');
  if(!balElem) {
    const statsRow = document.querySelector('.stats-row');
    const balCard = document.createElement('div'); balCard.className = 'stat-card'; balCard.innerHTML = '<div class="stat-label">BALANCE</div><div id="balanceBig" class="stat-value">$0.00</div>';
    const profCard = document.createElement('div'); profCard.className = 'stat-card'; profCard.innerHTML = '<div class="stat-label">GANANCIA</div><div id="profitBig" class="stat-value">$0.00</div>';
    statsRow.insertBefore(balCard, statsRow.children[0]);
    statsRow.insertBefore(profCard, statsRow.children[1]);
    balElem = document.getElementById('balanceBig');
    profElem = document.getElementById('profitBig');
  }
  balElem.innerText = `$${balance.toFixed(2)}`;
  profElem.innerText = profit >= 0 ? `+$${profit.toFixed(2)}` : `-$${Math.abs(profit).toFixed(2)}`;
  profElem.className = `stat-value ${profit >= 0 ? 'positive' : 'negative'}`;
}

// Reset diario de pérdidas (medianoche Colombia)
function resetDailyLossIfNeeded() {
  const now = new Date();
  const colombiaOffset = -5 * 60;
  const localOffset = now.getTimezoneOffset();
  const diffMinutes = colombiaOffset - localOffset;
  const colombiaNow = new Date(now.getTime() + diffMinutes * 60000);
  const todayDate = colombiaNow.toDateString();
  if(lastResetDate !== todayDate) {
    dailyLoss = 0;
    lastResetDate = todayDate;
    dailyLossSpan.innerText = `$${dailyLoss.toFixed(2)}`;
    addLog("🔄 Reinicio diario: pérdida diaria reseteada a 0");
  }
}

// ========== INDICADORES TÉCNICOS ==========
function zScore(data) {
  const mean = data.reduce((a,b)=>a+b,0)/data.length;
  const variance = data.map(x=>Math.pow(x-mean,2)).reduce((a,b)=>a+b,0)/data.length;
  const std = Math.sqrt(variance);
  if(std === 0) return 0;
  return (data[data.length-1] - mean)/std;
}

// ATR (Average True Range) para velas de 1 minuto (aproximado con close)
function calculateATR(candles, period) {
  if(candles.length < period+1) return 0;
  let trSum = 0;
  for(let i=1; i<=period; i++) {
    const high = candles[candles.length - i];
    const low = candles[candles.length - i - 1];
    const tr = Math.abs(high - low);
    trSum += tr;
  }
  return trSum / period;
}

// Volatilidad histórica (desviación estándar de retornos)
function historicalVolatility(candles, period=20) {
  if(candles.length < period+1) return 0;
  let returns = [];
  for(let i=1; i<=period; i++) {
    let ret = (candles[candles.length-i] - candles[candles.length-i-1]) / candles[candles.length-i-1];
    returns.push(ret);
  }
  const mean = returns.reduce((a,b)=>a+b,0)/returns.length;
  const variance = returns.map(r=>Math.pow(r-mean,2)).reduce((a,b)=>a+b,0)/returns.length;
  return Math.sqrt(variance);
}

// Detección de pico y pendiente negativa (para PUT)
function isPeakWithDecline(zHistory, currentZ, threshold) {
  if(zHistory.length < 5) return false;
  const recent = zHistory.slice(-5);
  // Buscar máximo local en la ventana (pico)
  let peakIndex = -1;
  for(let i=1; i<recent.length-1; i++) {
    if(recent[i] > recent[i-1] && recent[i] > recent[i+1] && recent[i] > threshold) {
      peakIndex = i;
      break;
    }
  }
  if(peakIndex === -1) return false;
  // Pendiente actual (últimos 2 valores) debe ser negativa
  const slope = recent[recent.length-1] - recent[recent.length-2];
  const isDeclining = slope < -0.02;
  // Además, el Z actual debe ser positivo pero menor que el pico
  return isDeclining && currentZ < recent[peakIndex] && currentZ > threshold;
}

// Detección de valle y pendiente positiva (para CALL)
function isValleyWithRise(zHistory, currentZ, threshold) {
  if(zHistory.length < 5) return false;
  const recent = zHistory.slice(-5);
  let valleyIndex = -1;
  for(let i=1; i<recent.length-1; i++) {
    if(recent[i] < recent[i-1] && recent[i] < recent[i+1] && recent[i] < -threshold) {
      valleyIndex = i;
      break;
    }
  }
  if(valleyIndex === -1) return false;
  const slope = recent[recent.length-1] - recent[recent.length-2];
  const isRising = slope > 0.02;
  return isRising && currentZ > recent[valleyIndex] && currentZ < -threshold;
}

// ========== EVALUAR CADA ACTIVO Y LOOKBACK ==========
function evaluateAll() {
  resetDailyLossIfNeeded();
  if(dailyLoss <= -parseFloat(dailyLossLimitInput.value)) {
    if(running) {
      addLog("🚨 Límite diario de pérdidas alcanzado. Bot detenido.");
      stopBot();
    }
    return;
  }

  let allSignals = [];
  for(let asset of ASSETS) {
    let candles = candlesMap[asset];
    if(!candles.length || candles.length < 50) continue;
    
    // Calcular ATR y volatilidad para el filtro
    const atr = calculateATR(candles, ATR_PERIOD);
    const vol = historicalVolatility(candles, 20);
    atrMap[asset] = atr;
    volatilityMap[asset] = vol;
    
    // Filtro de mercado: volatilidad mínima y ATR significativo
    if(vol < MIN_VOLATILITY || atr < 0.0005) {
      continue; // mercado muerto o sin movimiento, no evaluar
    }
    
    for(let lb of LOOKBACKS) {
      if(candles.length < lb+10) continue;
      const slice = candles.slice(-lb);
      const z = zScore(slice);
      const key = `${asset}_${lb}`;
      if(!zHistoryMap[key]) zHistoryMap[key] = [];
      zHistoryMap[key].push(z);
      if(zHistoryMap[key].length > 50) zHistoryMap[key].shift();
      
      const threshold = Z_THRESHOLDS[lb];
      const isPeak = isPeakWithDecline(zHistoryMap[key], z, threshold);
      const isValley = isValleyWithRise(zHistoryMap[key], z, threshold);
      
      // Filtro de movimiento mínimo: la última vela debe tener rango > 1.5 * ATR
      const lastClose = candles[candles.length-1];
      const prevClose = candles[candles.length-2];
      const move = Math.abs(lastClose - prevClose);
      const sufficientMove = move > ATR_MULTIPLIER_MOVE * atr;
      
      if(!sufficientMove) continue;
      
      let action = null;
      let confidence = 0;
      
      if(isPeak) {
        action = "PUT";
        // Confianza: basada en qué tan alto fue el pico y la pendiente negativa
        const peakValue = Math.max(...zHistoryMap[key].slice(-10));
        confidence = Math.min(100, (peakValue / threshold) * 50 + 30);
      } else if(isValley) {
        action = "CALL";
        const valleyValue = Math.min(...zHistoryMap[key].slice(-10));
        confidence = Math.min(100, (Math.abs(valleyValue) / threshold) * 50 + 30);
      }
      
      if(action) {
        const ticksInput = document.getElementById(`ticks_${asset}_${lb}`);
        const duration = ticksInput ? parseInt(ticksInput.value) : 2;
        allSignals.push({
          asset, lookback: lb, action, z, confidence,
          duration: duration, unit: "t",
          atr, vol
        });
      }
    }
  }
  
  updateAssetsUI(allSignals);
  
  if(allSignals.length === 0) {
    bestSignalSpan.innerText = "---";
    chosenAssetSpan.innerText = "---";
    chosenLbSpan.innerText = "---";
    confidenceSpan.innerText = "0%";
    return;
  }
  
  allSignals.sort((a,b) => b.confidence - a.confidence);
  const best = allSignals[0];
  bestSignalSpan.innerText = `${best.action} en ${best.asset} (V${best.lookback}) | Conf: ${best.confidence.toFixed(0)}%`;
  chosenAssetSpan.innerText = best.asset;
  chosenLbSpan.innerText = `V_${best.lookback}`;
  confidenceSpan.innerText = `${best.confidence.toFixed(0)}%`;
  
  const now = Date.now();
  const cooldownMs = parseInt(cooldownInput.value) * 1000;
  if(now - lastTradeTime >= cooldownMs && running) {
    executeTrade(best);
    lastTradeTime = now;
    addLog(`🎯 SEÑAL: ${best.action} en ${best.asset} | V_${best.lookback} | Z=${best.z.toFixed(2)} | ATR=$${best.atr.toFixed(4)} | Confianza=${best.confidence.toFixed(0)}%`);
  }
}

// ========== EJECUTAR TRADE ==========
function executeTrade(signal) {
  const stake = parseFloat(stakeInput.value);
  addLog(`📡 ${signal.action} en ${signal.asset} | $${stake} | ${signal.duration} ticks`);
  ws.send(JSON.stringify({
    buy: 1,
    price: stake,
    parameters: {
      amount: stake,
      basis: "stake",
      contract_type: signal.action,
      currency: "USD",
      duration: signal.duration,
      duration_unit: "t",
      symbol: signal.asset
    }
  }));
}

// ========== UI DINÁMICA ==========
function updateAssetsUI(signals) {
  if(assetsContainer.children.length === 0) {
    for(let asset of ASSETS) {
      const panel = document.createElement('div');
      panel.className = 'asset-panel';
      panel.innerHTML = `<div class="asset-title">${asset}</div>`;
      for(let lb of LOOKBACKS) {
        panel.innerHTML += `
          <div class="lookback-row">
            <span class="lb-name">V_${lb}</span>
            <span class="z-value" id="z_${asset}_${lb}">Z: 0.00</span>
            <span class="signal" id="sig_${asset}_${lb}">---</span>
            <input type="number" id="ticks_${asset}_${lb}" class="ticks-input" value="${lb === 10 ? 2 : (lb === 25 ? 3 : 2)}" min="1" max="10" step="1">
          </div>
        `;
      }
      // Mostrar ATR y volatilidad
      const atrSpan = document.createElement('div');
      atrSpan.style.fontSize = "10px";
      atrSpan.style.color = "#6c7a8e";
      atrSpan.style.marginTop = "8px";
      atrSpan.id = `info_${asset}`;
      panel.appendChild(atrSpan);
      assetsContainer.appendChild(panel);
    }
  }
  // Actualizar valores
  for(let asset of ASSETS) {
    const atr = atrMap[asset];
    const vol = volatilityMap[asset];
    const infoSpan = document.getElementById(`info_${asset}`);
    if(infoSpan) infoSpan.innerText = `ATR: ${atr.toFixed(4)} | Vol: ${(vol*100).toFixed(1)}%`;
  }
  for(let s of signals) {
    const zSpan = document.getElementById(`z_${s.asset}_${s.lookback}`);
    if(zSpan) zSpan.innerText = `Z: ${s.z.toFixed(2)}`;
    const sigSpan = document.getElementById(`sig_${s.asset}_${s.lookback}`);
    if(sigSpan) {
      sigSpan.innerText = s.action;
      sigSpan.style.color = s.action === "CALL" ? "#2ed573" : "#ff4757";
    }
  }
  for(let asset of ASSETS) {
    for(let lb of LOOKBACKS) {
      const sigSpan = document.getElementById(`sig_${asset}_${lb}`);
      if(sigSpan && !signals.find(s => s.asset === asset && s.lookback === lb)) {
        sigSpan.innerText = "---";
        sigSpan.style.color = "#8a94a8";
      }
    }
  }
}

// ========== WEBSOCKET ==========
function requestCandlesForAll() {
  for(let asset of ASSETS) {
    if(ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ ticks_history: asset, granularity: 60, count: 100, style: "candles" }));
    }
  }
}

function startBot() {
  if(running) return;
  const token = tokenInput.value.trim();
  if(!token) { addLog("❌ Ingresa tu API token"); return; }
  running = true;
  statusMsgDiv.innerText = "🟢 CONECTANDO...";
  toggleBtn.innerText = "⏹ DETENER";
  
  ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");
  ws.onopen = () => {
    addLog("🔌 Autenticando...");
    ws.send(JSON.stringify({ authorize: token }));
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if(data.msg_type === "authorize") {
      addLog("✅ Autorizado. Solicitando velas...");
      requestCandlesForAll();
      if(interval) clearInterval(interval);
      interval = setInterval(() => {
        if(running && ws && ws.readyState === WebSocket.OPEN) requestCandlesForAll();
      }, 5000);
    }
    if(data.msg_type === "candles") {
      const symbol = data.echo_req.ticks_history;
      if(symbol && candlesMap[symbol] !== undefined) {
        candlesMap[symbol] = data.candles.map(c => parseFloat(c.close));
        evaluateAll();
      }
    }
    if(data.msg_type === "proposal_open_contract" && data.proposal_open_contract.is_sold) {
      const pnl = parseFloat(data.proposal_open_contract.profit);
      balance += pnl;
      profit += pnl;
      if(pnl < 0) dailyLoss += pnl;  // suma negativa
      dailyLossSpan.innerText = `$${dailyLoss.toFixed(2)}`;
      
      const isWin = pnl > 0;
      tradeHistory.push(isWin ? 1 : 0);
      if(tradeHistory.length > 200) tradeHistory.shift();
      updateWinrateUI();
      updateBalanceUI();
      addLog(`${isWin ? "✅ WIN" : "❌ LOSS"} | $${pnl.toFixed(2)} | Balance $${balance.toFixed(2)}`);
      balanceChart.data.labels.push(""); balanceChart.data.datasets[0].data.push(balance);
      if(balanceChart.data.labels.length > 30) {
        balanceChart.data.labels.shift();
        balanceChart.data.datasets[0].data.shift();
      }
      balanceChart.update();
      
      const tp = parseFloat(tpInput.value);
      const sl = parseFloat(slInput.value);
      if(balance >= tp || balance <= -sl) {
        addLog("🏁 TP/SL alcanzado. Deteniendo bot.");
        stopBot();
      }
      // Verificar límite diario después de cada trade
      if(dailyLoss <= -parseFloat(dailyLossLimitInput.value)) {
        addLog("🚨 Límite diario de pérdidas alcanzado. Deteniendo bot.");
        stopBot();
      }
    }
  };
  ws.onerror = () => { addLog("⚠️ Error WebSocket"); stopBot(); };
  ws.onclose = () => { if(running) addLog("🔌 Desconectado"); };
}

function stopBot() {
  if(!running) return;
  running = false;
  clearInterval(interval);
  if(ws) ws.close();
  statusMsgDiv.innerText = "⚫ OFFLINE";
  toggleBtn.innerText = "▶ INICIAR BOT";
  addLog("🛑 Bot detenido");
}

toggleBtn.onclick = () => running ? stopBot() : startBot();

// Inicializar UI
updateAssetsUI([]);
addLog("🤖 Bot CONSERVADOR listo. Filtros: Z-score alto, pendiente, ATR, volatilidad mínima, cooldown, límite diario.");
</script>
</body>
</html>
