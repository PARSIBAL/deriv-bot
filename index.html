<!DOCTYPE html>
<html>
<head>
<title>🔥 BOT NIVEL DIOS</title>
<style>
body { background:#0d0d0d; color:#fff; font-family:sans-serif; text-align:center; }
button { padding:12px; margin:8px; border:none; border-radius:8px; font-weight:bold; }
.start { background:green; }
.stop { background:red; }
.status { margin-top:10px; }
</style>
</head>
<body>

<h2>🤖 BOT NIVEL DIOS</h2>

<select id="mode">
<option value="safe">🛡️ Seguro</option>
<option value="mid">⚖️ Balanceado</option>
<option value="sniper">🔥 SNIPER</option>
</select>

<br>

<button class="start" onclick="openModal()">INICIAR</button>
<button class="stop" onclick="stopBot()">STOP</button>

<p id="status">OFF</p>
<p id="profit">0</p>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000a;">
<div style="background:#111; padding:20px; margin:20% auto; width:250px; border-radius:10px;">
<h3>Selecciona cuenta</h3>
<button onclick="confirmStart('demo')">🟢 DEMO</button>
<button onclick="confirmStart('real')">🔴 REAL</button>
<br><br>
<button onclick="closeModal()">Cancelar</button>
</div>
</div>

<script>

// 🔐 TOKENS
const tokens = {
demo: "1Hb1u22iSZQHosg",
real: "TU_TOKEN_REAL"
};

const symbols = ["R_100","R_75","R_50","R_25","R_10","BOOM1000","CRASH1000"];

let ws, running=false;
let balance=0, stake=0;
let profit=0, wins=0, losses=0;
let lastTradeTime=0;
let dataMap={}, paused=false;
let weights=[0.3,0.4,0.3];

let strategyStats={
volatility:{wins:0,losses:0,profit:0,trades:0},
boom:{wins:0,losses:0,profit:0,trades:0},
crash:{wins:0,losses:0,profit:0,trades:0}
};

let currentStrategy="volatility";

//----------------------------------

function openModal(){ document.getElementById("modal").style.display="block"; }
function closeModal(){ document.getElementById("modal").style.display="none"; }

function confirmStart(type){
closeModal();

// 🔴 DOBLE CONFIRMACIÓN
let ok = confirm("¿Seguro que quieres usar cuenta " + type.toUpperCase() + "?");
if(!ok) return;

startBot(type);
}

//----------------------------------

function startBot(type){

if(running) return;

let token = tokens[type];

// VALIDACIÓN TOKEN
if(!token || token.length < 10){
alert("Token inválido");
return;
}

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({authorize:token}));
document.getElementById("status").innerText="Conectando...";
};

ws.onmessage=(msg)=>{

let d=JSON.parse(msg.data);

if(d.error){
alert(d.error.message);
stopBot();
return;
}

//----------------------------------
// LOGIN
//----------------------------------

if(d.msg_type==="authorize"){

let id=d.authorize.loginid;

// VALIDAR TIPO CUENTA
if(type==="demo" && !id.startsWith("VRTC")){
alert("Este token no es DEMO");
stopBot();
return;
}

if(type==="real" && id.startsWith("VRTC")){
alert("Este token no es REAL");
stopBot();
return;
}

document.getElementById("status").innerText="ON "+type.toUpperCase();

symbols.forEach(s=>{
ws.send(JSON.stringify({ticks:s,subscribe:1}));
dataMap[s]=[];
});

ws.send(JSON.stringify({balance:1}));
}

//----------------------------------

if(d.balance){
balance=d.balance.balance;
if(stake===0){
stake = Number((balance*0.003).toFixed(2));
if(stake < 0.35) stake=0.35;
}
}

//----------------------------------

if(d.msg_type==="tick" && !paused){

let sym=d.tick.symbol;
let price=parseFloat(d.tick.quote);

dataMap[sym].push(price);
if(dataMap[sym].length>60) dataMap[sym].shift();

let t=dataMap[sym];
if(t.length<40) return;

// CALCULOS
let returns=[];
for(let i=1;i<t.length;i++) returns.push(t[i]-t[i-1]);

let mean=avg(returns);
let std=stddev(returns,mean);

let last=Math.abs(returns[returns.length-1]);
let trend=returns.slice(-5).reduce((a,b)=>a+b,0);
let z=(returns[returns.length-1]-mean)/std;

//----------------------------------
// DETECTOR PRO
//----------------------------------

if(std<0.002 || std>0.018) return;
if(last > std*2.5) return;

//----------------------------------

let score = trend*weights[0] + z*weights[1] + std*weights[2];

//----------------------------------
// SNIPER
//----------------------------------

let mode=document.getElementById("mode").value;

if(mode==="sniper"){
if(Math.abs(score)<0.9) return;
if(Math.abs(z)<1.8) return;
}

//----------------------------------

let now=Date.now();
if(now-lastTradeTime<8000) return;

//----------------------------------
// AUTO ESTRATEGIA
//----------------------------------

chooseStrategy();

//----------------------------------

let decision=null;

// CRASH
if(currentStrategy==="crash" && sym.includes("CRASH")){
if(score>0.6 && z<-1) decision="CALL";
}

// BOOM
if(currentStrategy==="boom" && sym.includes("BOOM")){
if(score>0.6 && z>1) decision="PUT";
}

// VOLATILIDAD
if(currentStrategy==="volatility" && sym.includes("R_")){
if(score>0.7 && z>1) decision="CALL";
if(score<-0.7 && z<-1) decision="PUT";
}

//----------------------------------

if(decision){
executeTrade(sym,decision);
lastTradeTime=now;
}

}

//----------------------------------
// RESULTADO
//----------------------------------

if(d.msg_type==="proposal"){
if(window.pending){
ws.send(JSON.stringify({buy:d.proposal.id,price:d.proposal.ask}));
window.pending=null;
}
}

if(d.msg_type==="proposal_open_contract"){
if(d.proposal_open_contract.is_sold){

let pnl=parseFloat(d.proposal_open_contract.profit);
profit+=pnl;

let sym=d.proposal_open_contract.symbol;
let strat="volatility";
if(sym.includes("BOOM")) strat="boom";
if(sym.includes("CRASH")) strat="crash";

if(pnl>0){
wins++;
strategyStats[strat].wins++;
weights = weights.map(w=>Math.min(0.8,w+0.01));
stake = Number((stake*1.02).toFixed(2));
}else{
losses++;
strategyStats[strat].losses++;
weights = weights.map(w=>Math.max(-0.8,w-0.01));
stake = Number((balance*0.003).toFixed(2));
}

strategyStats[strat].profit+=pnl;
strategyStats[strat].trades++;

// LIMITES
if(stake<0.35) stake=0.35;
if(stake>balance*0.03) stake=Number((balance*0.03).toFixed(2));

// PAUSA
if(losses>=3){
paused=true;
setTimeout(()=>{
paused=false;
losses=0;
},120000);
}

// STOP LOSS
if(profit < -balance*0.03){
alert("STOP LOSS");
stopBot();
}

document.getElementById("profit").innerText=profit.toFixed(2);

}
}

};

running=true;
}

//----------------------------------

function executeTrade(sym,type){

let amount = Number(stake.toFixed(2));

if(amount < 0.35) amount=0.35;

ws.send(JSON.stringify({
proposal:1,
amount:amount,
basis:"stake",
contract_type:type,
currency:"USD",
duration:5,
duration_unit:"t",
symbol:sym
}));

window.pending=true;
}

//----------------------------------

function chooseStrategy(){

let best="volatility";
let bestScore=-999;

for(let s in strategyStats){
let st=strategyStats[s];
if(st.trades<5) continue;

let wr=st.wins/st.trades;
let avg=st.profit/st.trades;

let score=wr*avg*Math.sqrt(st.trades);

if(score>bestScore){
bestScore=score;
best=s;
}
}

currentStrategy=best;
}

//----------------------------------

function stopBot(){
if(ws) ws.close();
running=false;
document.getElementById("status").innerText="OFF";
}

//----------------------------------

function avg(arr){ return arr.reduce((a,b)=>a+b,0)/arr.length; }

function stddev(arr,mean){
return Math.sqrt(arr.map(x=>Math.pow(x-mean,2))
.reduce((a,b)=>a+b,0)/arr.length);
}

</script>

</body>
</html>
