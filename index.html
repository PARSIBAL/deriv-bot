<script>

// 🔐 TOKENS
const tokens = {
  demo: "***********Hosg",
  real: "CR_TU_TOKEN_REAL"
};

const symbols = [
"R_100","R_75","R_50","R_25","R_10",
"BOOM1000","CRASH1000","BOOM500","CRASH500"
];

let ws, running=false;
let balance=0, stake=0;

let profit=0, losses=0, wins=0;
let lastTradeTime=0;
let paused=false;
let pendingTrade=null;

let hedgeMode=false;
let lastDirection=null;

let dailyLossLimit=0;
let initialBalance=0;

let dataMap={};

//----------------------------------

function startBot(){

let type=document.getElementById("accountType").value;
let token=tokens[type];

if(!token || token.includes("TU_TOKEN")){
alert("Coloca tokens");
return;
}

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
setTimeout(()=>ws.send(JSON.stringify({authorize:token})),500);
};

ws.onmessage=(msg)=>{

let d=JSON.parse(msg.data);

// errores
if(d.error){
console.log(d.error);
stopBot();
return;
}

// autorizado
if(d.msg_type==="authorize"){

document.getElementById("status").innerText="ON";

symbols.forEach(s=>{
ws.send(JSON.stringify({ticks:s,subscribe:1}));
dataMap[s]=[];
});

ws.send(JSON.stringify({balance:1}));
}

// balance
if(d.balance){
balance=d.balance.balance;

if(initialBalance===0){
initialBalance=balance;
dailyLossLimit = initialBalance * 0.03;
}

// 🔥 stake institucional
let risk=0.005; // 0.5%
stake = Math.round(balance * risk * 100) / 100;

if(stake < 0.35) stake = 0.35;
}

//----------------------------------
// 🧠 FILTRO + SELECCIÓN
//----------------------------------

if(d.msg_type==="tick" && !paused && !pendingTrade){

let best=null;
let bestScore=0;

symbols.forEach(sym=>{

let arr=dataMap[sym];
if(!arr || arr.length<30) return;

let ret=[];
for(let i=1;i<arr.length;i++) ret.push(arr[i]-arr[i-1]);

let mean=avg(ret);
let std=stddev(ret,mean);

if(std<0.0015 || std>0.02) return;

let trend=ret.slice(-5).reduce((a,b)=>a+b,0);
let z=(ret[ret.length-1]-mean)/std;

let score=Math.abs(trend*0.4 + z*0.6);

if(score>bestScore){
bestScore=score;
best={sym,trend,z};
}

});

// actualizar data
let sym=d.tick.symbol;
let price=parseFloat(d.tick.quote);

dataMap[sym].push(price);
if(dataMap[sym].length>50) dataMap[sym].shift();

if(!best) return;

//----------------------------------

let now=Date.now();
if(now-lastTradeTime<7000) return;

//----------------------------------

let decision=null;

// lógica institucional
if(best.sym.includes("CRASH") && best.trend>0) decision="CALL";
if(best.sym.includes("BOOM") && best.trend>0) decision="PUT";

if(best.sym.includes("R_")){
if(best.z>1.0) decision="CALL";
if(best.z<-1.0) decision="PUT";
}

//----------------------------------
// HEDGE CONTROLADO
//----------------------------------

if(hedgeMode){
decision = lastDirection === "CALL" ? "PUT" : "CALL";
}

//----------------------------------

if(decision){
executeTrade(best.sym,decision);
lastDirection=decision;
lastTradeTime=now;
}

}

//----------------------------------
// RESULTADOS
//----------------------------------

if(d.msg_type==="proposal_open_contract"){
if(d.proposal_open_contract.is_sold){

let pnl=parseFloat(d.proposal_open_contract.profit);

profit+=pnl;

// 🔴 STOP DIARIO
if(profit <= -dailyLossLimit){
alert("STOP LOSS DIARIO ALCANZADO");
stopBot();
return;
}

if(pnl>0){
wins++;
hedgeMode=false;

// crecimiento lento
stake = Math.round(balance*0.005*100)/100;

}else{
losses++;
hedgeMode=true;

// hedge leve
stake = Math.round(balance*0.007*100)/100;
}

// reset
pendingTrade=null;

// pausa institucional
if(losses>=3){
paused=true;
document.getElementById("status").innerText="PAUSA";

setTimeout(()=>{
paused=false;
losses=0;
document.getElementById("status").innerText="ON";
},120000);
}

document.getElementById("profit").innerText="Profit: "+profit.toFixed(2);

}
}

};

//----------------------------------

running=true;
}

//----------------------------------

function executeTrade(symbol,type){

let amount = Math.round(stake * 100) / 100;
if(amount<0.35) amount=0.35;

pendingTrade=true;

ws.send(JSON.stringify({
proposal:1,
amount:amount,
basis:"stake",
contract_type:type,
currency:"USD",
duration:5,
duration_unit:"t",
symbol:symbol
}));

}

//----------------------------------

ws.onmessage = (msg)=>{
let d=JSON.parse(msg.data);

if(d.msg_type==="proposal" && pendingTrade){
ws.send(JSON.stringify({
buy:d.proposal.id,
price:d.proposal.ask
}));
}
};

//----------------------------------

function stopBot(){
if(ws) ws.close();
running=false;
pendingTrade=null;
document.getElementById("status").innerText="OFF";
}

//----------------------------------

function avg(arr){ return arr.reduce((a,b)=>a+b,0)/arr.length; }

function stddev(arr,mean){
return Math.sqrt(arr.map(x=>Math.pow(x-mean,2))
.reduce((a,b)=>a+b,0)/arr.length);
}

</script>
