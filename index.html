<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Deriv Contrarian Bot — BrokerMode</title>
    <style>
        body {
            background: #0a0e14;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .bot-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            width: 500px;
            box-shadow: 0 0 20px rgba(0,255,200,0.1);
        }
        h1 {
            margin: 0 0 20px;
            font-size: 24px;
            color: #58a6ff;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #8b949e;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 24px;
            margin-right: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .start-btn { background: #238636; color: white; }
        .stop-btn { background: #da3633; color: white; }
        .log-area {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
            color: #8b949e;
            margin-top: 15px;
            white-space: pre-wrap;
        }
        .status {
            font-size: 14px;
            margin-bottom: 10px;
            color: #f0883e;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="bot-container">
    <h1>🔱 BrokerMode Contrarian</h1>
    <label>Token API Deriv</label>
    <input type="text" id="apiToken" placeholder="Pega aquí tu token API...">
    <div style="display: flex; align-items: center;">
        <button class="start-btn" id="startBtn">▶️ Start</button>
        <button class="stop-btn" id="stopBtn" disabled>⏹️ Stop</button>
        <span class="status" id="statusText">⚫ Detenido</span>
    </div>
    <div class="log-area" id="logOutput">[INFO] Esperando token y orden de inicio...</div>
</div>

<script>
    (function() {
        // ─── Elementos UI ─────────────────────────────
        const tokenInput = document.getElementById('apiToken');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const logOutput = document.getElementById('logOutput');

        // ─── Configuración del bot (BrokerMode) ────────
        const SYMBOLS = ["R_10", "R_25"];
        const RISK_PCT = 0.2;          // 0.2% por trade
        const DURATION = 60;           // segundos
        const RSI_PERIOD = 7;          // RSI rápido para detectar extremos del rebaño
        const CONTRARIAN_PROB = 0.70;  // 70% contra el rebaño, 30% con el rebaño

        // Estado global
        let ws = null;
        let running = false;
        const assetStates = {};

        // ─── Utilidades de trading ────────────────────
        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            logOutput.innerText += `\n[${time}] ${msg}`;
            logOutput.scrollTop = logOutput.scrollHeight;
        }

        function rsi(closes, period = RSI_PERIOD) {
            if (closes.length < period + 1) return 50; // neutral
            let gains = 0, losses = 0;
            for (let i = closes.length - period; i < closes.length; i++) {
                const diff = closes[i] - closes[i - 1];
                if (diff > 0) gains += diff;
                else losses -= diff;
            }
            const avgGain = gains / period;
            const avgLoss = losses / period;
            if (avgLoss === 0) return 100;
            const rs = avgGain / avgLoss;
            return 100 - (100 / (1 + rs));
        }

        function getCrowdBias(rsiValue) {
            // -1 = rebaño sobrevendido (compran), +1 = sobrecomprado (venden)
            if (rsiValue > 70) return 1;   // crowd vende
            if (rsiValue < 30) return -1;  // crowd compra
            return 0;                       // sin extremo
        }

        function shouldTrade(rsiValue) {
            // Decide dirección contraria según 70/30
            const bias = getCrowdBias(rsiValue);
            if (bias === 0) return null;
            const goContrarian = Math.random() < CONTRARIAN_PROB;
            // bias +1 -> crowd vende -> contrarian compra (LONG)
            // bias -1 -> crowd compra -> contrarian vende (SHORT)
            if (goContrarian) {
                return bias === 1 ? "LONG" : "SHORT";
            } else {
                // seguir al rebaño
                return bias === 1 ? "SHORT" : "LONG";
            }
        }

        // ─── Conexión WebSocket ───────────────────────
        function connect(token) {
            return new Promise((resolve, reject) => {
                ws = new WebSocket("wss://ws.deriv.com/websockets/v3");
                ws.onopen = () => {
                    addLog("[CONEXIÓN] WebSocket abierto, autorizando...");
                    ws.send(JSON.stringify({ authorize: token }));
                };
                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    if (msg.error) {
                        addLog(`[ERROR] ${msg.error.message}`);
                        return;
                    }
                    if (msg.authorize) {
                        addLog("[AUTORIZADO] Token válido. Suscribiendo ticks...");
                        SYMBOLS.forEach(sym => {
                            ws.send(JSON.stringify({ ticks: sym, subscribe: 1 }));
                            assetStates[sym] = { bars: [], currentBar: null };
                        });
                        resolve();
                    }
                    if (msg.tick) {
                        const { symbol, quote } = msg.tick;
                        if (!assetStates[symbol]) return;
                        processTick(symbol, quote, msg.tick.epoch);
                    }
                };
                ws.onclose = () => {
                    addLog("[CONEXIÓN] WebSocket cerrado.");
                    if (running) {
                        addLog("[RECONEXIÓN] Intentando reconectar en 10s...");
                        setTimeout(() => connect(token), 10000);
                    }
                };
                ws.onerror = (e) => {
                    addLog("[ERROR] WebSocket error.");
                    reject(e);
                };
            });
        }

        // ─── Agregación de ticks en velas M1 ──────────
        function processTick(symbol, price, epoch) {
            const state = assetStates[symbol];
            const minute = Math.floor(epoch / 60) * 60;
            if (!state.currentBar || state.currentBar.timestamp !== minute) {
                if (state.currentBar) state.bars.push(state.currentBar);
                state.currentBar = {
                    timestamp: minute,
                    open: price,
                    high: price,
                    low: price,
                    close: price,
                    volume: 1
                };
                if (state.bars.length > 200) state.bars = state.bars.slice(-150);
                evaluateSymbol(symbol);
            } else {
                state.currentBar.high = Math.max(state.currentBar.high, price);
                state.currentBar.low = Math.min(state.currentBar.low, price);
                state.currentBar.close = price;
                state.currentBar.volume++;
            }
        }

        // ─── Evaluación de entrada contraria ──────────
        function evaluateSymbol(symbol) {
            if (!running) return;
            const state = assetStates[symbol];
            const bars = state.currentBar ? [...state.bars, state.currentBar] : state.bars;
            if (bars.length < RSI_PERIOD + 5) return;

            const closes = bars.map(b => b.close);
            const rsiVal = rsi(closes, RSI_PERIOD);
            const tradeDir = shouldTrade(rsiVal);

            if (tradeDir && !state.inPosition) {
                // Calcular stake en USD
                const balance = 1000; // balance fijo de referencia, puedes ajustarlo
                const stake = (RISK_PCT / 100) * balance;
                const contractType = tradeDir === "LONG" ? "CALL" : "PUT";

                addLog(`[${symbol}] RSI=${rsiVal.toFixed(1)} → ${tradeDir} (Contrarian${Math.random() < CONTRARIAN_PROB ? ' SÍ' : ' NO'})`);
                placeTrade(symbol, contractType, stake);
                state.inPosition = true;
                // Simular salida después de 60s (el contrato expira solo)
                setTimeout(() => {
                    state.inPosition = false;
                    addLog(`[${symbol}] Contrato finalizado.`);
                }, DURATION * 1000);
            }
        }

        async function placeTrade(symbol, contractType, stake) {
            const proposalReq = {
                proposal: 1,
                amount: stake,
                basis: "stake",
                contract_type: contractType,
                currency: "USD",
                duration: DURATION,
                duration_unit: "s",
                symbol: symbol,
                req_id: Math.floor(Math.random() * 100000)
            };
            ws.send(JSON.stringify(proposalReq));
            const handler = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.req_id === proposalReq.req_id) {
                    ws.removeEventListener('message', handler);
                    if (msg.proposal) {
                        const buyReq = {
                            buy: msg.proposal.id,
                            price: stake,
                            req_id: Math.floor(Math.random() * 100000)
                        };
                        ws.send(JSON.stringify(buyReq));
                        addLog(`[${symbol}] Orden COMPRA enviada: ${contractType} ${stake.toFixed(2)} USD`);
                    } else {
                        addLog(`[${symbol}] Error en propuesta: ${JSON.stringify(msg)}`);
                        assetStates[symbol].inPosition = false;
                    }
                }
            };
            ws.addEventListener('message', handler);
            setTimeout(() => {
                ws.removeEventListener('message', handler);
                assetStates[symbol].inPosition = false;
                addLog(`[${symbol}] Timeout en propuesta.`);
            }, 5000);
        }

        // ─── Control de UI ─────────────────────────────
        startBtn.addEventListener('click', async () => {
            const token = tokenInput.value.trim();
            if (!token) {
                alert("Pega tu token API de Deriv");
                return;
            }
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusText.innerText = "🟢 Conectando...";
            addLog("[SISTEMA] Iniciando bot contrarian...");
            try {
                await connect(token);
                running = true;
                statusText.innerText = "🟢 Operando (BrokerMode)";
                addLog("[SISTEMA] Bot activo. Esperando extremos del rebaño...");
            } catch (err) {
                addLog("[ERROR] No se pudo conectar.");
                startBtn.disabled = false;
                stopBtn.disabled = true;
                statusText.innerText = "🔴 Error de conexión";
            }
        });

        stopBtn.addEventListener('click', () => {
            running = false;
            if (ws) ws.close();
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusText.innerText = "⚫ Detenido";
            addLog("[SISTEMA] Bot detenido por el usuario.");
        });
    })();
</script>
</body>
</html>
