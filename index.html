<!DOCTYPE html>
<html>
<head>
    <title>Deriv Bot - Prueba de Conexión</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: monospace; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #00c853; color: white; border: none; border-radius: 5px; }
        .log { background: #000; padding: 10px; height: 300px; overflow-y: auto; font-size: 12px; margin-top: 20px; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <h2>🔌 Prueba de Conexión con Deriv</h2>
    <p>Token actual: <strong id="tokenDisplay"></strong></p>
    <button onclick="testConnection()">🔌 Probar Conexión</button>
    <div class="log" id="logPanel"></div>

    <script>
        // 🔐 PON AQUÍ TU TOKEN (debe empezar con deriv-demo-)
        const MI_TOKEN = "***********vJlf";  // ← REEMPLAZA ESTO
        
        function addLog(msg, type = "info") {
            const log = document.getElementById("logPanel");
            const entry = document.createElement("div");
            entry.className = type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
            console.log(msg);
        }
        
        function testConnection() {
            addLog("🚀 Iniciando prueba de conexión...", "info");
            
            if (!MI_TOKEN || MI_TOKEN === "deriv-demo-TU_TOKEN_AQUI") {
                addLog("❌ ERROR: Token no configurado. Edita el código y pon tu token.", "error");
                return;
            }
            
            addLog(`📡 Usando token: ${MI_TOKEN.substring(0, 20)}...`, "info");
            
            const ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");
            
            ws.onopen = () => {
                addLog("✅ WebSocket conectado", "success");
                addLog("📤 Enviando autorización...", "info");
                ws.send(JSON.stringify({ authorize: MI_TOKEN }));
            };
            
            ws.onmessage = (event) => {
                try {
                    const response = JSON.parse(event.data);
                    addLog(`📥 Respuesta recibida: ${JSON.stringify(response).substring(0, 200)}`, "info");
                    
                    if (response.error) {
                        addLog(`❌ ERROR: ${response.error.message}`, "error");
                        if (response.error.code === "InvalidToken") {
                            addLog("🔍 El token es inválido. Verifica que:", "error");
                            addLog("   1. El token empieza con 'deriv-demo-'", "error");
                            addLog("   2. No tiene espacios al inicio o final", "error");
                            addLog("   3. Fue generado desde la cuenta demo", "error");
                            addLog("   4. Tiene permisos de trading", "error");
                        }
                        ws.close();
                        return;
                    }
                    
                    if (response.authorize) {
                        addLog(`✅ AUTENTICACIÓN EXITOSA!`, "success");
                        addLog(`👤 Cuenta: ${response.authorize.loginid}`, "success");
                        addLog(`💰 Balance disponible`, "success");
                        addLog("🎉 Conexión exitosa. Tu token funciona correctamente.", "success");
                        
                        // Consultar balance
                        ws.send(JSON.stringify({ balance: 1 }));
                    }
                    
                    if (response.balance) {
                        addLog(`💰 Balance: $${response.balance.balance} ${response.balance.currency}`, "success");
                    }
                    
                } catch(e) {
                    addLog(`❌ Error procesando: ${e.message}`, "error");
                }
            };
            
            ws.onerror = () => {
                addLog("❌ Error de conexión WebSocket", "error");
            };
            
            ws.onclose = () => {
                addLog("🔌 Conexión cerrada", "info");
            };
            
            // Timeout por si no responde
            setTimeout(() => {
                if (ws.readyState === WebSocket.OPEN) {
                    addLog("⏰ Timeout: No hubo respuesta en 10 segundos", "error");
                    ws.close();
                }
            }, 10000);
        }
        
        document.getElementById("tokenDisplay").innerHTML = MI_TOKEN ? MI_TOKEN.substring(0, 25) + "..." : "No configurado";
    </script>
</body>
</html>
