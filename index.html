// ======================== UTILIDADES ========================
const calcEMA = (arr, period) => {
    const ema = new Array(arr.length).fill(0);
    if (arr.length < period) return ema;
    const k = 2 / (period + 1);
    ema[period - 1] = arr.slice(0, period).reduce((a, b) => a + b, 0) / period;
    for (let i = period; i < arr.length; i++) {
        ema[i] = arr[i] * k + ema[i - 1] * (1 - k);
    }
    return ema;
};

const calcATR = (bars, period = 14) => {
    const tr = [];
    for (let i = 1; i < bars.length; i++) {
        const h = bars[i].h, l = bars[i].l, pc = bars[i-1].c;
        tr.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
    }
    if (tr.length < period) return new Array(bars.length).fill(0);
    const atr = new Array(bars.length).fill(0);
    atr[period] = tr.slice(0, period).reduce((a,b) => a + b, 0) / period;
    for (let i = period + 1; i < bars.length; i++) {
        atr[i] = (atr[i-1] * (period - 1) + tr[i-1]) / period;
    }
    return atr;
};

// ======================== VELAS & AGREGADOR ========================
class Candle {
    constructor(open, startTime) {
        this.o = open; this.h = open; this.l = open; this.c = open;
        this.ticks = 0; this.start = startTime;
    }
    update(price) {
        this.h = Math.max(this.h, price);
        this.l = Math.min(this.l, price);
        this.c = price;
        this.ticks++;
    }
}

class TickAggregator {
    constructor(timeframeSec = 60) {
        this.timeframeMs = timeframeSec * 1000;
        this.current = null;
        this.candles = [];
        this.onCandleComplete = null;
    }
    addTick(timestampMs, price) {
        const start = Math.floor(timestampMs / this.timeframeMs) * this.timeframeMs;
        if (this.current && this.current.start === start) {
            this.current.update(price);
            return null;
        } else {
            const completed = this.current;
            if (completed) {
                this.candles.push(completed);
                if (this.candles.length > 500) this.candles.shift();
                if (this.onCandleComplete) this.onCandleComplete(completed);
            }
            this.current = new Candle(price, start);
            return completed;
        }
    }
    getCandles(count = 300) {
        const all = [...this.candles];
        if (this.current && this.current.ticks > 0) all.push(this.current);
        return all.slice(-count);
    }
}

// ======================== DERIV WEBSOCKET CLIENT ========================
class DerivAPI {
    constructor(appId, token, symbol) {
        this.appId = appId;
        this.token = token;
        this.symbol = symbol;
        this.ws = null;
        this.aggregator = new TickAggregator();
        this.onTick = null;
        this.onBalance = null;
        this.onTradeUpdate = null;
        this.latestPrice = 0;
        this.balance = 0;
        this.currency = "USD";
        this.running = false;
        this.reqId = 0;
        this.subscriptionId = null;
        this.authDone = false;
        this.pendingRequests = new Map();
    }

    async connect() {
        this.running = true;
        const url = `wss://ws.deriv.com/websockets/v3?app_id=${this.appId}`;
        while (this.running) {
            try {
                this.ws = new WebSocket(url);
                await new Promise((resolve, reject) => {
                    this.ws.onopen = resolve;
                    this.ws.onerror = (e) => reject(e);
                });
                console.log("Deriv WS conectado");
                if (this.token) await this.authorize();
                await this.subscribeTicks();
                this.startHeartbeat();
                this.ws.onmessage = (msg) => this.handleMessage(JSON.parse(msg.data));
                this.ws.onclose = () => {
                    if (this.running) {
                        console.warn("WS cerrado, reconectando en 5s...");
                        setTimeout(() => this.connect(), 5000);
                    }
                };
                await new Promise(() => {}); // mantener conexión
            } catch(e) {
                console.error("Error conexión Deriv:", e);
                await new Promise(r => setTimeout(r, 5000));
            }
        }
    }

    async authorize() {
        const resp = await this.send({ authorize: this.token });
        if (resp.error) {
            console.error("Auth falló:", resp.error.message);
            this.authDone = false;
        } else {
            console.log("Autorizado. Balance:", resp.authorize.balance);
            this.balance = parseFloat(resp.authorize.balance);
            this.currency = resp.authorize.currency || "USD";
            this.authDone = true;
            if (this.onBalance) this.onBalance(this.balance);
        }
    }

    async subscribeTicks() {
        const resp = await this.send({ ticks: this.symbol, subscribe: 1 });
        if (resp.subscription) {
            this.subscriptionId = resp.subscription.id;
            console.log("Suscrito a ticks", this.subscriptionId);
        }
    }

    startHeartbeat() {
        this.heartbeatTimer = setInterval(() => {
            if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                this.ws.send(JSON.stringify({ ping: 1 }));
            }
        }, 30000);
    }

    async send(request) {
        return new Promise((resolve) => {
            this.reqId++;
            request.req_id = this.reqId;
            this.pendingRequests.set(this.reqId, resolve);
            this.ws.send(JSON.stringify(request));
        });
    }

    handleMessage(data) {
        if (data.tick) {
            const tick = data.tick;
            const price = parseFloat(tick.quote);
            const epoch = parseInt(tick.epoch) * 1000;
            this.latestPrice = price;
            this.aggregator.addTick(epoch, price);
            if (this.onTick) this.onTick(price);
        } else if (data.proposal_open_contract) {
            const update = data.proposal_open_contract;
            if (this.onTradeUpdate) this.onTradeUpdate(update);
        } else if (data.authorize) {
            this.balance = parseFloat(data.authorize.balance);
            if (this.onBalance) this.onBalance(this.balance);
        } else if (data.buy) {
            // respuesta a buy
        } else if (data.error) {
            console.error("Deriv error:", data.error.message);
        }
        // resolver pending requests
        if (data.req_id && this.pendingRequests.has(data.req_id)) {
            this.pendingRequests.get(data.req_id)(data);
            this.pendingRequests.delete(data.req_id);
        }
    }

    async getProposal(contractType, stake, duration = 5) {
        return await this.send({
            proposal: 1,
            amount: stake.toString(),
            basis: "stake",
            contract_type: contractType,
            currency: this.currency,
            duration: duration,
            symbol: this.symbol,
        });
    }

    async buyContract(proposalId, price) {
        return await this.send({
            buy: proposalId,
            price: price,
        });
    }

    async subscribeContract(contractId) {
        return await this.send({
            proposal_open_contract: 1,
            contract_id: contractId,
            subscribe: 1,
        });
    }

    disconnect() {
        this.running = false;
        if (this.heartbeatTimer) clearInterval(this.heartbeatTimer);
        if (this.ws) this.ws.close();
    }
}

// ======================== RÉGIMEN DE MERCADO ========================
class MarketRegimeDetector {
    constructor() {
        this.atrHistory = [];
    }
    detect(candles) {
        if (candles.length < 50) return { regime: "WARMING_UP", confidence: 0, direction: 0 };
        const closes = candles.map(c => c.c);
        const highs = candles.map(c => c.h);
        const lows = candles.map(c => c.l);
        const roc10 = (closes[closes.length-1] - closes[closes.length-11]) / closes[closes.length-11] * 100;
        const atrVals = calcATR(candles);
        const curATR = atrVals[atrVals.length-1];
        this.atrHistory.push(curATR);
        if (this.atrHistory.length > 200) this.atrHistory.shift();
        const sorted = [...this.atrHistory].sort((a,b)=>a-b);
        const atrPct = sorted.filter(v => v <= curATR).length / sorted.length;
        const structure = this.detectStructure(highs, lows);
        const adx = Math.abs(roc10) * 8;
        let regime = "RANGE", conf = 0.5, dir = 0;
        if (atrPct < 0.25 && structure === "CONTRACTION") { regime = "COMPRESSION"; conf = 0.75; }
        else if (atrPct > 0.75 && structure.includes("BREAKOUT")) {
            regime = "EXPANSION"; conf = 0.7;
            dir = structure === "BREAKOUT_UP" ? 1 : -1;
        } else if (adx > 28) { regime = "STRONG_TREND"; conf = 0.85; dir = roc10 > 0 ? 1 : -1; }
        else if (adx > 16) { regime = "WEAK_TREND"; conf = 0.65; dir = roc10 > 0 ? 1 : -1; }
        return { regime, confidence: conf, direction: dir, atr: curATR, atrPct, roc10 };
    }
    detectStructure(highs, lows) {
        const w = Math.min(20, highs.length);
        const hSeg = highs.slice(-w);
        const lSeg = lows.slice(-w);
        const range = Math.max(...hSeg) - Math.min(...lSeg);
        if (range === 0) return "FLAT";
        const prevHigh = Math.max(...hSeg.slice(0, -3));
        const prevLow = Math.min(...lSeg.slice(0, -3));
        if (hSeg[hSeg.length-1] > prevHigh) return "BREAKOUT_UP";
        if (lSeg[lSeg.length-1] < prevLow) return "BREAKOUT_DOWN";
        if (range < 0.6 * (Math.max(...highs.slice(-30)) - Math.min(...lows.slice(-30)))) return "CONTRACTION";
        return "NEUTRAL";
    }
}

// ======================== MOTOR DE SEÑALES ========================
class SignalEngine {
    constructor(persistence = 3) { this.persistence = persistence; }
    evaluate(candles, regime, params = {}) {
        if (candles.length < 60 || regime.regime !== "COMPRESSION") return null;
        const closes = candles.map(c => c.c);
        const highs = candles.map(c => c.h);
        const lows = candles.map(c => c.l);
        if (!this.isCompression(candles)) return null;
        const resistance = Math.max(...highs.slice(-21, -1));
        const support = Math.min(...lows.slice(-21, -1));
        const breakoutUp = closes[closes.length-1] > resistance && highs[highs.length-1] > resistance;
        const breakoutDown = closes[closes.length-1] < support && lows[lows.length-1] < support;
        if (!breakoutUp && !breakoutDown) return null;
        const direction = breakoutUp ? "LONG" : "SHORT";
        if (!this.validateBreakout(candles, direction)) return null;
        if (!this.checkMomentum(closes, direction)) return null;
        const entry = closes[closes.length-1];
        const atrVals = calcATR(candles);
        const atr = atrVals[atrVals.length-1];
        const slMult = params.atr_sl_mult || 1.5;
        const tpMult = params.atr_tp_mult || 2.5;
        const sl = direction === "LONG" ? entry - atr * slMult : entry + atr * slMult;
        const tp = direction === "LONG" ? entry + atr * tpMult : entry - atr * tpMult;
        if ((tp - entry) * (direction === "LONG" ? 1 : -1) < 0) return null;
        const rrr = Math.abs(tp - entry) / Math.max(Math.abs(entry - sl), 0.00001);
        if (rrr < 1.5) return null;
        return { direction, entry, sl, tp, setup_type: "COMPRESSION_BO", atr, rrr };
    }
    isCompression(candles) {
        const atr = calcATR(candles);
        const recent = atr.slice(-5).reduce((a,b)=>a+b,0)/5;
        const prior = atr.slice(-20,-5).reduce((a,b)=>a+b,0)/15;
        return recent < prior * 0.8;
    }
    validateBreakout(candles, direction) {
        const closes = candles.map(c => c.c);
        const highs = candles.map(c => c.h);
        const lows = candles.map(c => c.l);
        if (direction === "LONG") {
            const resist = Math.max(...highs.slice(-(this.persistence+2), -1));
            const count = closes.slice(-this.persistence).filter(c => c > resist).length;
            if (count < this.persistence - 1) return false;
            if (highs[highs.length-1] <= highs[highs.length-2]) return false;
        } else {
            const supp = Math.min(...lows.slice(-(this.persistence+2), -1));
            const count = closes.slice(-this.persistence).filter(c => c < supp).length;
            if (count < this.persistence - 1) return false;
            if (lows[lows.length-1] >= lows[lows.length-2]) return false;
        }
        const atr = calcATR(candles);
        const recentAtr = atr.slice(-3).reduce((a,b)=>a+b,0)/3;
        const priorAtr = atr.slice(-10, -3).reduce((a,b)=>a+b,0)/7;
        return recentAtr >= priorAtr * 1.05;
    }
    checkMomentum(closes, direction) {
        if (closes.length < 6) return false;
        const seg = closes.slice(-6);
        const mom = [];
        for (let i = 1; i < seg.length; i++) mom.push(seg[i] - seg[i-1]);
        const accel = [];
        for (let i = 1; i < mom.length; i++) accel.push(mom[i] - mom[i-1]);
        if (accel.length === 0) return false;
        if (direction === "LONG") return accel[accel.length-1] > 0 && mom[mom.length-1] > 0;
        else return accel[accel.length-1] < 0 && mom[mom.length-1] < 0;
    }
}

// ======================== SISTEMA ADAPTATIVO ========================
class AdaptiveSystem {
    constructor(decay = 0.99, explore = 0.1) {
        this.setups = {};
        this.history = [];
        this.decay = decay;
        this.explore = explore;
        this.dailyTrades = 0;
    }
    getScore(setup) {
        const s = this.setups[setup];
        if (!s || s.count < 5) return 0;
        return s.meanR;
    }
    shouldEnter(setup) {
        const s = this.setups[setup];
        if (!s || s.count < 3) return true;
        if (Math.random() < this.explore) return true;
        return s.meanR > 0;
    }
    recordTrade(setup, regime, r, win) {
        if (!this.setups[setup]) this.setups[setup] = { count: 0, sumR: 0, meanR: 0, wins: 0 };
        const s = this.setups[setup];
        s.count++; s.sumR += r; s.meanR = s.sumR / s.count;
        if (win) s.wins++;
        for (let key in this.setups) {
            this.setups[key].sumR *= this.decay;
            this.setups[key].count = Math.max(1, Math.floor(this.setups[key].count * this.decay));
        }
        this.history.push({ setup, regime, r, win });
        if (this.history.length > 200) this.history.shift();
        this.dailyTrades++;
    }
    winStreak() {
        let streak = 0;
        for (let i = this.history.length - 1; i >= 0; i--) {
            if (this.history[i].win) streak++; else break;
        }
        return streak;
    }
    recentWinRate(n = 20) {
        const slice = this.history.slice(-n);
        if (slice.length === 0) return 0;
        return slice.filter(t => t.win).length / slice.length;
    }
}

// ======================== AUTO-OPTIMIZADOR ========================
class AutoOptimizer {
    constructor() {
        this.params = { atr_sl_mult: 1.5, atr_tp_mult: 2.5, entry_threshold: 0.2 };
        this.bounds = { atr_sl_mult: [1.0, 2.5], atr_tp_mult: [1.5, 4.0] };
    }
    optimize(adaptiveSys, equityCurve, lookback = 20) {
        const recent = adaptiveSys.history.slice(-lookback);
        if (recent.length < 5) return this.params;
        const rVals = recent.map(t => t.r);
        const meanR = rVals.reduce((a,b)=>a+b,0) / rVals.length;
        const variance = rVals.reduce((a,b)=>a+(b-meanR)**2,0) / rVals.length;
        const stdR = Math.sqrt(variance) || 0.2;
        const sharpe = meanR / (stdR + 0.0001);
        const peak = Math.max(...equityCurve.slice(-lookback));
        const current = equityCurve[equityCurve.length-1];
        const dd = (peak - current) / peak || 0;
        const step = 0.05;
        if (sharpe < -0.2 || dd > 0.1) {
            this.params.atr_sl_mult = Math.max(this.bounds.atr_sl_mult[0], this.params.atr_sl_mult - step);
            this.params.atr_tp_mult = Math.max(this.bounds.atr_tp_mult[0], this.params.atr_tp_mult - step);
        } else if (sharpe > 0.5 && dd < 0.05) {
            this.params.atr_tp_mult = Math.min(this.bounds.atr_tp_mult[1], this.params.atr_tp_mult + step);
            this.params.atr_sl_mult = Math.min(this.bounds.atr_sl_mult[1], this.params.atr_sl_mult + step * 0.5);
        }
        return this.params;
    }
}

// ======================== GESTOR DE RIESGO ========================
class RiskManager {
    constructor(baseRiskPct = 0.005, maxDailyLoss = 0.05) {
        this.baseRisk = baseRiskPct;
        this.maxLoss = maxDailyLoss;
        this.startBalance = 0;
    }
    calculateStake(balance, entry, sl, regime, adaptive) {
        if (!this.startBalance) this.startBalance = balance;
        const dailyPnl = (balance - this.startBalance) / this.startBalance;
        if (dailyPnl < -this.maxLoss) return 0;
        let mult = 1.0;
        const dd = 1 - (balance / Math.max(this.startBalance, balance));
        if (dd > 0.15) mult = 0.5;
        else if (dd > 0.10) mult = 0.75;
        if (adaptive.winStreak() >= 3) mult = Math.min(mult * 1.2, 1.5);
        if (regime.regime.includes("TREND")) mult *= 1.1;
        else if (regime.regime === "COMPRESSION") mult *= 0.8;
        const riskAmount = balance * this.baseRisk * mult;
        const slDist = Math.abs(entry - sl);
        const stake = riskAmount / (slDist / 0.0001);
        return Math.min(stake, balance * 0.02);
    }
}

    const [equity, setEquity] = useState([1000]);
    const [log, setLog] = useState([]);
    const [symbol, setSymbol] = useState("R_10");
    const [stats, setStats] = useState({ wins: 0, total: 0, pf: 0, expectancy: 0 });

    const apiRef = useRef(null);
    const botRef = useRef({
        regimeDetector: new MarketRegimeDetector(),
        signalEngine: new SignalEngine(),
        adaptive: new AdaptiveSystem(),
        optimizer: new AutoOptimizer(),
        risk: new RiskManager(),
        candles: [],
        currentTrade: null,
        cooldown: 0,
        equityCurve: [1000],
        trades: [],
    });

    const addLog = (msg) => setLog(prev => [...prev.slice(-200), `[${new Date().toLocaleTimeString()}] ${msg}`]);

    const handleConnect = async () => {
        if (connected) {
            apiRef.current?.disconnect();
            setConnected(false); setRunning(false);
            addLog("Desconectado");
            return;
        }
        if (!token) { alert("Ingrese API Token"); return; }
        const api = new DerivAPI(DEFAULT_CONFIG.appId, token, symbol);
        api.onTick = (p) => setPrice(p);
        api.onBalance = (b) => {
            setBalance(b);
            if (!botRef.current.risk.startBalance) botRef.current.risk.startBalance = b;
        };
        api.onTradeUpdate = (update) => handleTradeUpdate(update);
        apiRef.current = api;
        api.connect().then(() => {}).catch(console.error);
        setConnected(true);
        addLog("Conectado a Deriv WebSocket");
    };

    const handleTradeUpdate = (update) => {
        const bot = botRef.current;
        if (bot.currentTrade && update.contract_id === bot.currentTrade.contractId) {
            if (update.is_sold) {
                const profit = parseFloat(update.profit) || 0;
                const entry = bot.currentTrade.entry;
                const sl = bot.currentTrade.sl;
                const direction = bot.currentTrade.direction;
                const points = profit; // Simplificación; en realidad Deriv da profit en $
                const risk = Math.abs(entry - sl);
                const r = points / (risk * bot.currentTrade.stake / risk) ; // ajuste
                // Debemos calcular R real con datos correctos
                const rCalc = (direction === "LONG" ? 1 : -1) * (price - entry) / risk;
                const isWin = profit > 0;
                const tradeRecord = {
                    ...bot.currentTrade,
                    exitPrice: price,
                    pnl: profit,
                    r: rCalc,
                    win: isWin,
                    reason: update.exit_tick_time ? "TP/SL/TIMEOUT" : "CLOSED",
                };
                bot.trades.push(tradeRecord);
                setTrades([...bot.trades]);
                bot.adaptive.recordTrade(tradeRecord.setup_type, tradeRecord.regime, tradeRecord.r, tradeRecord.win);
                bot.equityCurve.push(balance);
                setEquity([...bot.equityCurve]);
                bot.currentTrade = null;
                setOpenTrade(null);
                bot.cooldown = DEFAULT_CONFIG.cooldownBars;
                addLog(`Trade cerrado: ${isWin ? "GANANCIA" : "PÉRDIDA"} R=${tradeRecord.r.toFixed(2)}`);
            }
        }
    };

    // Lógica principal: se activa cuando se completa una vela nueva
    useEffect(() => {
        if (!apiRef.current || !running) return;
        const aggregator = apiRef.current.aggregator;
        aggregator.onCandleComplete = (candle) => {
            const bot = botRef.current;
            const candles = aggregator.getCandles(100);
            if (candles.length < 60) return;
            bot.candles = candles;
            const regimeData = bot.regimeDetector.detect(candles);
            setRegime(regimeData);
            if (bot.cooldown > 0) { bot.cooldown--; return; }
            // Verificar salida local (respaldo)
            if (bot.currentTrade) {
                const exitCheck = checkExit(bot.currentTrade, price, candles, regimeData);
                if (exitCheck.exit) {
                    // Intentar vender o esperar cierre Deriv
                    if (apiRef.current.authDone) {
                        // No podemos vender manualmente en Deriv, solo esperar update.
                    }
                    addLog(`Señal salida: ${exitCheck.reason}`);
                }
            }
            // Evaluar entrada si no hay trade
            if (!bot.currentTrade && bot.adaptive.dailyTrades < DEFAULT_CONFIG.maxDailyTrades) {
                const signal = bot.signalEngine.evaluate(candles, regimeData, bot.optimizer.params);
                if (signal && bot.adaptive.shouldEnter(signal.setup_type)) {
                    const stake = bot.risk.calculateStake(balance, signal.entry, signal.sl, regimeData, bot.adaptive);
                    if (stake > 0.5) {
                        executeTrade(signal, stake);
                    }
                }
            }
            // Optimizar cada 20 velas
            if (bot.trades.length % 20 === 0 && bot.trades.length > 0) {
                bot.optimizer.optimize(bot.adaptive, bot.equityCurve);
            }
        };
        return () => { aggregator.onCandleComplete = null; };
    }, [running, price, balance]);

    const executeTrade = async (signal, stake) => {
        const api = apiRef.current;
        if (!api || !api.authDone) return;
        addLog(`Señal: ${signal.setup_type} ${signal.direction} @ ${signal.entry.toFixed(5)}`);
        try {
            const contractType = signal.direction === "LONG" ? "CALL" : "PUT";
            // En Deriv, para sintéticos con SL/TP se usa MULTIPLIER
            const proposalResp = await api.getProposal("MULTIPLIER", stake, 5);
            if (proposalResp.error) {
                addLog(`Error proposal: ${proposalResp.error.message}`);
                return;
            }
            const proposal = proposalResp.proposal;
            if (!proposal) return;
            // Ajustar stake según proposal
            const buyResp = await api.buyContract(proposal.id, signal.entry);
            if (buyResp.error) {
                addLog(`Error buy: ${buyResp.error.message}`);
                return;
            }
            const contractId = buyResp.buy.contract_id;
            await api.subscribeContract(contractId);
            botRef.current.currentTrade = {
                contractId,
                direction: signal.direction,
                entry: signal.entry,
                sl: signal.sl,
                tp: signal.tp,
                setup_type: signal.setup_type,
                regime: regime.regime,
                stake,
                openTime: Date.now(),
            };
            setOpenTrade(botRef.current.currentTrade);
            addLog(`Trade abierto ID: ${contractId}`);
        } catch(e) {
            addLog(`Error ejecutando trade: ${e.message}`);
        }
    };

    const checkExit = (trade, price, candles, regime) => {
        const dir = trade.direction === "LONG" ? 1 : -1;
        if (dir * (price - trade.sl) <= 0) return { exit: true, reason: "SL" };
        if (dir * (price - trade.tp) >= 0) return { exit: true, reason: "TP" };
        if ((candles.length - (trade.barIndex || 0)) > 20) return { exit: true, reason: "TIMEOUT" };
        return { exit: false };
    };

    const toggleRunning = () => {
        if (!connected) return alert("Conecte primero");
        setRunning(!running);
        addLog(running ? "Bot PAUSADO" : "Bot ACTIVADO");
    };

    const wins = trades.filter(t => t.win).length;
    const winRate = trades.length ? (wins / trades.length * 100).toFixed(1) : 0;
    const grossProfit = trades.filter(t => t.win).reduce((a,b)=>a + b.pnl, 0);
    const grossLoss = Math.abs(trades.filter(t => !t.win).reduce((a,b)=>a + b.pnl, 0)) || 1;
    const pf = (grossProfit / grossLoss).toFixed(2);
    const expectancy = trades.length ? (trades.reduce((a,b)=>a + b.r, 0) / trades.length).toFixed(2) : 0;

    return (
        <div>
            <header>
                <h1>⚡ DerivAdaptiveBot Pro</h1>
                <div className="controls">
                    <input type="text" placeholder="Deriv API Token" value={token}
                           onChange={e => setToken(e.target.value)} style={{width: 200}} />
                    <select value={symbol} onChange={e => setSymbol(e.target.value)}>
                        <option value="R_10">V10 (R_10)</option>
                        <option value="R_25">V25 (R_25)</option>
                    </select>
                    <button onClick={handleConnect} className={connected ? "danger" : "primary"}>
                        {connected ? "Desconectar" : "Conectar"}
                    </button>
                    <button onClick={toggleRunning} disabled={!connected}
                            className={running ? "danger" : "primary"}>
                        {running ? "⏹️ STOP" : "▶️ START"}
                    </button>
                </div>
            </header>
            <div className="dashboard">
                {/* Panel izquierdo: Estado */}
                <div className="panel">
                    <h3>💰 Cuenta</h3>
                    <div className="status-row"><span className="label">Balance:</span><span className="value">{balance.toFixed(2)}</span></div>
                    <div className="status-row"><span className="label">Precio:</span><span className="value">{price.toFixed(5)}</span></div>
                    <div className="status-row"><span className="label">Régimen:</span>
                        <span className="badge" style={{background: regimeColor(regime.regime)}}>{regime.regime}</span>
                    </div>
                    <div className="status-row"><span className="label">Trades hoy:</span><span className="value">{botRef.current.adaptive.dailyTrades}</span></div>
                    <div className="status-row"><span className="label">Racha:</span><span className="value">{botRef.current.adaptive.winStreak()}</span></div>
                </div>
                {/* Panel central: Gráfico y trade activo */}
                <div className="panel chart-container">
                    <h3>📊 Actividad</h3>
                    {openTrade ? (
                        <div style={{padding: '10px', background: '#1a2436', borderRadius: 8}}>
                            <div>Trade activo: <span className={`badge ${openTrade.direction==='LONG'?'badge-buy':'badge-sell'}`}>{openTrade.direction}</span></div>
                            <div>Entrada: {openTrade.entry.toFixed(5)} | SL: {openTrade.sl.toFixed(5)} | TP: {openTrade.tp.toFixed(5)}</div>
                        </div>
                    ) : <div style={{color: '#5a6880'}}>Sin posición abierta</div>}
                    <div className="log-area">
                        {log.slice(-15).map((l,i) => <div key={i}>{l}</div>)}
                    </div>
                </div>
                {/* Panel derecho: Historial */}
                <div className="panel">
                    <h3>📈 Historial</h3>
                    <div className="status-row"><span>Winrate:</span><span>{winRate}%</span></div>
                    <div className="status-row"><span>Profit Factor:</span><span>{pf}</span></div>
                    <div className="status-row"><span>Expectancy R:</span><span>{expectancy}</span></div>
                    <div className="trade-list">
                        {trades.slice().reverse().map((t,i) => (
                            <div key={i} className="trade-item">
                                <span className={t.win ? "win" : "loss"}>{t.win ? "+" : ""}{t.r.toFixed(2)}R</span>
                                <span>{t.reason}</span>
                                <span style={{fontSize: '0.6rem'}}>{new Date(t.openTime).toLocaleTimeString()}</span>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        </div>
    );
}

function regimeColor(regime) {
    const map = {
        STRONG_TREND: '#00e5a0', WEAK_TREND: '#4dffb4', RANGE: '#607080',
        COMPRESSION: '#f0b90b', EXPANSION: '#7b5ea7', WARMING_UP: '#445566',
        DISCONNECTED: '#ff4d6d',
    };
    return map[regime] || '#607080';
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
