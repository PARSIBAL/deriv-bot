<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SNIPER PRO FX</title>

<style>
body{
  background:#060b14;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

h2{
  color:#00ffc3;
}

input,select,button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}

button{
  background:#00ffc3;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

.box{
  background:#0d1626;
  padding:10px;
  border-radius:10px;
  width:30%;
}

.mode{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:#111;
}

.log{
  margin-top:10px;
  background:#000;
  height:120px;
  overflow:auto;
  font-size:11px;
  padding:8px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🎯 SNIPER PRO FX</h2>

<input type="text" id="token" placeholder="e1lRgxNoxWwBkzx">

<input type="number" id="stake" value="0.5">

<select id="symbol">
<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
</select>

<button id="toggle">START</button>

<div class="mode" id="mode">IDLE</div>

<div class="stats">
<div class="box">Wins<br><span id="wins">0</span></div>
<div class="box">Loss<br><span id="losses">0</span></div>
<div class="box">Bal<br><span id="balance">0</span></div>
</div>

<div class="log" id="log"></div>

</div>

<script>
let ws;
let running=false;

let wins=0;
let losses=0;
let balance=0;

let candles=[];
let lastTradeTime=0;
let lossStreak=0;

document.getElementById("toggle").onclick=()=>{
 running=!running;

 if(running){
  start();
  toggle.innerText="STOP";
 }else{
  ws.close();
  toggle.innerText="START";
 }
};

function log(msg){
 let el=document.getElementById("log");
 el.innerHTML+="<div>"+msg+"</div>";
 el.scrollTop=el.scrollHeight;
}

function setMode(m){
 document.getElementById("mode").innerText=m;
}

function start(){
 let token=document.getElementById("token").value;

 ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

 ws.onopen=()=>{
  ws.send(JSON.stringify({authorize:token}));
 };

 ws.onmessage=(msg)=>{
  let data=JSON.parse(msg.data);

  if(data.msg_type==="authorize"){
   log("Conectado");
   getCandles();
  }

  if(data.msg_type==="candles"){
   candles=data.candles.map(c=>c.close);
   sniper();
  }

  if(data.msg_type==="proposal_open_contract"){
   if(data.proposal_open_contract.is_sold){

    let p=data.proposal_open_contract.profit;

    if(p>0){
     wins++;
     balance+=p;
     lossStreak=0;
     log("WIN +" + p);
    }else{
     losses++;
     balance+=p;
     lossStreak++;
     log("LOSS " + p);
    }

    update();

    // STOP AUTOMÁTICO
    if(lossStreak>=2){
     setMode("STOP LOSS");
     running=false;
     ws.close();
     toggle.innerText="START";
    }
   }
  }
 };
}

function getCandles(){
 let symbol=document.getElementById("symbol").value;

 ws.send(JSON.stringify({
  ticks_history:symbol,
  granularity:60,
  count:30,
  style:"candles"
 }));
}

function ema(p,d){
 let k=2/(p+1);
 let arr=[d[0]];

 for(let i=1;i<d.length;i++){
  arr.push(d[i]*k + arr[i-1]*(1-k));
 }

 return arr;
}

function sniper(){
 if(candles.length<15)return;

 let ema3=ema(3,candles).pop();
 let ema9=ema(9,candles).pop();

 let last=candles[candles.length-1];
 let prev=candles[candles.length-2];

 let diff=Math.abs(ema3-ema9);
 let now=Date.now();

 if(now-lastTradeTime<60000)return;

 // FILTRO SNIPER
 if(diff<0.00006){
  setMode("LATERAL");
  return;
 }

 // CALL
 if(ema3>ema9 && last>prev){
  setMode("SNIPER CALL");
  trade("CALL");
  lastTradeTime=now;
 }

 // PUT
 else if(ema3<ema9 && last<prev){
  setMode("SNIPER PUT");
  trade("PUT");
  lastTradeTime=now;
 }

 else{
  setMode("WAIT");
 }
}

function trade(type){
 let stake=parseFloat(document.getElementById("stake").value);
 let symbol=document.getElementById("symbol").value;

 log("TRADE " + type);

 ws.send(JSON.stringify({
  buy:1,
  price:stake,
  parameters:{
   amount:stake,
   basis:"stake",
   contract_type:type,
   currency:"USD",
   duration:1,
   duration_unit:"m",
   symbol:symbol
  }
 }));
}

function update(){
 document.getElementById("wins").innerText=wins;
 document.getElementById("losses").innerText=losses;
 document.getElementById("balance").innerText=balance.toFixed(2);
}
</script>

</body>
</html>
