<!DOCTYPE html>
<html>
<head>
<title>Bot R_50 PRO</title>
<style>
body { background:#0a0a0a; color:#fff; font-family:sans-serif; text-align:center; }
.card { background:#1a1a2e; padding:20px; border-radius:15px; max-width:400px; margin:auto; }
button { padding:10px; margin:5px; border:none; border-radius:8px; font-weight:bold; }
.start { background:green; color:white; }
.stop { background:red; color:white; }
.log { background:black; height:200px; overflow:auto; font-size:10px; text-align:left; padding:10px; }
</style>
</head>
<body>

<div class="card">
<h2>🤖 BOT R_50 PRO</h2>

<button class="start" onclick="startBot()">INICIAR</button>
<button class="stop" onclick="stopBot()">DETENER</button>

<h3 id="status">🔴 OFF</h3>

<p>💰 Balance: <span id="balance">0</span></p>
<p>📈 Ganancia: <span id="profit">0</span></p>
<p>🎯 Stake: <span id="stake">0</span></p>
<p>🏆 Winrate: <span id="wr">0%</span></p>

<div class="log" id="log"></div>
</div>

<script>
const TOKEN = "e1lRgxNoxWwBkzx";
const SYMBOL = "R_50";

let ws, balance=0, stake=0.5;
let running=false, wins=0, total=0;
let profit=0, losses=0, winStreak=0, lossStreak=0;
let priceHistory=[], lastTrade=0;

function log(msg){
 let el=document.getElementById("log");
 el.innerHTML += msg+"<br>";
 el.scrollTop=el.scrollHeight;
}

function updateUI(){
 document.getElementById("balance").innerText=balance.toFixed(2);
 document.getElementById("profit").innerText=profit.toFixed(2);
 document.getElementById("stake").innerText=stake.toFixed(2);
 let wr = total? (wins/total*100).toFixed(1):0;
 document.getElementById("wr").innerText=wr+"%";
}

function adjustStake(){
 let risk=0.005;
 if(lossStreak>=3) risk=0.0035;
 if(winStreak>=3) risk=0.007;

 let calc = balance*risk;
 if(calc>1) calc=1;
 if(calc<0.35) calc=0.35;

 stake = Math.floor(calc*100)/100;
}

function startBot(){
 ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

 ws.onopen=()=>{
  ws.send(JSON.stringify({authorize:TOKEN}));
 }

 ws.onmessage=(e)=>{
  let d=JSON.parse(e.data);

  if(d.authorize){
   running=true;
   document.getElementById("status").innerText="🟢 ON";
   ws.send(JSON.stringify({ticks:SYMBOL, subscribe:1}));
   ws.send(JSON.stringify({balance:1}));
  }

  if(d.balance){
   balance=d.balance.balance;
   updateUI();
  }

  if(d.tick && running){
   let price=d.tick.quote;
   priceHistory.push(price);
   if(priceHistory.length>30) priceHistory.shift();
   if(priceHistory.length<20) return;

   let returns=[];
   for(let i=1;i<priceHistory.length;i++){
    returns.push(priceHistory[i]-priceHistory[i-1]);
   }

   let mean=returns.reduce((a,b)=>a+b,0)/returns.length;
   let std=Math.sqrt(returns.map(x=>(x-mean)**2).reduce((a,b)=>a+b,0)/returns.length);

   if(std<0.003 || std>0.02) return;

   let z=(returns[returns.length-1]-mean)/std;

   let trend = priceHistory[priceHistory.length-1] - priceHistory[priceHistory.length-5];

   let now=Date.now();
   if(now-lastTrade<15000) return;

   let decision=null;
   if(z>1.5 && trend>0) decision="CALL";
   if(z<-1.5 && trend<0) decision="PUT";

   if(decision){
    if(lossStreak>=3){
     log("⏸️ Pausa por pérdidas");
     return;
    }

    adjustStake();

    ws.send(JSON.stringify({
     buy:1,
     price:stake,
     parameters:{
      amount:stake,
      basis:"stake",
      contract_type:decision,
      currency:"USD",
      duration:5,
      duration_unit:"t",
      symbol:SYMBOL
     }
    }));

    log("📊 "+decision+" $"+stake);
    lastTrade=now;
   }
  }

  if(d.buy){
   ws.send(JSON.stringify({
    proposal_open_contract:1,
    contract_id:d.buy.contract_id,
    subscribe:1
   }));
  }

  if(d.proposal_open_contract && d.proposal_open_contract.is_sold){
   let pnl=parseFloat(d.proposal_open_contract.profit);

   profit+=pnl;
   total++;

   if(pnl>0){
    wins++;
    winStreak++;
    lossStreak=0;
    log("✅ +"+pnl);
   } else {
    lossStreak++;
    winStreak=0;
    log("❌ "+pnl);
   }

   updateUI();

   if(profit <= -(balance*0.03)){
    log("🛑 STOP LOSS");
    stopBot();
   }
  }
 };
}

function stopBot(){
 if(ws) ws.close();
 running=false;
 document.getElementById("status").innerText="🔴 OFF";
 log("Bot detenido");
}
</script>

</body>
</html>
