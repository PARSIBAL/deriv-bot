<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT APEX v7 — ULTIMATE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Oxanium:wght@300;400;600;800&display=swap');

:root {
  --g1: #00ffe0;
  --g2: #00b4d8;
  --red: #ff4757;
  --gold: #feca57;
  --win: #2ed573;
  --orange: #ff9f43;
  --bg0: #04080f;
  --bg1: #080f1a;
  --bg2: #0d1626;
  --border: rgba(0,255,224,0.1);
  --dim: #3d5a72;
}

*{box-sizing:border-box;margin:0;padding:0;}

body {
  background:var(--bg0);
  font-family:'Rajdhani',sans-serif;
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:16px;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% 0%,rgba(0,180,216,.06) 0%,transparent 70%),
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,255,224,.015) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,255,224,.015) 40px);
}

.wrap{width:100%;max-width:440px;}

/* HEADER */
.hdr{
  background:var(--bg1);
  border:1px solid var(--border);
  border-radius:18px 18px 0 0;
  padding:18px 22px 14px;
  position:relative;overflow:hidden;
}
.hdr::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--g2) 30%,var(--g1) 70%,transparent);
}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;}
.brand{font-family:'Oxanium',monospace;}
.brand-name{font-size:22px;font-weight:800;color:#fff;letter-spacing:4px;}
.brand-sub{font-size:9px;color:var(--dim);letter-spacing:3px;margin-top:1px;}

.badge{
  font-family:'Oxanium',monospace;font-size:9px;
  letter-spacing:2px;padding:4px 10px;
  border-radius:20px;border:1px solid var(--dim);
  color:var(--dim);transition:all .4s;
}
.badge.live{border-color:var(--win);color:var(--win);box-shadow:0 0 12px rgba(46,213,115,.25);animation:glow 2s ease-in-out infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(46,213,115,.2);}50%{box-shadow:0 0 18px rgba(46,213,115,.5);}}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:currentColor;margin-right:5px;vertical-align:middle;}
.badge.live .dot{animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* HORARIO BADGE */
.time-badge{
  margin-top:10px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(254,202,87,.05);
  border:1px solid rgba(254,202,87,.2);
  border-radius:8px;padding:7px 12px;
}
.time-badge-left{font-size:9px;color:var(--dim);letter-spacing:1px;}
.time-badge-val{font-family:'Oxanium',monospace;font-size:12px;color:var(--gold);}
.session-pill{
  font-size:8px;letter-spacing:1px;padding:2px 8px;
  border-radius:10px;border:1px solid var(--dim);color:var(--dim);
  transition:all .3s;
}
.session-pill.hot{border-color:var(--win);color:var(--win);background:rgba(46,213,115,.08);}
.session-pill.warm{border-color:var(--orange);color:var(--orange);background:rgba(255,159,67,.08);}
.session-pill.cold{border-color:var(--red);color:var(--red);background:rgba(255,71,87,.08);}

/* CONFIANZA */
.conf-row{margin-top:10px;display:flex;align-items:center;gap:10px;}
.conf-label{font-size:10px;color:var(--dim);letter-spacing:1px;width:80px;}
.conf-track{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.conf-fill{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,var(--g2),var(--g1));transition:width .6s ease,background .4s;}
.conf-pct{font-family:'Oxanium',monospace;font-size:11px;color:var(--g1);width:32px;text-align:right;}

/* CONTROLS */
.controls{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  background:var(--bg1);
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  padding:12px 16px;
}
.btn{font-family:'Oxanium',monospace;font-size:12px;font-weight:700;letter-spacing:2px;padding:12px;border:none;border-radius:10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.08);opacity:0;transition:opacity .2s;}
.btn:hover::after{opacity:1;} .btn:active{transform:scale(.97);}
.btn-go{background:linear-gradient(135deg,#00b09b,#00ffe0);color:#000;}
.btn-go:hover{box-shadow:0 4px 24px rgba(0,255,224,.35);}
.btn-no{background:linear-gradient(135deg,#b91c1c,#ff4757);color:#fff;}
.btn-no:hover{box-shadow:0 4px 24px rgba(255,71,87,.35);}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-left:1px solid var(--border);border-right:1px solid var(--border);}
.stat{background:var(--bg1);padding:14px 18px;}
.stat-lbl{font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.stat-val{font-family:'Oxanium',monospace;font-size:22px;font-weight:800;color:#fff;transition:color .3s;}
.stat-val.up{color:var(--win);} .stat-val.down{color:var(--red);}
.stat-val.cyan{color:var(--g1);} .stat-val.gold{color:var(--gold);}

/* HISTORIAL */
.sessions{background:var(--bg1);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:10px 18px;display:flex;gap:4px;align-items:center;}
.sess-lbl{font-size:9px;color:var(--dim);letter-spacing:1px;margin-right:6px;}
.sess-dot{width:8px;height:8px;border-radius:2px;background:var(--bg2);border:1px solid var(--dim);transition:all .3s;}
.sess-dot.w{background:var(--win);border-color:var(--win);box-shadow:0 0 4px var(--win);}
.sess-dot.l{background:var(--red);border-color:var(--red);}

/* MODO */
.mode-row{background:var(--bg1);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:7px 18px;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--dim);}
.mode-chip{font-family:'Oxanium',monospace;font-size:9px;letter-spacing:1px;padding:3px 9px;border-radius:5px;background:rgba(0,180,216,.1);color:var(--g2);border:1px solid rgba(0,180,216,.2);transition:all .3s;}
.mode-chip.act{background:rgba(0,255,224,.1);color:var(--g1);border-color:rgba(0,255,224,.3);box-shadow:0 0 8px rgba(0,255,224,.15);}
.mode-chip.inv{background:rgba(255,71,87,.08);color:var(--red);border-color:rgba(255,71,87,.2);}
.mode-chip.wait{background:rgba(254,202,87,.08);color:var(--gold);border-color:rgba(254,202,87,.2);}

/* FILTROS */
.filters{background:var(--bg2);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:10px 18px;display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.flt{text-align:center;padding:6px 2px;border-radius:8px;border:1px solid var(--dim);transition:all .3s;}
.flt.ok{border-color:var(--win);background:rgba(46,213,115,.07);}
.flt.fail{border-color:var(--red);background:rgba(255,71,87,.07);}
.flt-icon{font-size:13px;}
.flt-name{font-size:7px;color:var(--dim);letter-spacing:.5px;margin-top:2px;}
.flt.ok .flt-name{color:var(--win);} .flt.fail .flt-name{color:var(--red);}

/* CONTADOR */
.inv-bar{background:var(--bg2);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:8px 18px;display:flex;justify-content:space-between;align-items:center;font-size:9px;color:var(--dim);letter-spacing:1px;}
.inv-count{font-family:'Oxanium',monospace;font-size:13px;color:var(--gold);}

/* LOG */
.log-wrap{background:var(--bg1);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:12px 14px;}
.log{background:#020609;border:1px solid rgba(0,255,224,.07);border-radius:10px;height:185px;overflow-y:auto;padding:10px 12px;font-size:10px;line-height:1.8;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.log::-webkit-scrollbar{width:3px;}
.log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.le{display:flex;gap:6px;}
.lt{color:var(--dim);font-size:9px;flex-shrink:0;}
.lw{color:var(--win);} .ll{color:var(--red);}
.li{color:var(--g2);}  .lx{color:var(--gold);}
.ls{color:var(--red);font-weight:700;} .linv{color:#4a5568;font-style:italic;}

/* FOOTER */
.ftr{background:var(--bg1);border:1px solid var(--border);border-top:none;border-radius:0 0 18px 18px;padding:9px 18px 12px;display:flex;justify-content:space-between;font-size:9px;color:var(--dim);letter-spacing:1px;}

.spin{display:inline-block;width:8px;height:8px;border:1.5px solid transparent;border-top-color:var(--g1);border-radius:50%;animation:sp 1s linear infinite;margin-right:4px;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="hdr-top">
      <div class="brand">
        <div class="brand-name">⚡ BOT APEX</div>
        <div class="brand-sub">R_50 ULTIMATE — v7.0 · SIN SNIPER</div>
      </div>
      <div class="badge" id="badge"><span class="dot"></span><span id="badgeText">OFFLINE</span></div>
    </div>

    <!-- HORARIO INTELIGENTE -->
    <div class="time-badge">
      <div>
        <div class="time-badge-left">COLOMBIA</div>
        <div class="time-badge-val" id="gmtTime">--:--</div>
      </div>
      <div>
        <div class="time-badge-left">SESIÓN</div>
        <div class="time-badge-val" id="sessionName">--</div>

  <div class="controls">
    <button class="btn btn-go" onclick="startBot()">▶ INICIAR</button>

  </div>

  <div class="stats">
    <div class="stat"><div class="stat-lbl">💰 Balance</div><div class="stat-val cyan" id="balance">0.00</div></div>
    <div class="stat"><div class="stat-lbl">📈 Ganancia</div><div class="stat-val" id="profit">+0.00</div></div>
    <div class="stat"><div class="stat-lbl">🎯 Stake</div><div class="stat-val gold" id="stake">0.35</div></div>
    <div class="stat"><div class="stat-lbl">🏆 Winrate</div><div class="stat-val" id="wr">0%</div></div>
  </div>

  <div class="sessions">
    <span class="sess-lbl">ÚLTIMAS</span>
    <div id="sessDots"></div>
  </div>

  <div class="mode-row">
    <span id="modeInfo">Esperando...</span>
    <span class="mode-chip" id="modeChip">IDLE</span>
  </div>

  <div class="filters">
    <div class="flt" id="flt-vol">  <div class="flt-icon">📊</div><div class="flt-name">VOLAT</div></div>
    <div class="flt" id="flt-z">    <div class="flt-icon">📐</div><div class="flt-name">Z-SCORE</div></div>
    <div class="flt" id="flt-slope"><div class="flt-icon">📉</div><div class="flt-name">SLOPE</div></div>
    <div class="flt" id="flt-rsi">  <div class="flt-icon">⚖️</div><div class="flt-name">RSI</div></div>
    <div class="flt" id="flt-ema">  <div class="flt-icon">〽️</div><div class="flt-name">EMA</div></div>
  </div>

  <div class="inv-bar">
    <span>🚫 INVALIDADAS</span>
    <span class="inv-count" id="invCount">0</span>
    <span>✅ EJECUTADAS</span>
    <span class="inv-count" id="totalCount">0</span>
  </div>

  <div class="log-wrap">
    <div class="log" id="log"></div>
  </div>

  <div class="ftr">
    <span>SL 3% · TP 6%</span>
    <span>HORARIO INTELIGENTE</span>
    <span>$100 USD</span>
  </div>

</div>
<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const TOKEN  = "e1lRgxNoxWwBkzx";
const SYMBOL = "R_50";

const CFG = {
  // Parámetros R_50 calibrados con comportamiento v3 exitoso
  VOL_MIN:  0.004,   // std mínimo observado en sesiones ganadoras
  VOL_MAX:  0.016,   // std máximo observado en sesiones ganadoras
  Z_MIN:    1.65,    // umbral Z conservador
  RSI_HI:   62,
  RSI_LO:   38,
  COOLDOWN: 20000,   // 20s entre operaciones (igual que v3)
  PAUSE_MS: 90000,   // pausa tras racha negativa
  MIN_BARS: 30,
  HISTORY:  55,
};

// ══════════════════════════════════════════════
// HORARIO INTELIGENTE — COLOMBIA (GMT-5)
// 🟢 ÓPTIMA:  1:00AM–7:00AM  y  1:00PM–7:00PM
// 🟡 NORMAL:  7:00AM–10:00AM y  8:00PM–1:00AM
// 🔴 BAJA:   10:00AM–1:00PM  y  7:00PM–8:00PM
// ══════════════════════════════════════════════
function getSession() {
  const now = new Date();
  const col = new Date(now.getTime() - 5 * 60 * 60 * 1000);
  const h = col.getUTCHours();
  const m = col.getUTCMinutes();
  const dec = h + m/60;

  // 🟢 ÓPTIMA: 1:00AM–7:00AM y 1:00PM–7:00PM
  if ((dec >= 1 && dec < 7) || (dec >= 13 && dec < 19))
    return { name:"ÓPTIMA", level:"hot",  trade:true,  z:1.65 };

  // 🟡 NORMAL: 7:00AM–10:00AM y 8:00PM–1:00AM
  if ((dec >= 7 && dec < 10) || (dec >= 20 && dec < 24) || dec < 1)
    return { name:"NORMAL", level:"warm", trade:true,  z:1.80 };

  // 🔴 BAJA: 10:00AM–1:00PM y 7:00PM–8:00PM
  return   { name:"BAJA",   level:"cold", trade:false, z:99   };
}

// ══════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════
let ws;
let balance=0, initialBalance=0, stake=0.35;
let running=false, wins=0, total=0, profit=0;
let winStreak=0, lossStreak=0;
let lastTrade=0, pauseUntil=0;
let prices=[], recentResults=[], invalidated=0;

// ══════════════════════════════════════════════
// LOG
// ══════════════════════════════════════════════
function log(msg,type="i"){
  const el=document.getElementById("log");
  const t=new Date().toTimeString().slice(0,8);
  const cls={w:"lw",l:"ll",i:"li",x:"lx",s:"ls",inv:"linv"}[type]||"li";
  el.innerHTML+=`<div class="le"><span class="lt">${t}</span><span class="${cls}">${msg}</span></div>`;
  el.scrollTop=el.scrollHeight;
}

// ══════════════════════════════════════════════
// MATEMÁTICAS
// ══════════════════════════════════════════════
function getStats(arr){
  const n=arr.length;
  const mean=arr.reduce((a,b)=>a+b,0)/n;
  const std=Math.sqrt(arr.map(x=>(x-mean)**2).reduce((a,b)=>a+b,0)/n);
  return {mean,std};
}

function calcRSI(p,period=14){
  if(p.length<period+1) return 50;
  let g=0,l=0;
  for(let i=p.length-period;i<p.length;i++){
    const d=p[i]-p[i-1];
    if(d>0) g+=d; else l+=Math.abs(d);
  }
  if(l===0) return 100;
  return 100-(100/(1+(g/period)/(l/period)));
}

function calcEMA(p,period){
  const k=2/(period+1);
  let e=p[0];
  for(let i=1;i<p.length;i++) e=p[i]*k+e*(1-k);
  return e;
}

function calcSlope(arr){
  const n=arr.length;
  const xm=(n-1)/2;
  const ym=arr.reduce((a,b)=>a+b,0)/n;
  let num=0,den=0;
  for(let i=0;i<n;i++){num+=(i-xm)*(arr[i]-ym);den+=(i-xm)**2;}
  return den===0?0:num/den;
}

// ══════════════════════════════════════════════
// SEÑAL — 5 filtros + umbral dinámico por sesión
// ══════════════════════════════════════════════
function getSignal(zThresh){
  if(prices.length<CFG.MIN_BARS) return null;

  const rets=[];
  for(let i=1;i<prices.length;i++) rets.push(prices[i]-prices[i-1]);
  const {mean,std}=getStats(rets);
  const last=rets[rets.length-1];
  const z=std>0?(last-mean)/std:0;

  const f1 = std>=CFG.VOL_MIN && std<=CFG.VOL_MAX;
  const f2 = Math.abs(z)>=zThresh;

  const s8  = calcSlope(prices.slice(-8));
  const s15 = calcSlope(prices.slice(-15));
  const dir = z>0?1:-1;
  const f3  = Math.sign(s8)===dir && Math.sign(s15)===dir;

  const rsiVal=calcRSI(prices);
  const f4 = z>0 ? rsiVal<CFG.RSI_HI : rsiVal>CFG.RSI_LO;

  const e5  = calcEMA(prices.slice(-6),  5);
  const e20 = calcEMA(prices.slice(-21), 20);
  const f5  = z>0 ? e5>e20 : e5<e20;

  const passed=[f1,f2,f3,f4,f5].filter(Boolean).length;
  const conf=Math.round((passed/5)*100);

  setFilter("flt-vol",   f1);
  setFilter("flt-z",     f2);
  setFilter("flt-slope", f3);
  setFilter("flt-rsi",   f4);
  setFilter("flt-ema",   f5);
  updateConf(conf);

  if(!f1||!f2||!f3||!f4||!f5){
    const failed=[];
    if(!f1) failed.push(`vol:${std.toFixed(5)}`);
    if(!f2) failed.push(`z:${z.toFixed(2)}`);
    if(!f3) failed.push("slope");
    if(!f4) failed.push(`rsi:${rsiVal.toFixed(1)}`);
    if(!f5) failed.push("ema");
    invalidated++;
    document.getElementById("invCount").innerText=invalidated;
    if(passed>=4) log(`— invalidado [${failed.join(",")}]`,"inv");
    return null;
  }

  return {signal:z>0?"CALL":"PUT", z:z.toFixed(2), std:std.toFixed(5), rsi:rsiVal.toFixed(1), conf};
}

// ══════════════════════════════════════════════
// STAKE
// ══════════════════════════════════════════════
function adjustStake(){
  let risk=0.003;
  if(lossStreak>=2) risk=0.002;
  if(winStreak>=4)  risk=0.004;
  let c=balance*risk;
  if(c>1)    c=1;
  if(c<0.35) c=0.35;
  stake=Math.floor(c*100)/100;
}

// ══════════════════════════════════════════════
// TICK
// ══════════════════════════════════════════════
function onTick(){
  const now=Date.now();

  // Actualizar reloj GMT y sesión
  updateClock();

  if(now<pauseUntil){
    const s=Math.ceil((pauseUntil-now)/1000);
    setMode(`⏸ Pausa — ${s}s`,false,"inv");
    return;
  }

  // Verificar sesión
  const session=getSession();
  if(!session.trade){
    setMode("🌙 Sesión baja — esperando horario óptimo",false,"wait");
    return;
  }

  if(now-lastTrade<CFG.COOLDOWN) return;
  if(prices.length<CFG.MIN_BARS){
    setMode("Acumulando datos R_50...",false,"");
    return;
  }

  // Z-score dinámico según sesión
  const result=getSignal(session.z);

  if(!result){
    setMode(`R_50 [${session.name}] — entrada invalidada`,false,"inv");
    updateUI();
    return;
  }

  const {signal,z,std,rsi,conf}=result;
  adjustStake();

  ws.send(JSON.stringify({
    buy:1, price:stake,
    parameters:{
      amount:stake, basis:"stake",
      contract_type:signal, currency:"USD",
      duration:5, duration_unit:"t", symbol:SYMBOL
    }
  }));

  log(`${signal} $${stake} | z:${z} std:${std} RSI:${rsi} [${session.name}] conf:${conf}%`,"i");
  setMode(`${signal} — conf. ${conf}% [${session.name}]`,true,"");
  lastTrade=now;
  updateUI();
}

// ══════════════════════════════════════════════
// RESULTADO
// ══════════════════════════════════════════════
function onResult(pnl){
  profit+=pnl; total++;
  document.getElementById("totalCount").innerText=total;

  if(pnl>0){
    wins++;winStreak++;lossStreak=0;
    recentResults.push("w");
    log(`✅ WIN  +${pnl.toFixed(2)} USD`,"w");
  } else {
    lossStreak++;winStreak=0;
    recentResults.push("l");
    log(`❌ LOSS  ${pnl.toFixed(2)} USD`,"l");
  }

  if(recentResults.length>15) recentResults.shift();
  renderDots(); updateUI();

  if(lossStreak>=3){
    pauseUntil=Date.now()+CFG.PAUSE_MS;
    log("⏸ Pausa 90s — racha negativa","x");
  }

  if(profit<=-(initialBalance*0.03)){ log("🛑 STOP LOSS","s"); stopBot(); return; }
  if(profit>=(initialBalance*0.06)){  log("🎯 TAKE PROFIT","w"); stopBot(); return; }
}

// ══════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════
function updateUI(){
  const wr=total?(wins/total*100).toFixed(1):0;
  document.getElementById("balance").innerText=balance.toFixed(2);
  const pe=document.getElementById("profit");
  pe.innerText=(profit>=0?"+":"")+profit.toFixed(2);
  pe.className="stat-val"+(profit>0?" up":profit<0?" down":"");
  document.getElementById("stake").innerText=stake.toFixed(2);
  const we=document.getElementById("wr");
  we.innerText=wr+"%";
  we.className="stat-val"+(wr>=75?" up":wr>=52.6?" gold":"");
}

function updateClock(){
  const now=new Date();
  const col=new Date(now.getTime()-5*60*60*1000);
  const rawH=col.getUTCHours();
  const mm=String(col.getUTCMinutes()).padStart(2,"0");
  const ampm=rawH<12?"AM":"PM";
  const h12=rawH%12||12;
  document.getElementById("gmtTime").innerText=`${h12}:${mm} ${ampm}`;
  const s=getSession();
  document.getElementById("sessionName").innerText=s.name;
  const pill=document.getElementById("sessionPill");
  pill.className="session-pill "+s.level;
  pill.innerText=s.level==="hot"?"🟢 OPERAR":s.level==="warm"?"🟡 CUIDADO":"🔴 ESPERAR";
}

function setMode(txt,active,type){
  document.getElementById("modeInfo").innerHTML=(active?`<span class="spin"></span>`:"")+txt;
  const c=document.getElementById("modeChip");
  c.className="mode-chip"+(active?" act":type==="inv"?" inv":type==="wait"?" wait":"");
  c.innerText=active?"ACTIVO":type==="inv"?"INVÁLIDO":type==="wait"?"ESPERA":"SCAN";
}

function setFilter(id,ok){
  document.getElementById(id).className="flt"+(ok?" ok":" fail");
}

function updateConf(pct){
  document.getElementById("confBar").style.width=pct+"%";
  document.getElementById("confPct").innerText=pct+"%";
  document.getElementById("confBar").style.background=
    pct>=80?"linear-gradient(90deg,#00b09b,#00ffe0)":
    pct>=60?"linear-gradient(90deg,#f7971e,#ffd200)":
             "linear-gradient(90deg,#ff4757,#c0392b)";
}

function renderDots(){
  document.getElementById("sessDots").innerHTML=
    recentResults.map(r=>`<div class="sess-dot ${r}"></div>`).join("");
}

// Actualizar reloj cada segundo aunque no haya ticks
setInterval(updateClock, 1000);

// ══════════════════════════════════════════════
// WEBSOCKET
// ══════════════════════════════════════════════
function startBot(){
  if(running) return;

  wins=0;total=0;profit=0;
  winStreak=0;lossStreak=0;
  lastTrade=0;pauseUntil=0;
  prices=[];recentResults=[];invalidated=0;
  document.getElementById("invCount").innerText="0";
  document.getElementById("totalCount").innerText="0";
  renderDots(); updateConf(0); updateClock();

  ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");
  ws.onopen=()=>ws.send(JSON.stringify({authorize:TOKEN}));

  ws.onmessage=(e)=>{
    const d=JSON.parse(e.data);

    if(d.authorize){
      running=true;
      initialBalance=d.authorize.balance;
      balance=initialBalance;
      document.getElementById("badge").className="badge live";
      document.getElementById("badgeText").innerText="ONLINE";
      const s=getSession();
      log(`🔐 Conectado · $${balance.toFixed(2)} · Sesión: ${s.name}`,"i");
      if(!s.trade) log("⚠ Horario no óptimo, esperando sesión activa","x");
      ws.send(JSON.stringify({ticks:SYMBOL,subscribe:1}));
      ws.send(JSON.stringify({balance:1}));
      updateUI();
    }

    if(d.balance){balance=d.balance.balance;updateUI();}

    if(d.tick && d.tick.symbol===SYMBOL){
      prices.push(d.tick.quote);
      if(prices.length>CFG.HISTORY) prices.shift();
      if(running) onTick();
    }

    if(d.buy){
      ws.send(JSON.stringify({
        proposal_open_contract:1,
        contract_id:d.buy.contract_id,
        subscribe:1
      }));
    }

    if(d.proposal_open_contract && d.proposal_open_contract.is_sold)
      onResult(parseFloat(d.proposal_open_contract.profit));

    if(d.error) log(`⚠ ${d.error.message}`,"x");
  };

  ws.onerror=()=>log("❌ Error WebSocket","s");
  ws.onclose=()=>{
    if(running){
      running=false;
      document.getElementById("badge").className="badge";
      document.getElementById("badgeText").innerText="OFFLINE";
      log("🔌 Desconectado","x");
    }
  };
}

function stopBot(){
  if(ws) ws.close();
  running=false;
  document.getElementById("badge").className="badge";
  document.getElementById("badgeText").innerText="OFFLINE";
  setMode("Detenido",false,"");
  updateConf(0);updateUI();
  log("⏹ Bot detenido","x");
}
</script>
</body>
