<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT APEX v4 — PRECISION MODE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Oxanium:wght@300;400;600;800&display=swap');

:root {
  --g1: #00ffe0;
  --g2: #00b4d8;
  --red: #ff4757;
  --gold: #feca57;
  --win: #2ed573;
  --bg0: #04080f;
  --bg1: #080f1a;
  --bg2: #0d1626;
  --border: rgba(0,255,224,0.1);
  --dim: #3d5a72;
  --text: #a8c0cc;
}

*{box-sizing:border-box;margin:0;padding:0;}

body {
  background: var(--bg0);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(0,180,216,0.06) 0%, transparent 70%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,255,224,0.015) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,255,224,0.015) 40px);
}

.wrap {
  width: 100%;
  max-width: 440px;
}

/* ── HEADER ── */
.hdr {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 18px 18px 0 0;
  padding: 18px 22px 14px;
  position: relative;
  overflow: hidden;
}

.hdr::before {
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background: linear-gradient(90deg, transparent 0%, var(--g2) 30%, var(--g1) 70%, transparent 100%);
}

.hdr-top { display:flex; justify-content:space-between; align-items:flex-start; }

.brand { font-family:'Oxanium',monospace; }
.brand-name { font-size:22px; font-weight:800; color:#fff; letter-spacing:4px; }
.brand-sub { font-size:9px; color:var(--dim); letter-spacing:3px; margin-top:1px; }

.badge {
  font-family:'Oxanium',monospace;
  font-size:9px;
  letter-spacing:2px;
  padding:4px 10px;
  border-radius:20px;
  border:1px solid var(--dim);
  color:var(--dim);
  transition:all .4s;
}
.badge.live {
  border-color:var(--win);
  color:var(--win);
  box-shadow:0 0 12px rgba(46,213,115,.25);
  animation:glow 2s ease-in-out infinite;
}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(46,213,115,.2);}50%{box-shadow:0 0 18px rgba(46,213,115,.5);}}

.dot {
  display:inline-block;
  width:5px;height:5px;
  border-radius:50%;
  background:currentColor;
  margin-right:5px;
  vertical-align:middle;
}
.badge.live .dot { animation:blink 1s infinite; }
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* confidence meter */
.conf-row { margin-top:12px; display:flex; align-items:center; gap:10px; }
.conf-label { font-size:10px; color:var(--dim); letter-spacing:1px; width:80px; }
.conf-track {
  flex:1; height:4px;
  background:rgba(255,255,255,.06);
  border-radius:2px;
  overflow:hidden;
}
.conf-fill {
  height:100%;
  width:0%;
  border-radius:2px;
  background:linear-gradient(90deg,var(--g2),var(--g1));
  transition:width .6s ease, background .4s;
}
.conf-pct { font-family:'Oxanium',monospace; font-size:11px; color:var(--g1); width:32px; text-align:right; }

/* ── CONTROLS ── */
.controls {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  background:var(--bg1);
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  padding:12px 16px;
}

.btn {
  font-family:'Oxanium',monospace;
  font-size:12px;
  font-weight:700;
  letter-spacing:2px;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.btn::after {
  content:'';
  position:absolute;
  inset:0;
  background:rgba(255,255,255,.08);
  opacity:0;
  transition:opacity .2s;
}
.btn:hover::after{opacity:1;}
.btn:active{transform:scale(.97);}

.btn-go { background:linear-gradient(135deg,#00b09b,#00ffe0); color:#000; }
.btn-go:hover { box-shadow:0 4px 24px rgba(0,255,224,.35); }
.btn-no { background:linear-gradient(135deg,#b91c1c,#ff4757); color:#fff; }
.btn-no:hover { box-shadow:0 4px 24px rgba(255,71,87,.35); }

/* ── STATS ── */
.stats {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--border);
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
}

.stat {
  background:var(--bg1);
  padding:14px 18px;
  position:relative;
  overflow:hidden;
}
.stat::after {
  content:'';
  position:absolute;
  bottom:0;left:0;
  width:100%;height:1px;
  background:var(--border);
}

.stat-lbl { font-size:9px; color:var(--dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
.stat-val {
  font-family:'Oxanium',monospace;
  font-size:22px;
  font-weight:800;
  color:#fff;
  transition:color .3s, transform .2s;
}
.stat-val.up   { color:var(--win); }
.stat-val.down { color:var(--red); }
.stat-val.cyan { color:var(--g1); }
.stat-val.gold { color:var(--gold); }
.stat-val.bump { animation:bump .3s ease; }
@keyframes bump{0%{transform:scale(1.12);}100%{transform:scale(1);}}

/* sessions strip */
.sessions {
  background:var(--bg1);
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  padding:10px 18px;
  display:flex;
  gap:4px;
  align-items:center;
}
.sess-lbl { font-size:9px; color:var(--dim); letter-spacing:1px; margin-right:6px; }
.sess-dot {
  width:8px;height:8px;
  border-radius:2px;
  background:var(--bg2);
  border:1px solid var(--dim);
  transition:all .3s;
}
.sess-dot.w { background:var(--win); border-color:var(--win); box-shadow:0 0 4px var(--win); }
.sess-dot.l { background:var(--red); border-color:var(--red); }

/* ── MARKET / MODE BAR ── */
.mkt-bar {
  background:var(--bg1);
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  padding:9px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.mkt-pills { display:flex; gap:6px; }
.pill {
  padding:3px 11px;
  border-radius:10px;
  border:1px solid var(--dim);
  color:var(--dim);
  font-size:10px;
  font-family:'Oxanium',monospace;
  transition:all .35s;
}
.pill.hot {
  border-color:var(--gold);
  color:var(--gold);
  box-shadow:0 0 10px rgba(254,202,87,.2);
}

.mode-row {
  background:var(--bg1);
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  padding:7px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:10px;
  color:var(--dim);
}
.mode-chip {
  font-family:'Oxanium',monospace;
  font-size:9px;
  letter-spacing:1px;
  padding:3px 9px;
  border-radius:5px;
  background:rgba(0,180,216,.1);
  color:var(--g2);
  border:1px solid rgba(0,180,216,.2);
  transition:all .3s;
}
.mode-chip.act {
  background:rgba(0,255,224,.1);
  color:var(--g1);
  border-color:rgba(0,255,224,.3);
  box-shadow:0 0 8px rgba(0,255,224,.15);
}

/* ── FILTERS VISUAL ── */
.filters {
  background:var(--bg2);
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  padding:10px 18px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}
.flt {
  text-align:center;
  padding:6px 4px;
  border-radius:8px;
  border:1px solid var(--dim);
  transition:all .3s;
}
.flt.ok { border-color:var(--win); background:rgba(46,213,115,.07); }
.flt.fail { border-color:var(--red); background:rgba(255,71,87,.07); }
.flt-icon { font-size:14px; }
.flt-name { font-size:8px; color:var(--dim); letter-spacing:1px; margin-top:2px; }
.flt.ok .flt-name { color:var(--win); }
.flt.fail .flt-name { color:var(--red); }

/* ── LOG ── */
.log-wrap {
  background:var(--bg1);
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  padding:12px 14px;
}
.log {
  background:#020609;
  border:1px solid rgba(0,255,224,.07);
  border-radius:10px;
  height:190px;
  overflow-y:auto;
  padding:10px 12px;
  font-size:10px;
  line-height:1.8;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.log::-webkit-scrollbar{width:3px;}
.log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.le { display:flex; gap:6px; }
.lt { color:var(--dim); font-size:9px; flex-shrink:0; padding-top:1px; }
.lw { color:var(--win); }
.ll { color:var(--red); }
.li { color:var(--g2); }
.lx { color:var(--gold); }
.ls { color:var(--red); font-weight:700; }

/* ── FOOTER ── */
.ftr {
  background:var(--bg1);
  border:1px solid var(--border);
  border-top:none;
  border-radius:0 0 18px 18px;
  padding:9px 18px 12px;
  display:flex;
  justify-content:space-between;
  font-size:9px;
  color:var(--dim);
  letter-spacing:1px;
}

/* ── SCAN RING ── */
.scan-ring {
  width:10px;height:10px;
  border-radius:50%;
  border:2px solid transparent;
  border-top-color:var(--g1);
  display:inline-block;
  animation:spin 1s linear infinite;
  margin-right:4px;
  vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="brand">
        <div class="brand-name">⚡ BOT APEX</div>
        <div class="brand-sub">PRECISION MODE — v4.0 · SIN SNIPER</div>

      <div class="badge" id="badge"><span class="dot"></span><span id="badgeText">OFFLINE</span></div>

    <span style="font-size:9px;color:var(--dim);letter-spacing:1px;">MERCADOS</span>
    <div class="mkt-pills">
      <div class="pill" id="pill-R_25">R_25</div>
      <div class="pill" id="pill-R_50">R_50</div>

    </div>

  <!-- MODO -->
  <div class="mode-row">
    <span id="modeInfo"><span class="scan-ring" style="display:none" id="scanRing"></span>Esperando...</span>

  <!-- FILTROS VISUALES -->
  <div class="filters">

      <div class="flt-icon">📉</div>
      <div class="flt-name">TENDENCIA</div>
    </div>
    <div class="flt" id="flt-rsi">
      <div class="flt-icon">⚖️</div>
      <div class="flt-name">RSI</div>

  <!-- LOG -->
  <div class="log-wrap">
    <div class="log" id="log"></div>

  <!-- FOOTER -->
  <div class="ftr">
    <span>SL 3% · TP 6%</span>
    <span>4 FILTROS · PAUSA AUTO</span>
    <span>$100 USD</span>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const TOKEN   = "e1lRgxNoxWwBkzx";
const MARKETS = ["R_25","R_50","R_75"];

// ══════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════
let ws;
let balance = 0, initialBalance = 0, stake = 0.35;
let running = false;
let wins = 0, total = 0, profit = 0;
let winStreak = 0, lossStreak = 0;
let lastTrade = 0, pauseUntil = 0;
let activeMarket = null;
let histories = { R_25:[], R_50:[], R_75:[] };
let recentResults = []; // últimas 15 operaciones para el historial visual

// ══════════════════════════════════════════════
// LOG
// ══════════════════════════════════════════════
function log(msg, type="i") {
  const el = document.getElementById("log");
  const t = new Date().toTimeString().slice(0,8);
  const cls = {w:"lw",l:"ll",i:"li",x:"lx",s:"ls"}[type]||"li";
  el.innerHTML += `<div class="le"><span class="lt">${t}</span><span class="${cls}">${msg}</span></div>`;
  el.scrollTop = el.scrollHeight;
}

// ══════════════════════════════════════════════
// HELPERS MATEMÁTICOS
// ══════════════════════════════════════════════
function calcStats(arr) {
  const n = arr.length;
  const mean = arr.reduce((a,b)=>a+b,0)/n;
  const variance = arr.map(x=>(x-mean)**2).reduce((a,b)=>a+b,0)/n;
  const std = Math.sqrt(variance);
  return { mean, std, variance };
}

// RSI simplificado (14 períodos)
function calcRSI(prices, period=14) {
  if (prices.length < period+1) return 50;
  let gains=0, losses=0;
  for (let i=prices.length-period; i<prices.length; i++) {
    const d = prices[i]-prices[i-1];
    if (d>0) gains+=d; else losses+=Math.abs(d);
  }
  if (losses===0) return 100;
  const rs = (gains/period)/(losses/period);
  return 100-(100/(1+rs));
}

// EMA rápida
function calcEMA(prices, period) {
  const k = 2/(period+1);
  let ema = prices[0];
  for (let i=1; i<prices.length; i++) ema = prices[i]*k + ema*(1-k);
  return ema;
}

// Pendiente lineal (regresión simple) para detectar tendencia real
function calcSlope(arr) {
  const n = arr.length;
  const xMean = (n-1)/2;
  const yMean = arr.reduce((a,b)=>a+b,0)/n;
  let num=0, den=0;
  for (let i=0;i<n;i++){
    num+=(i-xMean)*(arr[i]-yMean);
    den+=(i-xMean)**2;
  }
  return den===0 ? 0 : num/den;
}

// ══════════════════════════════════════════════
// SELECCIÓN DEL MEJOR MERCADO
// Escoge el mercado con volatilidad más estable
// y mayor relación señal/ruido
// ══════════════════════════════════════════════
function getBestMarket() {
  let best=null, bestScore=-Infinity;
  for (const m of MARKETS) {
    const p = histories[m];
    if (p.length < 30) continue;
    const rets = [];
    for (let i=1;i<p.length;i++) rets.push(p[i]-p[i-1]);
    const {std} = calcStats(rets);
    if (std < 0.003 || std > 0.018) continue;
    // Score: penaliza extremos, premia centro del rango óptimo
    const mid = (0.003+0.018)/2;
    const score = 1 - Math.abs(std-mid)/mid;
    if (score > bestScore) { bestScore=score; best=m; }
  }
  return best;
}

// ══════════════════════════════════════════════
// MOTOR DE SEÑAL — 4 FILTROS INDEPENDIENTES
// Sin SNIPER. Todos los filtros deben pasar.
// ══════════════════════════════════════════════
function getSignal(prices) {
  const rets = [];
  for (let i=1;i<prices.length;i++) rets.push(prices[i]-prices[i-1]);
  const {mean, std} = calcStats(rets);
  const last = rets[rets.length-1];
  const z = std>0 ? (last-mean)/std : 0;

  // ── FILTRO 1: Volatilidad en rango óptimo
  const f1 = std >= 0.003 && std <= 0.018;

  // ── FILTRO 2: Z-score fuerte (umbral alto = más selectivo)
  const f2 = Math.abs(z) >= 1.7;

  // ── FILTRO 3: Tendencia multi-escala coherente
  // Pendiente corta (8) y media (15) deben ser coherentes con Z
  const slope8  = calcSlope(prices.slice(-8));
  const slope15 = calcSlope(prices.slice(-15));
  const zDir = z > 0 ? 1 : -1;
  const f3 = (Math.sign(slope8)===zDir) && (Math.sign(slope15)===zDir);

  // ── FILTRO 4: RSI confirma
  // CALL → RSI < 60 (no sobrecomprado)
  // PUT  → RSI > 40 (no sobrevendido)
  const rsi = calcRSI(prices);
  const f4 = z>0 ? rsi < 62 : rsi > 38;

  // EMA corta vs larga para confirmación extra
  const ema5  = calcEMA(prices.slice(-5),  5);
  const ema20 = calcEMA(prices.slice(-20), 20);
  const emaOk = z>0 ? ema5>ema20 : ema5<ema20;

  // Puntuación de confianza (0-100)
  const score = [f1,f2,f3,f4,emaOk].filter(Boolean).length;
  const confidence = Math.round((score/5)*100);

  // Actualizar indicadores visuales
  setFilter("flt-vol",   f1);
  setFilter("flt-z",     f2);
  setFilter("flt-trend", f3);
  setFilter("flt-rsi",   f4);
  updateConf(confidence);

  // Necesitamos los 4 filtros principales + EMA para operar
  if (!f1||!f2||!f3||!f4||!emaOk) return null;

  return { signal: z>0?"CALL":"PUT", z:z.toFixed(2), rsi:rsi.toFixed(1), confidence };
}

// ══════════════════════════════════════════════
// STAKE — Conservador, protege los $100
// ══════════════════════════════════════════════
function adjustStake() {
  let risk = 0.003; // base: 0.3% del balance
  if (lossStreak >= 2) risk = 0.002; // reducir tras pérdidas
  if (winStreak  >= 4) risk = 0.004; // crecer muy lento
  let calc = balance * risk;
  if (calc > 1)    calc = 1;
  if (calc < 0.35) calc = 0.35;
  stake = Math.floor(calc*100)/100;
}

// ══════════════════════════════════════════════
// MOTOR PRINCIPAL
// ══════════════════════════════════════════════
function onTick() {
  const now = Date.now();
  if (now < pauseUntil) {
    const s = Math.ceil((pauseUntil-now)/1000);
    setMode(`⏸ Pausa ${s}s`, false);
    return;
  }
  if (now-lastTrade < 22000) return;

  const market = getBestMarket();
  if (!market) { setMode("Buscando mercado óptimo...", false); return; }

  activeMarket = market;
  MARKETS.forEach(m => {
    const el = document.getElementById("pill-"+m);
    el.className = "pill"+(m===market?" hot":"");
  });

  const prices = histories[market];
  if (prices.length < 30) { setMode("Acumulando datos...", false); return; }

  const result = getSignal(prices);

  if (!result) {
    setMode(`${market} — filtrando ruido`, false);
    updateUI();
    return;
  }

  const {signal, z, rsi, confidence} = result;
  adjustStake();

  ws.send(JSON.stringify({
    buy:1,
    price:stake,
    parameters:{
      amount:stake,
      basis:"stake",
      contract_type:signal,
      currency:"USD",
      duration:5,
      duration_unit:"t",
      symbol:market
    }
  }));

  log(`${signal} ${market} $${stake} | z:${z} RSI:${rsi} conf:${confidence}%`, "i");
  setMode(`${signal} en ${market} — conf. ${confidence}%`, true);
  lastTrade = now;
  updateUI();
}

// ══════════════════════════════════════════════
// RESULTADO
// ══════════════════════════════════════════════
function onResult(pnl) {
  profit  += pnl;
  total++;

  if (pnl > 0) {
    wins++; winStreak++; lossStreak=0;
    recentResults.push("w");
    log(`✅ WIN  +${pnl.toFixed(2)} USD`, "w");
  } else {
    lossStreak++; winStreak=0;
    recentResults.push("l");
    log(`❌ LOSS  ${pnl.toFixed(2)} USD`, "l");
  }

  if (recentResults.length > 15) recentResults.shift();
  renderDots();
  updateUI();

  // Pausa 90s tras 3 pérdidas
  if (lossStreak >= 3) {
    pauseUntil = Date.now() + 90000;
    log("⏸ Pausa 90s por racha negativa", "x");
  }

  // Stop Loss: -3% del balance inicial
  if (profit <= -(initialBalance*0.03)) {
    log("🛑 STOP LOSS — sesión cerrada", "s");
    stopBot(); return;
  }

  // Take Profit: +6%
  if (profit >= (initialBalance*0.06)) {
    log("🎯 TAKE PROFIT — sesión cerrada", "w");
    stopBot(); return;
  }
}

// ══════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════
function updateUI() {
  const wr = total ? (wins/total*100).toFixed(1) : 0;

  document.getElementById("balance").innerText = balance.toFixed(2);

  const pe = document.getElementById("profit");
  pe.innerText = (profit>=0?"+":"")+profit.toFixed(2);
  pe.className = "stat-val"+(profit>0?" up":profit<0?" down":"");

  document.getElementById("stake").innerText = stake.toFixed(2);

  const we = document.getElementById("wr");
  we.innerText = wr+"%";
  we.className = "stat-val"+(wr>=75?" up":wr>=52.6?" gold":"");
}

function setMode(txt, active) {
  document.getElementById("modeInfo").innerHTML =
    (active ? `<span class="scan-ring"></span>` : "") + txt;
  const chip = document.getElementById("modeChip");
  chip.className = "mode-chip"+(active?" act":"");
  chip.innerText = active ? "ACTIVO" : "SCAN";
}

function setFilter(id, ok) {
  document.getElementById(id).className = "flt"+(ok?" ok":" fail");
}

function updateConf(pct) {
  document.getElementById("confBar").style.width = pct+"%";
  document.getElementById("confPct").innerText = pct+"%";
  const bar = document.getElementById("confBar");
  bar.style.background = pct >= 80
    ? "linear-gradient(90deg,#00b09b,#00ffe0)"
    : pct >= 60
    ? "linear-gradient(90deg,#f7971e,#ffd200)"
    : "linear-gradient(90deg,#ff4757,#c0392b)";
}

function renderDots() {
  const el = document.getElementById("sessDots");
  el.innerHTML = recentResults.map(r =>
    `<div class="sess-dot ${r}"></div>`
  ).join("");
}

// ══════════════════════════════════════════════
// WEBSOCKET
// ══════════════════════════════════════════════
function startBot() {
  if (running) return;

  // Reset de sesión
  wins=0; total=0; profit=0;
  winStreak=0; lossStreak=0;
  lastTrade=0; pauseUntil=0;
  activeMarket=null; recentResults=[];
  histories={R_25:[],R_50:[],R_75:[]};
  renderDots();

  ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

  ws.onopen = () => ws.send(JSON.stringify({authorize:TOKEN}));

  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);

    if (d.authorize) {
      running=true;
      initialBalance = d.authorize.balance;
      balance = initialBalance;
      const b = document.getElementById("badge");
      b.className="badge live";
      document.getElementById("badgeText").innerText="ONLINE";
      log(`🔐 Conectado — balance: $${balance.toFixed(2)}`, "i");
      MARKETS.forEach(m => ws.send(JSON.stringify({ticks:m, subscribe:1})));
      ws.send(JSON.stringify({balance:1}));
      updateUI();
    }

    if (d.balance) {
      balance = d.balance.balance;
      updateUI();
    }

    if (d.tick) {
      const m = d.tick.symbol;
      if (histories[m] !== undefined) {
        histories[m].push(d.tick.quote);
        if (histories[m].length > 60) histories[m].shift();
      }
      if (running) onTick();
    }

    if (d.buy) {
      ws.send(JSON.stringify({
        proposal_open_contract:1,
        contract_id:d.buy.contract_id,
        subscribe:1
      }));
    }

    if (d.proposal_open_contract && d.proposal_open_contract.is_sold) {
      onResult(parseFloat(d.proposal_open_contract.profit));
    }

    if (d.error) log(`⚠ ${d.error.message}`, "x");
  };

  ws.onerror = () => log("❌ Error WebSocket", "s");
  ws.onclose = () => {
    if (running) {
      running=false;
      document.getElementById("badge").className="badge";
      document.getElementById("badgeText").innerText="OFFLINE";
      log("🔌 Desconectado", "x");
    }
  };
}

function stopBot() {
  if (ws) ws.close();
  running=false;
  activeMarket=null;
  document.getElementById("badge").className="badge";
  document.getElementById("badgeText").innerText="OFFLINE";
  MARKETS.forEach(m => {
    document.getElementById("pill-"+m).className="pill";
  });
  setMode("Detenido", false);
  updateConf(0);
  updateUI();
  log("⏹ Bot detenido", "x");
}
</script>
