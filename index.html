<script>
const APP_ID = 1089;
const TOKEN_DEMO = "e1lRgxNoxWwBkzx";
const TOKEN_REAL = "AQUI_TU_TOKEN_REAL";

let cuentaTipo = "demo";
let ws;
let conectado = false;

let ticks = [];
let ema3 = null;
let ema9 = null;

let wins = 0;
let losses = 0;

let operando = false;

/* ═════════ CONEXIÓN ═════════ */
function conectarDeriv() {
  const token = cuentaTipo === "demo" ? TOKEN_DEMO : TOKEN_REAL;

  ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ authorize: token }));
  };

  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    if (data.msg_type === "authorize") {
      conectado = true;
      suscribirseTicks();
      log("✅ Conectado", "info");
    }

    if (data.msg_type === "tick") {
      manejarTick(data.tick.quote);
    }

    if (data.msg_type === "buy") {
      log("🟢 Entrada ejecutada", "win");

      // Simulación resultado (hasta conectar contract update)
      setTimeout(() => {
        const resultado = Math.random() > 0.45; // 55% win aprox

        if (resultado) {
          wins++;
          log("✅ WIN", "win");
        } else {
          losses++;
          log("❌ LOSS", "loss");
        }

        actualizarStats();
        operando = false;
      }, 4000);
    }
  };
}

/* ═════════ TICKS ═════════ */
function suscribirseTicks() {
  ws.send(JSON.stringify({ ticks: "R_50", subscribe: 1 }));
}

function manejarTick(precio) {
  ticks.push(precio);
  if (ticks.length > 20) ticks.shift();

  calcularEMAs();

  if (!operando) evaluarEntrada();
}

/* ═════════ EMA ═════════ */
function calcularEMA(periodo, prevEMA, precio) {
  const k = 2 / (periodo + 1);
  return prevEMA ? (precio * k + prevEMA * (1 - k)) : precio;
}

function calcularEMAs() {
  const precio = ticks[ticks.length - 1];

  ema3 = calcularEMA(3, ema3, precio);
  ema9 = calcularEMA(9, ema9, precio);
}

/* ═════════ LÓGICA PRO ═════════ */
function evaluarEntrada() {
  if (ticks.length < 10) return;

  const t1 = ticks[ticks.length - 1];
  const t2 = ticks[ticks.length - 2];
  const t3 = ticks[ticks.length - 3];

  const subida = t1 > t2 && t2 > t3;
  const bajada = t1 < t2 && t2 < t3;

  const stake = parseFloat(document.getElementById("inputStake").value);

  // 🟢 CALL
  if (ema3 > ema9 && subida) {
    operando = true;
    comprarCALL(stake);
  }

  // 🔴 PUT
  else if (ema3 < ema9 && bajada) {
    operando = true;
    comprarPUT(stake);
  }
}

/* ═════════ OPERAR ═════════ */
function comprarCALL(stake) {
  ws.send(JSON.stringify({
    buy: 1,
    price: stake,
    parameters: {
      amount: stake,
      basis: "stake",
      contract_type: "CALL",
      currency: "USD",
      duration: 3,
      duration_unit: "t",
      symbol: "R_50"
    }
  }));
}

function comprarPUT(stake) {
  ws.send(JSON.stringify({
    buy: 1,
    price: stake,
    parameters: {
      amount: stake,
      basis: "stake",
      contract_type: "PUT",
      currency: "USD",
      duration: 3,
      duration_unit: "t",
      symbol: "R_50"
    }
  }));
}

/* ═════════ UI STATS ═════════ */
function actualizarStats() {
  document.getElementById("rWins").innerText = wins;
  document.getElementById("rLosses").innerText = losses;
}

/* ═════════ LOG ═════════ */
function log(msg, tipo="info") {
  const logBox = document.querySelector(".log");
  if (!logBox) return;

  const div = document.createElement("div");
  div.className = "le";

  const time = new Date().toLocaleTimeString();

  div.innerHTML = `
    <div class="lt">${time}</div>
    <div class="l${tipo}">${msg}</div>
  `;

  logBox.appendChild(div);
  logBox.scrollTop = logBox.scrollHeight;
}

/* ═════════ START ═════════ */
function launchBot() {
  conectarDeriv();
}
</script>
