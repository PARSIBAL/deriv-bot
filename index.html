<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT APEX v17 — OPTIMIZADO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;800&display=swap');

:root {
  --g1: #00ffe0;
  --g2: #00b4d8;
  --red: #ff4757;
  --gold: #feca57;
  --win: #2ed573;
  --bg0: #04080f;
  --bg1: #080f1a;
  --bg2: #0d1626;
  --border: rgba(0,255,224,0.1);
  --dim: #3d5a72;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg0);
  font-family:'Oxanium',monospace;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}
.wrap{width:100%;max-width:440px;}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:18px;overflow:hidden;}

.top{padding:16px 18px 12px;border-bottom:1px solid var(--border);position:relative;}
.top::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--g2) 30%,var(--g1) 70%,transparent);}
.top-row{display:flex;justify-content:space-between;align-items:center;}
.brand{font-size:22px;font-weight:800;color:#fff;letter-spacing:4px;}
.ver{font-size:8px;color:var(--dim);letter-spacing:2px;margin-top:2px;}
.badge{font-size:9px;letter-spacing:2px;padding:4px 10px;border-radius:20px;border:1px solid var(--dim);color:var(--dim);}
.badge.live{border-color:var(--win);color:var(--win);animation:glow 2s infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 6px rgba(46,213,115,.2);}50%{box-shadow:0 0 14px rgba(46,213,115,.5);}}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:currentColor;margin-right:4px;vertical-align:middle;}

.info-row{display:flex;gap:6px;margin-top:10px;}
.ibox{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;}
.il{font-size:8px;color:var(--dim);letter-spacing:1px;}
.iv{font-size:12px;color:var(--gold);margin-top:2px;font-weight:700;}

.meta{display:flex;margin-top:10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.mi{flex:1;padding:7px 6px;text-align:center;border-right:1px solid var(--border);}
.mi:last-child{border-right:none;}
.ml{font-size:8px;color:var(--dim);}
.mv{font-size:13px;font-weight:800;color:#fff;margin-top:1px;}
.mv.g{color:var(--win);}.mv.r{color:var(--red);}.mv.y{color:var(--gold);}
.prog{height:3px;background:var(--border);margin-top:10px;border-radius:0;overflow:hidden;}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--g2),var(--win));transition:width .5s;}

.zscore-display{margin-top:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:12px;}
.zs-lbl{font-size:8px;color:var(--dim);letter-spacing:1px;}
.zs-bar{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;position:relative;}
.zs-fill{position:absolute;top:0;height:100%;border-radius:3px;transition:all .4s;}
.zs-val{font-size:14px;font-weight:800;width:44px;text-align:right;}

.btn-wrap{padding:12px 14px;background:var(--bg1);border-top:1px solid var(--border);}
.btn-toggle{width:100%;font-size:14px;font-weight:800;letter-spacing:3px;padding:14px;border:none;border-radius:12px;cursor:pointer;}
.btn-toggle.go{background:linear-gradient(135deg,#00b09b,#00ffe0);color:#000;}
.btn-toggle.stop{background:linear-gradient(135deg,#b91c1c,#ff4757);color:#fff;}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-top:1px solid var(--border);}
.st{background:var(--bg1);padding:12px 15px;}
.sl{font-size:8px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.sv{font-size:20px;font-weight:800;color:#fff;}
.sv.up{color:var(--win);}.sv.dn{color:var(--red);}.sv.cy{color:var(--g1);}

.dots-row{background:var(--bg1);border-top:1px solid var(--border);padding:8px 15px;display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.dl{font-size:9px;color:var(--dim);margin-right:4px;}
.d{width:9px;height:9px;border-radius:2px;background:var(--bg2);border:1px solid var(--dim);}
.d.w{background:var(--win);border-color:var(--win);}
.d.l{background:var(--red);border-color:var(--red);}
.d.p{background:var(--gold);border-color:var(--gold);}

.state-row{background:var(--bg1);border-top:1px solid var(--border);padding:7px 15px;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--dim);}
.chip{font-size:9px;padding:3px 8px;border-radius:5px;background:rgba(0,180,216,.1);color:var(--g2);border:1px solid rgba(0,180,216,.2);}
.chip.act{background:rgba(0,255,224,.1);color:var(--g1);border-color:rgba(0,255,224,.3);}
.chip.pause{background:rgba(254,202,87,.1);color:var(--gold);border-color:rgba(254,202,87,.3);}

.count-row{background:var(--bg2);border-top:1px solid var(--border);padding:7px 15px;display:flex;justify-content:space-between;font-size:9px;color:var(--dim);}
.cnt{font-size:12px;color:var(--gold);}

.log-wrap{background:var(--bg1);border-top:1px solid var(--border);padding:10px 12px;}
.log{background:#020609;border:1px solid rgba(0,255,224,.07);border-radius:10px;height:150px;overflow-y:auto;padding:8px 10px;font-size:10px;line-height:1.8;}
.le{display:flex;gap:6px;}
.lt{color:var(--dim);}
.lw{color:var(--win);}.ll{color:var(--red);}.li{color:var(--g2);}.lx{color:var(--gold);}.lg{color:var(--win);}

.ftr{background:var(--bg1);border-top:1px solid var(--border);padding:9px 15px 12px;display:flex;justify-content:space-between;align-items:center;font-size:9px;color:var(--dim);}
.rep-link{font-size:9px;padding:4px 10px;border:1px solid var(--dim);border-radius:6px;background:transparent;color:var(--dim);cursor:pointer;}
.rep-link:hover{border-color:var(--gold);color:var(--gold);}
</style>
</head>
<body>

<div class="wrap">
<div class="card">

  <div class="top">
    <div class="top-row">
      <div><div class="brand">⚡ APEX v17</div><div class="ver">OPTIMIZADO · BAJO OTV · ANTI-VARIANZA</div></div>
      <div class="badge" id="badge"><span class="dot"></span><span id="bTxt">OFFLINE</span></div>
    </div>
    <div class="info-row">
      <div class="ibox"><div class="il">ACTIVO</div><div class="iv" id="assetSym">R_50</div></div>
      <div class="ibox"><div class="il">STAKE</div><div class="iv" id="stakeEl">$0.50</div></div>
      <div class="ibox"><div class="il">STATUS</div><div class="iv" id="statusIcon">⚡</div></div>
    </div>
    <div class="meta">
      <div class="mi"><div class="ml">PROFIT</div><div class="mv g" id="mGoal">+$5</div></div>
      <div class="mi"><div class="ml">HOY</div><div class="mv" id="mProg">$0.00</div></div>
      <div class="mi"><div class="ml">STOP</div><div class="mv r" id="mStop">-$3</div></div>
      <div class="mi"><div class="ml">OPS</div><div class="mv y" id="mOps">0/20</div></div>
    </div>
    <div class="prog"><div class="prog-fill" id="pFill"></div></div>
    <div class="zscore-display">
      <div class="zs-lbl">Z-SCORE</div>
      <div class="zs-bar"><div class="zs-fill" id="zFill" style="width:0%"></div></div>
      <div class="zs-val" id="zVal">0.00</div>
    </div>
  </div>

  <div class="btn-wrap">
    <button class="btn-toggle go" id="btnT" onclick="toggleBot()">▶ INICIAR</button>
  </div>

  <div class="stats">
    <div class="st"><div class="sl">💰 Balance</div><div class="sv cy" id="bal">0.00</div></div>
    <div class="st"><div class="sl">📈 Ganancia</div><div class="sv" id="prof">+0.00</div></div>
    <div class="st"><div class="sl">🏆 Winrate</div><div class="sv" id="wr">0%</div></div>
    <div class="st"><div class="sl">📉 Pérdidas</div><div class="sv dn" id="lossEl">$0.00</div></div>
  </div>

  <div class="dots-row"><span class="dl">ÚLTIMAS</span><div id="dots"></div></div>
  <div class="state-row"><span id="stateInfo">Configura tu token</span><span class="chip" id="chip">IDLE</span></div>
  <div class="count-row"><span>🚫 INVALIDADAS <span class="cnt" id="invEl">0</span></span><span>✅ EJECUTADAS <span class="cnt" id="totEl">0</span></span></div>
  <div class="log-wrap"><div class="log" id="log"></div></div>
  <div class="ftr"><span id="ftrTxt">$0.50 · TP $5 · SL $3</span><button class="rep-link" onclick="showReport()">📊 REPORTE</button></div>

</div>
</div>

<script>
// ============================================================
// 🔑 CONFIGURACIÓN - PON AQUÍ TU TOKEN
// ============================================================
const TOKEN = "TU_TOKEN_AQUI";
const SYMBOL = "R_50";

// ============================================================
// PARÁMETROS OPTIMIZADOS
// ============================================================
const CONFIG = {
  // Gestión de riesgo
  stake: 0.50,           // Monto por operación (USD) - REDUCIDO
  takeProfit: 5,         // Ganancia objetivo
  stopLoss: 3,           // Pérdida máxima
  
  // Estrategia Z-Score
  zThreshold: 2.2,       // Umbral para operar
  minBarsForZ: 15,       // Mínimo de velas para calcular Z
  
  // Filtro de volatilidad (evita ruido)
  maxVolatility: 0.018,  // Volatilidad máxima 1.8%
  minVolatility: 0.002,  // Volatilidad mínima 0.2% (evita mercado muerto)
  
  // Cooldown adaptativo
  baseCooldown: 90,      // Segundos base entre ops
  lossCooldown: 120,     // Cooldown extra después de pérdida (segundos)
  maxLossStreak: 3,      // Pausa después de 3 pérdidas seguidas
  pauseAfterStreak: 300, // Pausa de 5 minutos
  
  // Límites
  maxOperations: 20,     // Máximo por sesión
  maxDailyLoss: 3,       // Stop loss diario en USD
  maxDailyProfit: 5,     // Take profit diario en USD
  
  // Anti-OTV (evita rate limiting)
  maxTicksPerMinute: 60, // Deriv permite muchos, pero nosotros limitamos procesamiento
  throttleMs: 500        // Procesar tick cada 500ms máximo
};

// ============================================================
// ESTADO DEL BOT
// ============================================================
let ws = null;
let running = false;
let balance = 0;
let dailyProfit = 0;
let wins = 0, losses = 0, totalOps = 0, invalidOps = 0;
let lossStreak = 0;
let lastTradeTime = 0;
let pausedUntil = 0;
let prices = [];
let lastResults = [];
let currentTrade = null;
let lastTickProcess = 0;

// ============================================================
// UI FUNCTIONS
// ============================================================
function addLog(msg, type = 'info') {
  const logDiv = document.getElementById('log');
  const le = document.createElement('div'); le.className = 'le';
  const lt = document.createElement('span'); lt.className = 'lt'; lt.innerText = new Date().toLocaleTimeString();
  const lm = document.createElement('span');
  if (type === 'win') lm.className = 'lw';
  else if (type === 'loss') lm.className = 'll';
  else if (type === 'success') lm.className = 'lg';
  else if (type === 'warning') lm.className = 'lx';
  else lm.className = 'li';
  lm.innerText = msg;
  le.appendChild(lt); le.appendChild(lm);
  logDiv.appendChild(le);
  logDiv.scrollTop = logDiv.scrollHeight;
}

function updateUI() {
  document.getElementById('bal').innerText = balance.toFixed(2);
  const profitClass = dailyProfit >= 0 ? 'up' : 'dn';
  document.getElementById('prof').innerHTML = (dailyProfit >= 0 ? '+' : '') + dailyProfit.toFixed(2);
  document.getElementById('prof').className = `sv ${profitClass}`;
  const wr = totalOps > 0 ? ((wins / totalOps) * 100).toFixed(1) : 0;
  document.getElementById('wr').innerText = `${wr}%`;
  document.getElementById('lossEl').innerText = `$${Math.max(0, -dailyProfit).toFixed(2)}`;
  document.getElementById('totEl').innerText = totalOps;
  document.getElementById('invEl').innerText = invalidOps;
  document.getElementById('mOps').innerText = `${totalOps + invalidOps}/${CONFIG.maxOperations}`;
  document.getElementById('mProg').innerText = `${dailyProfit >= 0 ? '+' : ''}$${dailyProfit.toFixed(2)}`;
  const fillPercent = Math.min(100, Math.max(0, ((dailyProfit + CONFIG.stopLoss) / (CONFIG.takeProfit + CONFIG.stopLoss)) * 100));
  document.getElementById('pFill').style.width = `${fillPercent}%`;
  
  const dotsDiv = document.getElementById('dots');
  dotsDiv.innerHTML = '';
  lastResults.slice(-15).forEach(r => {
    const d = document.createElement('div');
    if (r === true) d.className = 'd w';
    else if (r === false) d.className = 'd l';
    else d.className = 'd p';
    dotsDiv.appendChild(d);
  });
}

function updateZScore(z, volatility) {
  const zAbs = Math.min(1, Math.abs(z) / 4);
  const width = z > 0 ? 50 + (zAbs * 50) : 50 - (zAbs * 50);
  document.getElementById('zFill').style.width = `${width}%`;
  document.getElementById('zVal').innerText = z.toFixed(2);
  
  let color = '#3d5a72';
  if (Math.abs(z) > CONFIG.zThreshold && volatility < CONFIG.maxVolatility) color = '#feca57';
  else if (Math.abs(z) > CONFIG.zThreshold) color = '#ffaa33';
  document.getElementById('zVal').style.color = color;
}

function setOnline(online) {
  const badge = document.getElementById('badge');
  const bTxt = document.getElementById('bTxt');
  if (online) {
    badge.classList.add('live');
    bTxt.innerText = 'ONLINE';
  } else {
    badge.classList.remove('live');
    bTxt.innerText = 'OFFLINE';
  }
}

function setChip(status, isActive = false, isPaused = false) {
  const chip = document.getElementById('chip');
  if (isActive) {
    chip.innerText = 'ACTIVO';
    chip.classList.add('act');
    chip.classList.remove('pause');
  } else if (isPaused) {
    chip.innerText = 'PAUSA';
    chip.classList.add('pause');
    chip.classList.remove('act');
  } else {
    chip.innerText = 'IDLE';
    chip.classList.remove('act', 'pause');
  }
}

function showReport() {
  const wr = totalOps > 0 ? ((wins / totalOps) * 100).toFixed(1) : 0;
  alert(`📊 REPORTE DE SESIÓN\n\nResultado: ${dailyProfit >= 0 ? '+' : ''}$${dailyProfit.toFixed(2)}\nWinrate: ${wr}%\nWins: ${wins}\nLosses: ${losses}\nTotal ops: ${totalOps}\nRacha pérdidas: ${lossStreak}`);
}

// ============================================================
// CÁLCULOS ESTADÍSTICOS
// ============================================================
function calculateZScore(pricesArray) {
  const n = Math.min(20, pricesArray.length);
  if (n < CONFIG.minBarsForZ) return 0;
  const recent = pricesArray.slice(-n);
  const mean = recent.reduce((a, b) => a + b, 0) / n;
  const variance = recent.reduce((sum, p) => sum + Math.pow(p - mean, 2), 0) / n;
  const stdDev = Math.sqrt(variance);
  if (stdDev === 0) return 0;
  const current = recent[recent.length - 1];
  return (current - mean) / stdDev;
}

function calculateVolatility(pricesArray) {
  if (pricesArray.length < 10) return 0.01;
  const returns = [];
  for (let i = pricesArray.length - 10; i < pricesArray.length - 1; i++) {
    returns.push(Math.abs(pricesArray[i+1] - pricesArray[i]) / pricesArray[i]);
  }
  return returns.reduce((a, b) => a + b, 0) / returns.length;
}

// ============================================================
// DECISIÓN DE TRADE (OPTIMIZADA - BAJO OTV)
// ============================================================
function shouldTrade(zScore, volatility, timestamp) {
  // 1. Bot debe estar activo
  if (!running) return false;
  
  // 2. Sin operación activa
  if (currentTrade) return false;
  
  // 3. Pausa por racha de pérdidas
  if (timestamp < pausedUntil) return false;
  
  // 4. Cooldown base + adaptativo
  let cooldown = CONFIG.baseCooldown;
  if (lossStreak > 0) cooldown = CONFIG.lossCooldown;
  if (timestamp - lastTradeTime < cooldown * 1000) return false;
  
  // 5. Límite de operaciones
  if ((totalOps + invalidOps) >= CONFIG.maxOperations) return false;
  
  // 6. Límites diarios
  if (dailyProfit >= CONFIG.maxDailyProfit) return false;
  if (dailyProfit <= -CONFIG.maxDailyLoss) return false;
  
  // 7. Z-Score suficiente
  if (Math.abs(zScore) < CONFIG.zThreshold) return false;
  
  // 8. Volatilidad en rango óptimo (evita ruido)
  if (volatility > CONFIG.maxVolatility) return false;
  if (volatility < CONFIG.minVolatility) return false;
  
  return true;
}

// ============================================================
// EJECUTAR TRADE
// ============================================================
function executeTrade(direction) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  
  const buyContract = {
    buy: 1,
    price: CONFIG.stake,
    duration: 2,
    duration_unit: 'minute',
    contract_type: direction,
    symbol: SYMBOL,
    basis: 'stake'
  };
  
  ws.send(JSON.stringify(buyContract));
  lastTradeTime = Date.now();
  currentTrade = { direction, stake: CONFIG.stake, time: lastTradeTime };
  addLog(`📊 ${direction} $${CONFIG.stake} | Z:${document.getElementById('zVal').innerText}`, 'info');
}

// ============================================================
// PROCESAR RESULTADO DEL TRADE
// ============================================================
function processTradeResult(profit) {
  currentTrade = null;
  dailyProfit += profit;
  totalOps++;
  
  if (profit > 0) {
    wins++;
    lossStreak = 0;
    lastResults.push(true);
    addLog(`✅ WIN +$${profit.toFixed(2)} | Total: $${dailyProfit.toFixed(2)}`, 'win');
  } else {
    losses++;
    lossStreak++;
    lastResults.push(false);
    addLog(`❌ LOSS $${profit.toFixed(2)} | Total: $${dailyProfit.toFixed(2)} | Racha: ${lossStreak}`, 'loss');
    
    // Pausa por racha de pérdidas
    if (lossStreak >= CONFIG.maxLossStreak) {
      pausedUntil = Date.now() + (CONFIG.pauseAfterStreak * 1000);
      addLog(`⏸ Pausa de ${CONFIG.pauseAfterStreak/60} min por ${lossStreak} pérdidas seguidas`, 'warning');
      setChip('PAUSA', false, true);
      setTimeout(() => {
        if (running) setChip('ACTIVO', true, false);
      }, CONFIG.pauseAfterStreak * 1000);
    }
  }
  
  updateUI();
  
  // Verificar límites
  if (dailyProfit >= CONFIG.takeProfit) {
    addLog(`🎯 TAKE PROFIT: +$${CONFIG.takeProfit}`, 'success');
    stopBot();
  }
  if (dailyProfit <= -CONFIG.stopLoss) {
    addLog(`🛡 STOP LOSS: -$${CONFIG.stopLoss}`, 'warning');
    stopBot();
  }
  if (totalOps + invalidOps >= CONFIG.maxOperations) {
    addLog(`🔁 Límite de ${CONFIG.maxOperations} ops alcanzado`, 'warning');
    stopBot();
  }
}

// ============================================================
// CONEXIÓN WEBSOCKET REAL A DERIV
// ============================================================
function connectDeriv() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  
  ws = new WebSocket('wss://ws.binaryws.com/websockets/v3');
  
  ws.onopen = () => {
    addLog('🔌 Conectando a Deriv...', 'info');
    ws.send(JSON.stringify({ authorize: TOKEN }));
  };
  
  ws.onmessage = (event) => {
    const res = JSON.parse(event.data);
    
    if (res.authorize) {
      addLog(`✅ Conectado: ${res.authorize.loginid}`, 'success');
      setOnline(true);
      ws.send(JSON.stringify({ ticks: SYMBOL, subscribe: 1 }));
      ws.send(JSON.stringify({ balance: 1 }));
    }
    
    if (res.balance) {
      balance = res.balance.balance;
      updateUI();
    }
    
    // Procesar ticks con throttle (reduce OTV)
    if (res.tick && running) {
      const now = Date.now();
      if (now - lastTickProcess < CONFIG.throttleMs) return;
      lastTickProcess = now;
      
      const price = res.tick.quote;
      prices.push(price);
      if (prices.length > 100) prices.shift();
      
      const zScore = calculateZScore(prices);
      const volatility = calculateVolatility(prices);
      updateZScore(zScore, volatility);
      
      const nowTime = Date.now();
      if (shouldTrade(zScore, volatility, nowTime)) {
        const direction = zScore > 0 ? 'PUT' : 'CALL';
        executeTrade(direction);
      }
    }
    
    if (res.buy) {
      currentTrade = { id: res.buy.buy_id, direction: res.buy.contract_type };
    }
    
    if (res.proposal_open_contract && res.proposal_open_contract.is_sold) {
      const profit = res.proposal_open_contract.profit_loss;
      processTradeResult(profit);
    }
    
    if (res.error) {
      if (!res.error.message.includes('Already subscribed')) {
        addLog(`❌ Error: ${res.error.message}`, 'warning');
      }
      if (res.error.message.includes('not enough balance')) stopBot();
    }
  };
  
  ws.onclose = () => {
    addLog('🔌 Desconectado', 'warning');
    setOnline(false);
    if (running) setTimeout(() => connectDeriv(), 5000);
  };
  
  ws.onerror = (err) => {
    addLog(`⚠️ Error: ${err.message}`, 'warning');
  };
}

// ============================================================
// CONTROL DEL BOT
// ============================================================
function startBot() {
  if (running) return;
  if (!TOKEN || TOKEN === "e1lRgxNoxWwBkzx") {
    addLog('⚠️ Configura tu token API en la variable TOKEN', 'warning');
    alert('Edita el código y pon tu token en: const TOKEN = "tu_token_aqui"');
    return;
  }
  
  running = true;
  lossStreak = 0;
  pausedUntil = 0;
  
  document.getElementById('btnT').className = 'btn-toggle stop';
  document.getElementById('btnT').innerText = '■ DETENER';
  document.getElementById('stateInfo').innerText = 'Bot optimizado - Monitoreando';
  setChip('ACTIVO', true, false);
  
  addLog(`🚀 Bot v17 iniciado | Stake $${CONFIG.stake} | TP $${CONFIG.takeProfit} | SL $${CONFIG.stopLoss}`, 'success');
  addLog(`📊 Z-Threshold: ${CONFIG.zThreshold} | Cooldown: ${CONFIG.baseCooldown}s`, 'info');
  
  if (!ws || ws.readyState !== WebSocket.OPEN) connectDeriv();
}

function stopBot() {
  running = false;
  document.getElementById('btnT').className = 'btn-toggle go';
  document.getElementById('btnT').innerText = '▶ INICIAR';
  document.getElementById('stateInfo').innerText = 'Bot detenido';
  setChip('IDLE', false, false);
  addLog('⏸ Bot detenido', 'warning');
  if (ws) ws.close();
}

function toggleBot() {
  if (running) stopBot();
  else startBot();
}
