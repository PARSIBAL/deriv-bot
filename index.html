<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AI SNIPER V50 ELITE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#02060d;color:#00ff9c;font-family:monospace;padding:20px;}
.container{max-width:600px;margin:auto;background:#050a14;padding:20px;border-radius:12px;}

/* PANEL SUPERIOR */
.top-panel{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 margin-bottom:10px;
}

.card{
 background:#0a0f1c;
 padding:15px;
 border-radius:12px;
 text-align:center;
 border:1px solid rgba(0,255,200,0.1);
}

.card-title{font-size:11px;color:#777;letter-spacing:2px;}
.card-value{font-size:28px;font-weight:800;color:#00ffcc;}
.green{color:#2ed573;}
.red{color:#ff4757;}

/* INPUTS */
input,button{
 width:100%;padding:10px;margin:5px 0;
 background:#000;color:#00ff9c;border:none;
}

button{background:#00ffc3;color:#000;font-weight:bold;}

/* PANEL INFO */
.panel{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:8px;
 margin:10px 0;
}

.box{
 background:#000;
 padding:10px;
 text-align:center;
 border-radius:8px;
}

.label{font-size:10px;color:#888;}
.value{font-size:16px;font-weight:bold;}

.signal{
 text-align:center;
 font-size:20px;
 font-weight:bold;
 margin:10px 0;
}

.log{
 height:120px;
 overflow:auto;
 background:#000;
 padding:8px;
 font-size:11px;
}
</style>
</head>

<body>

<div class="container">

<h3>🤖 AI SNIPER V50 ELITE</h3>

<!-- PANEL -->
<div class="top-panel">
  <div class="card">
    <div class="card-title">BALANCE</div>
    <div id="balanceBig" class="card-value">$0.00</div>
  </div>

  <div class="card">
    <div class="card-title">GANANCIA</div>
    <div id="profitBig" class="card-value">$0.00</div>
  </div>
</div>

<input type="text" id="token" placeholder="e1lRgxNoxWwBkzx">
<input type="number" id="stake" value="0.5">
<input type="number" id="tp" value="3">
<input type="number" id="sl" value="3">

<button id="toggle">START</button>

<div id="mode">STATUS: IDLE</div>

<!-- PANEL MÉTRICAS -->
<div class="panel">
  <div class="box"><div class="label">Z</div><div id="zv" class="value">0</div></div>
  <div class="box"><div class="label">VOL</div><div id="volv" class="value">0</div></div>
  <div class="box"><div class="label">TREND</div><div id="trendv" class="value">0</div></div>
  <div class="box"><div class="label">MARKET</div><div id="marketv" class="value">---</div></div>
</div>

<div id="signal" class="signal">WAIT</div>

<!-- GRÁFICO -->
<canvas id="chart" height="100"></canvas>

<div class="log" id="log"></div>

</div>

<script>

let ws,running=false,interval;
let candles=[];
let wins=0,losses=0,balance=0,profit=0;
let lastTradeTime=0;
let history=[];

// CONFIG DINÁMICA
let config={
 zTrendMin:1.4,
 zTrendMax:1.8,
 zReversal:2.1,
 volMin:0.2
};

// CHART
let ctx=document.getElementById("chart");
let chart=new Chart(ctx,{
 type:"line",
 data:{
  labels:[],
  datasets:[{
   label:"Balance",
   data:[],
   borderWidth:2,
   tension:0.2
  }]
 },
 options:{responsive:true}
});

// BOTÓN
toggle.onclick=()=>{
 running=!running;
 if(running){start();toggle.innerText="STOP";}
 else{stop();}
};

function stop(){
 clearInterval(interval);
 ws.close();
 toggle.innerText="START";
}

// LOG
function log(msg){
 logDiv.innerHTML+="<div>"+msg+"</div>";
 logDiv.scrollTop=logDiv.scrollHeight;
}

function setMode(m){mode.innerText="STATUS: "+m;}

// START
function start(){
 let token=token.value;

 ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

 ws.onopen=()=>{
  ws.send(JSON.stringify({authorize:token}));
  interval=setInterval(getCandles,5000);
 };

 ws.onmessage=(msg)=>{
  let d=JSON.parse(msg.data);

  if(d.msg_type==="candles"){
    candles=d.candles.map(c=>c.close);
    brain();
  }

  if(d.msg_type==="proposal_open_contract"){
    if(d.proposal_open_contract.is_sold){

      let p=d.proposal_open_contract.profit;

      balance+=p;
      profit+=p;

      history.push(p>0?1:0);
      if(history.length>20)history.shift();

      if(p>0){wins++;log("WIN "+p);}
      else{losses++;log("LOSS "+p);}

      update();

      chart.data.labels.push("");
      chart.data.datasets[0].data.push(balance);
      chart.update();

      optimize();

      if(balance>=tp.value || balance<=-sl.value){
        setMode("STOP");
        stop();
      }
    }
  }
 };
}

// OPTIMIZADOR
function optimize(){
 if(history.length<10)return;

 let wr=history.reduce((a,b)=>a+b)/history.length;

 if(wr<0.5){
   config.zTrendMin+=0.05;
   config.zTrendMax-=0.05;
   config.zReversal+=0.1;
 }

 if(wr>0.65){
   config.zTrendMin-=0.05;
   config.zTrendMax+=0.05;
   config.zReversal-=0.1;
 }
}

// DATA
function getCandles(){
 ws.send(JSON.stringify({
  ticks_history:"R_50",
  granularity:60,
  count:50,
  style:"candles"
 }));
}

// INDICADORES
function ema(p,d){
 let k=2/(p+1),arr=[d[0]];
 for(let i=1;i<d.length;i++)arr.push(d[i]*k+arr[i-1]*(1-k));
 return arr;
}

function zScore(d){
 let m=d.reduce((a,b)=>a+b)/d.length;
 let s=Math.sqrt(d.map(x=>(x-m)**2).reduce((a,b)=>a+b)/d.length);
 return (d[d.length-1]-m)/s;
}

function volatility(d){
 let c=[];
 for(let i=1;i<d.length;i++)c.push(Math.abs(d[i]-d[i-1]));
 return c.reduce((a,b)=>a+b)/c.length;
}

// CEREBRO
function brain(){

 if(candles.length<25)return;

 let z=zScore(candles);
 let ema3=ema(3,candles).pop();
 let ema9=ema(9,candles).pop();
 let vol=volatility(candles);

 let last=candles[candles.length-1];
 let prev=candles[candles.length-2];

 zv.innerText=z.toFixed(2);
 volv.innerText=vol.toFixed(2);
 trendv.innerText=Math.abs(ema3-ema9).toFixed(2);

 let now=Date.now();
 if(now-lastTradeTime<60000)return;

 if(vol<config.volMin){
  marketv.innerText="MUERTO";
  signal.innerText="WAIT";
  return;
 }

 if(Math.abs(z)>config.zReversal){

   if(z>config.zReversal && last<prev){
     signal.innerText="PUT";
     trade("PUT","t");
     lastTradeTime=now;
     return;
   }

   if(z<-config.zReversal && last>prev){
     signal.innerText="CALL";
     trade("CALL","t");
     lastTradeTime=now;
     return;
   }
 }

 if(Math.abs(z)>config.zTrendMin && Math.abs(z)<config.zTrendMax){

   if(ema3>ema9 && last>prev){
     signal.innerText="CALL";
     trade("CALL","m");
     lastTradeTime=now;
     return;
   }

   if(ema3<ema9 && last<prev){
     signal.innerText="PUT";
     trade("PUT","m");
     lastTradeTime=now;
     return;
   }
 }

 signal.innerText="WAIT";
}

// TRADE
function trade(type,mode){

 let stakeVal=parseFloat(stake.value);
 let duration = mode==="t"?3:1;
 let unit = mode==="t"?"t":"m";

 log("TRADE "+type);

 ws.send(JSON.stringify({
  buy:1,
  price:stakeVal,
  parameters:{
   amount:stakeVal,
   basis:"stake",
   contract_type:type,
   currency:"USD",
   duration:duration,
   duration_unit:unit,
   symbol:"R_50"
  }
 }));
}

// UPDATE
function update(){
 balanceBig.innerText="$"+balance.toFixed(2);

 profitBig.innerText=(profit>=0?"+$":"-$")+Math.abs(profit).toFixed(2);
 profitBig.className=profit>=0?"card-value green":"card-value red";
}
</script>

</body>
</html>
