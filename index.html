function getSession(){

  if((h>=7 && h<10) || (h>=20 && h<23)) return {name:"✅ BUENA", z:1.65, trade:true};
  return {name:"⏸ ESPERA", z:99, trade:false};

// ══ FILTROS ULTRA PRECISOS ══
function getSignalUltra(){
  if(prices.length < CFG.MIN_BARS) return null;
  
  const rets = [];
  for(let i=1; i<prices.length; i++) rets.push(prices[i]-prices[i-1]);
  const {mean, std} = getStats(rets);
  const z = std > 0 ? (rets[rets.length-1] - mean) / std : 0;
  const dir = z > 0 ? 1 : -1;
  
  // 🔥 5 CORE OBLIGATORIOS (95% precisión)
  const core = [
    std >= CFG.VOL_MIN && std <= CFG.VOL_MAX,                    // VOLAT
    Math.abs(z) >= getSession().z,                               // Z-SCORE
    calcSlope(prices.slice(-10)) * dir > 0,                      // SLOPE
    (calcRSI(prices) < CFG.RSI_HI && z > 0) || (calcRSI(prices) > CFG.RSI_LO && z < 0), // RSI
    calcMACD(prices).hist * dir > 0                              // MACD
  ];
  
  const coreScore = core.filter(Boolean).length;
  
  // 🔥 7 EXTRA CONFIRMADORES
  const extra = [
    calcBurst(prices).dir === dir,                               // BURST
    calcATR(prices) * 0.8 < Math.abs(rets[rets.length-1]),      // ATR
    calcBollinger(prices).pct * dir > 0.5,                       // BBAND
    calcVCP(prices),                                             // VCP
    calcBBSqueeze(prices).dir === dir,                           // SQUEEZE
    calcVShape(prices, dir),                                     // VSHAPE
    calcMACDDivergence(prices, dir)                              // DIVERG
  ];
  
  const extraScore = extra.filter(Boolean).length;
  const totalScore = coreScore + extraScore;
  
  if(coreScore < CFG.MIN_CORE || extraScore < CFG.MIN_EXTRA) return null;
  
  const pattern = extra[0] ? 'BURST' : extra[5] ? 'VSHAPE' : extra[4] ? 'SQUEEZE' : 'TREND';
  
  return {
    signal: z > 0 ? 'CALL' : 'PUT',
    z: z.toFixed(2), conf: Math.round(totalScore/12*100), pattern,
    score: totalScore
  };
}

function getStats(arr){
  const n=arr.length, mean=arr.reduce((a,b)=>a+b,0)/n;
  return {mean, std:Math.sqrt(arr.slice(-20).map(x=>(x-mean)**2).reduce((a,b)=>a+b,0)/n)};
}
