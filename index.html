<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z·BOT — Pure Z-Score Engine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:     #050608;
  --p1:     #090b0f;
  --p2:     #0e1118;
  --p3:     #131820;
  --br:     rgba(255,255,255,0.06);
  --up:     #00ff88;
  --dn:     #ff2d55;
  --go:     #ffcc00;
  --cy:     #00d4ff;
  --pu:     #bf5fff;
  --wh:     #e0e8f0;
  --mt:     #3a4455;
  --mt2:    #252d3a;
}

html { font-size: 14px; }

body {
  background: var(--bg);
  font-family: 'Rajdhani', sans-serif;
  color: var(--wh);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 20px 14px 40px;
  background-image:
    radial-gradient(ellipse 60% 30% at 50% 0%, rgba(0,255,136,0.04) 0%, transparent 60%),
    linear-gradient(180deg, rgba(0,212,255,0.02) 0%, transparent 30%);
}

.wrap { width: 100%; max-width: 980px; }

/* ── HEADER ── */
.hdr {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-bottom: 18px;
  margin-bottom: 18px;
  border-bottom: 1px solid var(--br);
  position: relative;
}
.hdr::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0;
  width: 120px; height: 1px;
  background: var(--up);
  box-shadow: 0 0 12px var(--up);
}
.logo {
  font-family: 'Share Tech Mono', monospace;
  font-size: 2.6rem;
  letter-spacing: 8px;
  color: var(--up);
  line-height: 1;
  text-shadow: 0 0 30px rgba(0,255,136,0.4);
}
.logo span { color: var(--mt); font-size: 1rem; letter-spacing: 3px; display: block; margin-top: 2px; }
.hdr-right { text-align: right; }
.bal-lbl { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--mt); letter-spacing: 3px; margin-bottom: 2px; }
.bal-val { font-family: 'Share Tech Mono', monospace; font-size: 1.9rem; color: var(--up); }
.dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--mt); margin-right: 5px; vertical-align: middle; }
.dot.on { background: var(--up); box-shadow: 0 0 8px var(--up); animation: blink 1.4s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── INPUTS ── */
.cfg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.fg { position: relative; }
.fg label {
  display: block;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; letter-spacing: 2px; color: var(--mt);
  text-transform: uppercase; margin-bottom: 5px;
}
.fg input {
  width: 100%;
  background: var(--p1);
  border: 1px solid var(--br);
  border-radius: 6px;
  padding: 9px 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px; color: var(--up);
  outline: none; transition: border-color .2s;
}
.fg input:focus { border-color: rgba(0,255,136,0.3); }

/* ── BTN ── */
.btn-row { display: flex; gap: 8px; margin-bottom: 14px; }
.btn {
  flex: 1; padding: 11px; border: none; border-radius: 6px;
  font-family: 'Rajdhani', sans-serif; font-weight: 700;
  font-size: 1rem; letter-spacing: 4px; cursor: pointer;
  transition: all .2s; text-transform: uppercase;
}
.btn-go { background: var(--up); color: #020805; }
.btn-go:hover { box-shadow: 0 0 20px rgba(0,255,136,0.4); }
.btn-st { background: var(--dn); color: #fff; }

/* ── STATUS ── */
.status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; letter-spacing: 1.5px;
  background: var(--p1); border: 1px solid var(--br);
  border-radius: 6px; padding: 7px 12px;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}

/* ── STATS ── */
.stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
.stat {
  background: var(--p1); border: 1px solid var(--br);
  border-radius: 8px; padding: 9px 6px; text-align: center;
}
.stat-l { font-family: 'Share Tech Mono', monospace; font-size: 7px; color: var(--mt); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
.stat-v { font-family: 'Share Tech Mono', monospace; font-size: 1.4rem; }
.g { color: var(--up); } .r { color: var(--dn); } .o { color: var(--go); } .c { color: var(--cy); } .w { color: var(--wh); }

/* ── ASSET CONFIG PANEL ── */
.acp-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; color: var(--cy); letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid var(--br);
}
.acp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.acp-card {
  background: var(--p1); border: 1px solid var(--br);
  border-radius: 10px; padding: 14px;
  transition: border-color .3s;
}
.acp-card.active-up { border-color: rgba(0,255,136,0.4); }
.acp-card.active-dn { border-color: rgba(255,45,85,0.4); }
.acp-sym {
  font-family: 'Share Tech Mono', monospace;
  font-size: 1.2rem; letter-spacing: 3px; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.acp-sym-name { color: var(--cy); }
.acp-sym-price { font-size: .8rem; color: var(--mt); }
.acp-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.acp-lbl { font-family: 'Share Tech Mono', monospace; font-size: 8px; color: var(--mt); letter-spacing: 1px; }
.acp-inp {
  background: var(--p2); border: 1px solid var(--br);
  border-radius: 5px; padding: 4px 8px;
  font-family: 'Share Tech Mono', monospace; font-size: 12px;
  color: var(--go); outline: none; width: 72px; text-align: center;
  transition: border-color .2s;
}
.acp-inp:focus { border-color: rgba(255,204,0,0.4); }
.acp-inp.wide { width: 88px; }

/* Z meter */
.z-meter-wrap { margin: 10px 0 6px; }
.z-meter-lbl { font-family: 'Share Tech Mono', monospace; font-size: 7px; color: var(--mt); letter-spacing: 1px; margin-bottom: 4px; display: flex; justify-content: space-between; }
.z-meter-track {
  height: 4px; background: var(--p3); border-radius: 2px;
  position: relative; overflow: visible;
}
.z-bar {
  position: absolute; top: 0; height: 100%; border-radius: 2px;
  transition: width .4s ease, left .4s ease, background .4s;
}
.z-center-line {
  position: absolute; top: -4px; left: 50%;
  width: 1px; height: 12px; background: var(--mt);
  transform: translateX(-50%);
}
.z-thr-line {
  position: absolute; top: -6px; width: 2px; height: 16px;
  border-radius: 1px; transform: translateX(-50%);
}

.acp-signal {
  font-family: 'Share Tech Mono', monospace;
  font-size: .85rem; letter-spacing: 3px; font-weight: 700;
  text-align: center; margin-top: 8px; padding: 6px;
  border-radius: 5px; background: var(--p3);
  transition: all .3s;
}
.acp-zval {
  font-family: 'Share Tech Mono', monospace;
  font-size: 1.6rem; text-align: center;
  font-weight: 700; margin-top: 4px;
  transition: color .3s;
}
.acp-meta {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px; color: var(--mt); text-align: center;
  letter-spacing: 1px; margin-top: 2px;
}

/* ── SAFETY ── */
.safety {
  background: rgba(255,204,0,0.04); border: 1px solid rgba(255,204,0,0.12);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 14px;
}
.safety-t { font-family: 'Share Tech Mono', monospace; font-size: 8px; color: var(--go); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 9px; }
.safety-g { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
.sfb { background: var(--p1); border-radius: 7px; padding: 7px; text-align: center; }
.sfb-l { font-family: 'Share Tech Mono', monospace; font-size: 7px; color: var(--mt); letter-spacing: 1px; }
.sfb-v { font-family: 'Share Tech Mono', monospace; font-size: 1.1rem; color: var(--go); margin-top: 2px; }

/* ── SIGNAL BOX ── */
.sigbox {
  background: var(--p1); border: 1px solid var(--br);
  border-radius: 8px; padding: 10px 14px; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
}
.sig-l { font-family: 'Share Tech Mono', monospace; font-size: 8px; color: var(--mt); letter-spacing: 2px; margin-bottom: 2px; }
.sig-v { font-family: 'Share Tech Mono', monospace; font-size: 1.2rem; font-weight: 700; }
.sig-d { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--mt); }

/* ── LOG ── */
.log-l { font-family: 'Share Tech Mono', monospace; font-size: 8px; color: var(--mt); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 7px; }
.log {
  background: var(--p1); border: 1px solid var(--br); border-radius: 8px;
  height: 180px; overflow-y: auto; padding: 8px 10px;
  font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--mt);
  scrollbar-width: thin; scrollbar-color: var(--mt2) transparent;
}
.log div { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.02); line-height: 1.5; }
.lw { color: var(--up); font-weight: 700; }
.ll { color: var(--dn); font-weight: 700; }
.li { color: var(--cy); }
.lk { color: var(--go); font-weight: 700; font-size: 10px; }
.lf { color: #2a3020; }

/* scan line animation on active cards */
@keyframes scanline {
  0%   { transform: translateY(-100%); opacity: 0; }
  10%  { opacity: .15; }
  90%  { opacity: .15; }
  100% { transform: translateY(400%); opacity: 0; }
}
.acp-card.active-up::before, .acp-card.active-dn::before {
  content: '';
  position: absolute;
  left: 0; width: 100%; height: 2px;
  animation: scanline 2s linear infinite;
  pointer-events: none;
  border-radius: 10px;
}
.acp-card { position: relative; overflow: hidden; }
.acp-card.active-up::before { background: linear-gradient(90deg, transparent, var(--up), transparent); }
.acp-card.active-dn::before { background: linear-gradient(90deg, transparent, var(--dn), transparent); }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="hdr">
    <div>
      <div class="logo">Z·BOT<span>PURE Z-SCORE ENGINE · V10 · V25 · V50</span></div>
    </div>
    <div class="hdr-right">
      <div class="bal-lbl"><span class="dot" id="onlineDot"></span>BALANCE</div>
      <div class="bal-val" id="balVal">$--</div>
    </div>
  </div>

  <!-- GLOBAL CONFIG -->
  <div class="cfg-row">
    <div class="fg">
      <label>🔑 API Token Deriv</label>
      <input type="password" id="apiToken" placeholder="Tu token API">
    </div>
    <div class="fg">
      <label>💰 Stake por operación ($)</label>
      <input type="number" id="stake" value="1.00" min="0.35" step="0.25">
    </div>
  </div>

  <!-- BTN -->
  <div class="btn-row">
    <button class="btn btn-go" id="toggleBtn">▶ INICIAR BOT</button>
  </div>

  <!-- STATUS -->
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusTxt">OFFLINE</span>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-l">Wins</div><div class="stat-v g" id="stW">0</div></div>
    <div class="stat"><div class="stat-l">Losses</div><div class="stat-v r" id="stL">0</div></div>
    <div class="stat"><div class="stat-l">Winrate</div><div class="stat-v o" id="stWR">0%</div></div>
    <div class="stat"><div class="stat-l">Ops</div><div class="stat-v w" id="stOps">0</div></div>
    <div class="stat"><div class="stat-l">P&L Sesión</div><div class="stat-v c" id="stPnL">$0.00</div></div>
  </div>

  <!-- PER-ASSET CONFIG + LIVE Z -->
  <div class="acp-title">⚡ CONFIGURACIÓN POR ACTIVO — Z-SCORE EN TIEMPO REAL</div>
  <div class="acp-grid" id="acpGrid"></div>

  <!-- LAST SIGNAL -->
  <div class="sigbox">
    <div>
      <div class="sig-l">ÚLTIMA SEÑAL</div>
      <div class="sig-v" id="sigV" style="color:var(--mt)">---</div>
    </div>
    <div style="text-align:right">
      <div class="sig-l">Z / TICKS / DURACIÓN</div>
      <div class="sig-d" id="sigD">---</div>
    </div>
  </div>

  <!-- SAFETY -->
  <div class="safety">
    <div class="safety-t">🛡 Protección de cuenta</div>
    <div class="safety-g">
      <div class="sfb"><div class="sfb-l">Drawdown</div><div class="sfb-v" id="sfDD">$0.00</div></div>
      <div class="sfb"><div class="sfb-l">Stop 5%</div><div class="sfb-v" id="sfStop">--</div></div>
      <div class="sfb"><div class="sfb-l">Racha</div><div class="sfb-v" id="sfStr">0</div></div>
      <div class="sfb"><div class="sfb-l">Pausa</div><div class="sfb-v" id="sfCool">OK</div></div>
    </div>
  </div>

  <!-- LOG -->
  <div class="log-l">📋 Log</div>
  <div class="log" id="logDiv"></div>

</div>

<script>
// ══════════════════════════════════════════════════════════════════════════
// Z·BOT — PURE Z-SCORE ENGINE
//
// LÓGICA ÚNICA Y COMPLETA:
//
//  1. Acumula los últimos N ticks (configurable por activo)
//  2. Calcula Z-score del último tick vs la ventana
//  3. Si Z >= +umbral → PUT (precio en extremo alto → reversión bajista)
//  4. Si Z <= -umbral → CALL (precio en extremo bajo → reversión alcista)
//  5. Duración configurable por activo en minutos
//  6. Sin filtros adicionales — solo Z-score puro
//
// PARÁMETROS CONFIGURABLES POR ACTIVO:
//  - Umbral Z (ej: 2.0 = muy estricto, 1.5 = más señales)
//  - Número de ticks en la ventana (ej: 20 = corto, 50 = largo)
//  - Duración de la operación en minutos (1-5)
//  - Activar/desactivar cada activo individualmente
// ══════════════════════════════════════════════════════════════════════════

const ASSETS = ['R_10', 'R_25', 'R_50'];
const LABELS = { R_10: 'V10', R_25: 'V25', R_50: 'V50' };

// Configuración por activo (editable desde la UI)
const cfg = {
  R_10: { zThr: 2.0, ticks: 30, duration: 3, active: true },
  R_25: { zThr: 1.8, ticks: 25, duration: 3, active: true },
  R_50: { zThr: 1.6, ticks: 20, duration: 2, active: true }
};

const LOSS_BLOCK_AFTER = 2;
const LOSS_BLOCK_MS    = 90000;
const GLOBAL_PAUSE_MS  = 40000;
const COOLDOWN_MS      = 8000;

let ws, running = false;
let pendingAsset = null;
let balance = 100, sessionStart = 100;
let wins = 0, losses = 0, lossStreak = 0, pauseUntil = 0;

// ── BUFFERS ───────────────────────────────────────────────────────────────
let buf = {};
function initBuf(a) {
  buf[a] = { prices: [], currentZ: 0, lastPrice: null };
}
ASSETS.forEach(initBuf);

// ── ESTADO ────────────────────────────────────────────────────────────────
let ast = {};
function initAst(a) {
  ast[a] = { lossStreak: 0, blockedUntil: 0, lastTrade: 0, hasContract: false };
}
ASSETS.forEach(initAst);

let c2a = {};  // contractId → asset

// ══════════════════════════════════════════════════════════════════════════
// Z-SCORE — única función de análisis
// ══════════════════════════════════════════════════════════════════════════
function calcZ(prices) {
  const n = prices.length;
  if (n < 2) return 0;
  let sum = 0;
  for (let i = 0; i < n; i++) sum += prices[i];
  const mean = sum / n;
  let sq = 0;
  for (let i = 0; i < n; i++) sq += (prices[i] - mean) ** 2;
  const std = Math.sqrt(sq / n);
  return std === 0 ? 0 : (prices[n - 1] - mean) / std;
}

// ══════════════════════════════════════════════════════════════════════════
// PROCESAR TICK — núcleo del sistema
// ══════════════════════════════════════════════════════════════════════════
function onTick(asset, price) {
  const b   = buf[asset];
  const c   = cfg[asset];

  b.lastPrice = price;
  b.prices.push(price);

  // Mantener ventana de N ticks configurable
  while (b.prices.length > c.ticks) b.prices.shift();

  // Calcular Z-score
  b.currentZ = calcZ(b.prices);

  // Actualizar UI del activo
  updateAssetCard(asset);

  // Analizar si hay señal
  if (running && c.active) analyzeZ(asset);
}

// ══════════════════════════════════════════════════════════════════════════
// ANÁLISIS Z-SCORE PURO
// ══════════════════════════════════════════════════════════════════════════
function analyzeZ(asset) {
  const now = Date.now();
  const b   = buf[asset];
  const c   = cfg[asset];
  const st  = ast[asset];

  // Guards
  if (b.prices.length < c.ticks)        return; // ventana incompleta
  if (st.hasContract)                    return;
  if (now < pauseUntil)                  return;
  if (now < st.blockedUntil)             return;
  if (now - st.lastTrade < COOLDOWN_MS)  return;

  // Stop de sesión 5%
  if ((sessionStart - balance) >= sessionStart * 0.05) {
    addLog('🛑 STOP DE SESIÓN — drawdown 5%', 'll');
    stopBot(); return;
  }

  const z   = b.currentZ;
  const thr = c.zThr;

  // SEÑAL PUT: Z extremo positivo → precio demasiado alto → reversión bajista
  if (z >= thr) {
    addLog(`🔴 PUT ${LABELS[asset]} Z:${z.toFixed(3)} ≥ ${thr} | ${c.ticks}ticks | ${c.duration}min`, 'lk');
    executeTrade(asset, 'PUT', z);
    return;
  }

  // SEÑAL CALL: Z extremo negativo → precio demasiado bajo → reversión alcista
  if (z <= -thr) {
    addLog(`🟢 CALL ${LABELS[asset]} Z:${z.toFixed(3)} ≤ -${thr} | ${c.ticks}ticks | ${c.duration}min`, 'lk');
    executeTrade(asset, 'CALL', z);
    return;
  }
}

// ══════════════════════════════════════════════════════════════════════════
// EJECUTAR TRADE
// ══════════════════════════════════════════════════════════════════════════
function getStake() {
  const base   = parseFloat(document.getElementById('stake').value) || 1;
  const ddPct  = (sessionStart - balance) / sessionStart;
  if (ddPct > 0.03)  return Math.max(0.35, base * 0.5);
  if (ddPct > 0.015) return Math.max(0.35, base * 0.75);
  return base;
}

function executeTrade(asset, dir, z) {
  const stake    = getStake();
  const duration = cfg[asset].duration;

  ast[asset].lastTrade  = Date.now();
  ast[asset].hasContract = true;
  pendingAsset = asset;

  // Actualizar señal en UI
  const sigV = document.getElementById('sigV');
  sigV.innerText = `${dir} ${LABELS[asset]}`;
  sigV.style.color = dir === 'CALL' ? 'var(--up)' : 'var(--dn)';
  document.getElementById('sigD').innerText =
    `Z:${z.toFixed(3)} · ${cfg[asset].ticks} ticks · ${duration}min · $${stake}`;

  ws.send(JSON.stringify({
    proposal: 1,
    amount: stake,
    basis: 'stake',
    contract_type: dir,
    currency: 'USD',
    duration: duration,
    duration_unit: 'm',
    symbol: asset
  }));

  updateAssetCard(asset);
}

// ══════════════════════════════════════════════════════════════════════════
// RESULTADO
// ══════════════════════════════════════════════════════════════════════════
function onResult(asset, pnl) {
  ast[asset].hasContract = false;
  balance += pnl;
  const isWin = pnl > 0;

  if (isWin) {
    wins++;
    lossStreak = 0;
    ast[asset].lossStreak = 0;
  } else {
    losses++;
    lossStreak++;
    ast[asset].lossStreak++;
    if (ast[asset].lossStreak >= LOSS_BLOCK_AFTER) {
      ast[asset].blockedUntil = Date.now() + LOSS_BLOCK_MS;
      ast[asset].lossStreak   = 0;
      addLog(`🔴 ${LABELS[asset]} bloqueado 90s por ${LOSS_BLOCK_AFTER} pérdidas`, 'll');
    }
    if (lossStreak >= 3) {
      pauseUntil = Date.now() + GLOBAL_PAUSE_MS;
      lossStreak = 0;
      addLog('⏸ Pausa global 40s — 3 pérdidas consecutivas', 'll');
    }
  }

  addLog(
    `${isWin ? '✅ WIN' : '❌ LOSS'} ${LABELS[asset]} PnL:$${pnl.toFixed(2)} Bal:$${balance.toFixed(2)}`,
    isWin ? 'lw' : 'll'
  );
  updateStats();
  updateAssetCard(asset);
}

// ══════════════════════════════════════════════════════════════════════════
// UI — construir cards por activo con parámetros editables
// ══════════════════════════════════════════════════════════════════════════
function buildAssetCards() {
  document.getElementById('acpGrid').innerHTML = ASSETS.map(a => {
    const c = cfg[a];
    return `
    <div class="acp-card" id="card_${a}">
      <div class="acp-sym">
        <span class="acp-sym-name">${LABELS[a]}</span>
        <span class="acp-sym-price" id="price_${a}">---</span>
      </div>

      <div class="acp-row">
        <span class="acp-lbl">UMBRAL Z ±</span>
        <input type="number" class="acp-inp" id="zt_${a}"
          value="${c.zThr}" min="0.5" max="5" step="0.1"
          onchange="cfg['${a}'].zThr=parseFloat(this.value);addLog('⚙️ ${LABELS[a]} umbral Z → '+this.value)">
      </div>

      <div class="acp-row">
        <span class="acp-lbl">TICKS VENTANA</span>
        <input type="number" class="acp-inp" id="tk_${a}"
          value="${c.ticks}" min="5" max="200" step="5"
          onchange="cfg['${a}'].ticks=parseInt(this.value);buf['${a}'].prices=[];addLog('⚙️ ${LABELS[a]} ticks → '+this.value)">
      </div>

      <div class="acp-row">
        <span class="acp-lbl">DURACIÓN (min)</span>
        <input type="number" class="acp-inp" id="dur_${a}"
          value="${c.duration}" min="1" max="5" step="1"
          onchange="cfg['${a}'].duration=parseInt(this.value);addLog('⚙️ ${LABELS[a]} duración → '+this.value+'min')">
      </div>

      <div class="acp-row">
        <span class="acp-lbl">ACTIVO</span>
        <input type="checkbox" id="act_${a}" ${c.active ? 'checked' : ''}
          style="width:18px;height:18px;accent-color:var(--up);cursor:pointer"
          onchange="cfg['${a}'].active=this.checked;addLog('⚙️ ${LABELS[a]} → '+(this.checked?'ON':'OFF'))">
      </div>

      <!-- Z METER -->
      <div class="z-meter-wrap">
        <div class="z-meter-lbl">
          <span>-${c.zThr}</span>
          <span style="color:var(--mt)">Z-SCORE</span>
          <span>+${c.zThr}</span>
        </div>
        <div class="z-meter-track" id="ztrack_${a}">
          <div class="z-center-line"></div>
          <div class="z-bar" id="zbar_${a}"></div>
          <div class="z-thr-line" id="zthrL_${a}" style="right:auto"></div>
          <div class="z-thr-line" id="zthrR_${a}" style="right:auto"></div>
        </div>
      </div>

      <div class="acp-zval" id="zval_${a}" style="color:var(--mt)">0.000</div>
      <div class="acp-meta" id="zmeta_${a}">0 / ${c.ticks} ticks</div>
      <div class="acp-signal" id="zsig_${a}" style="color:var(--mt)">SCAN</div>
    </div>`;
  }).join('');
}

function updateAssetCard(a) {
  const b   = buf[a];
  const c   = cfg[a];
  const st  = ast[a];
  const now = Date.now();
  const z   = b.currentZ;
  const thr = c.zThr;
  const abs = Math.abs(z);

  // Price
  const prEl = document.getElementById('price_' + a);
  if (prEl && b.lastPrice) prEl.innerText = b.lastPrice.toFixed(3);

  // Z value color
  const zColor = abs >= thr ? (z > 0 ? 'var(--dn)' : 'var(--up)') :
    abs >= thr * 0.7 ? 'var(--go)' : 'var(--mt)';

  const zvEl = document.getElementById('zval_' + a);
  if (zvEl) { zvEl.innerText = z.toFixed(3); zvEl.style.color = zColor; }

  // Meta
  const zmEl = document.getElementById('zmeta_' + a);
  if (zmEl) zmEl.innerText = `${b.prices.length} / ${c.ticks} ticks`;

  // Z bar — mapear z a posición en la barra (centro = 50%)
  const zbar = document.getElementById('zbar_' + a);
  if (zbar) {
    const maxZ   = Math.max(thr * 1.5, 3);
    const pct    = Math.min(1, abs / maxZ);
    const width  = pct * 50;
    if (z > 0) {
      zbar.style.left      = '50%';
      zbar.style.width     = width + '%';
      zbar.style.background = abs >= thr ? 'var(--dn)' : 'var(--go)';
    } else {
      zbar.style.left  = (50 - width) + '%';
      zbar.style.width = width + '%';
      zbar.style.background = abs >= thr ? 'var(--up)' : 'var(--go)';
    }
  }

  // Umbral lines
  const maxZ = Math.max(thr * 1.5, 3);
  const thrPct = Math.min(50, (thr / maxZ) * 50);
  const thrL = document.getElementById('zthrL_' + a);
  const thrR = document.getElementById('zthrR_' + a);
  if (thrL) { thrL.style.left = (50 - thrPct) + '%'; thrL.style.background = 'var(--up)'; }
  if (thrR) { thrR.style.left = (50 + thrPct) + '%'; thrR.style.background = 'var(--dn)'; }

  // Signal label
  const sigEl = document.getElementById('zsig_' + a);
  const card  = document.getElementById('card_' + a);
  if (!sigEl || !card) return;

  if (!c.active) {
    sigEl.innerText = 'INACTIVO'; sigEl.style.color = 'var(--mt)';
    card.className = 'acp-card'; return;
  }
  if (st.hasContract) {
    sigEl.innerText = 'CONTRATO ABIERTO'; sigEl.style.color = 'var(--cy)';
    card.className = 'acp-card'; return;
  }
  if (now < st.blockedUntil) {
    sigEl.innerText = 'BLOQ ' + Math.ceil((st.blockedUntil - now) / 1000) + 's';
    sigEl.style.color = 'var(--dn)'; card.className = 'acp-card blocked'; return;
  }
  if (now < pauseUntil) {
    sigEl.innerText = 'PAUSA ' + Math.ceil((pauseUntil - now) / 1000) + 's';
    sigEl.style.color = 'var(--go)'; card.className = 'acp-card'; return;
  }
  if (b.prices.length < c.ticks) {
    sigEl.innerText = 'CARGANDO...'; sigEl.style.color = 'var(--mt)';
    card.className = 'acp-card'; return;
  }

  if (z >= thr) {
    sigEl.innerText = '▼ PUT READY'; sigEl.style.color = 'var(--dn)';
    card.className = 'acp-card active-dn';
  } else if (z <= -thr) {
    sigEl.innerText = '▲ CALL READY'; sigEl.style.color = 'var(--up)';
    card.className = 'acp-card active-up';
  } else {
    sigEl.innerText = 'SCAN'; sigEl.style.color = 'var(--mt)';
    card.className = 'acp-card';
  }
}

function updateStats() {
  document.getElementById('stW').innerText   = wins;
  document.getElementById('stL').innerText   = losses;
  const tot = wins + losses;
  document.getElementById('stWR').innerText  = tot > 0 ? ((wins/tot)*100).toFixed(1)+'%' : '0%';
  document.getElementById('stOps').innerText = tot;
  const pnl = balance - sessionStart;
  const pEl = document.getElementById('stPnL');
  pEl.innerText   = (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(2);
  pEl.className   = 'stat-v ' + (pnl >= 0 ? 'g' : 'r');
  document.getElementById('balVal').innerText = '$' + balance.toFixed(2);

  const dd   = Math.max(0, sessionStart - balance);
  const ddEl = document.getElementById('sfDD');
  ddEl.innerText     = '$' + dd.toFixed(2);
  ddEl.style.color   = dd > 0 ? 'var(--dn)' : 'var(--up)';
  document.getElementById('sfStop').innerText  = '$' + (sessionStart * 0.05).toFixed(2);
  const skEl = document.getElementById('sfStr');
  skEl.innerText     = lossStreak;
  skEl.style.color   = lossStreak >= 2 ? 'var(--dn)' : 'var(--go)';
  const now  = Date.now();
  const cEl  = document.getElementById('sfCool');
  if (pauseUntil > now) {
    cEl.innerText    = Math.ceil((pauseUntil - now)/1000) + 's';
    cEl.style.color  = 'var(--dn)';
  } else {
    cEl.innerText    = 'OK';
    cEl.style.color  = 'var(--up)';
  }
}

function addLog(msg, cls = '') {
  const t  = new Date().toLocaleTimeString();
  const d  = document.createElement('div');
  d.className   = cls;
  d.textContent = '[' + t + '] ' + msg;
  const el = document.getElementById('logDiv');
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

// ══════════════════════════════════════════════════════════════════════════
// WEBSOCKET
// ══════════════════════════════════════════════════════════════════════════
function startBot() {
  const token = document.getElementById('apiToken').value.trim();
  if (!token) { addLog('❌ Ingresa tu token API', 'll'); return; }
  if (running) return;

  balance = 100; sessionStart = 100;
  wins = 0; losses = 0; lossStreak = 0; pauseUntil = 0;
  ASSETS.forEach(a => { initBuf(a); initAst(a); });
  c2a = {};
  pendingAsset = null;
  running = true;

  const btn = document.getElementById('toggleBtn');
  btn.innerText = '⏹ DETENER'; btn.className = 'btn btn-st';
  document.getElementById('statusTxt').innerText = 'CONECTANDO...';
  document.getElementById('onlineDot').className = 'dot';
  document.getElementById('statusDot').className = 'dot';

  ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');

  ws.onopen = () => {
    ws.send(JSON.stringify({ authorize: token }));
    addLog('🔌 Conectando a Deriv WebSocket...', 'li');
  };

  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);

    // ── AUTORIZACIÓN ────────────────────────────────────────────────
    if (d.authorize) {
      balance     = d.authorize.balance;
      sessionStart = balance;
      addLog('✅ Autorizado · Balance: $' + balance.toFixed(2), 'li');
      document.getElementById('statusTxt').innerText = 'ONLINE — SUSCRIBIENDO TICKS...';
      document.getElementById('onlineDot').className = 'dot on';
      document.getElementById('statusDot').className = 'dot on';

      // Suscribir ticks de los activos activos
      ASSETS.forEach(a => {
        ws.send(JSON.stringify({ ticks: a, subscribe: 1 }));
      });
      ws.send(JSON.stringify({ balance: 1 }));
      updateStats();
      document.getElementById('statusTxt').innerText = 'ONLINE — Z-SCORE ENGINE ACTIVO';
    }

    // ── BALANCE ─────────────────────────────────────────────────────
    if (d.balance) { balance = d.balance.balance; updateStats(); }

    // ── TICK — corazón del sistema ────────────────────────────────
    if (d.tick) {
      const sym   = d.tick.symbol;
      const price = parseFloat(d.tick.quote);
      if (buf[sym] !== undefined) onTick(sym, price);
    }

    // ── PROPOSAL ────────────────────────────────────────────────────
    if (d.proposal && d.proposal.id) {
      if (pendingAsset) {
        c2a[d.proposal.id] = pendingAsset;
        pendingAsset = null;
      }
      ws.send(JSON.stringify({
        buy: d.proposal.id,
        price: parseFloat(document.getElementById('stake').value) || 1
      }));
    }

    // ── BUY ─────────────────────────────────────────────────────────
    if (d.buy) {
      const cid = d.buy.contract_id;
      // Mover el mapeo del proposal_id al contract_id real
      const propId = Object.keys(c2a).find(k => typeof c2a[k] === 'string' && k !== String(cid));
      if (propId) {
        const sym = c2a[propId];
        delete c2a[propId];
        c2a[cid] = sym;
        ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: cid, subscribe: 1 }));
        addLog('📋 Contrato ' + LABELS[sym] + ' ID:' + cid, 'li');
      } else if (c2a[cid]) {
        ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: cid, subscribe: 1 }));
        addLog('📋 Contrato ' + (LABELS[c2a[cid]] || cid), 'li');
      }
    }

    // ── RESULTADO ────────────────────────────────────────────────────
    if (d.proposal_open_contract && d.proposal_open_contract.is_sold) {
      const poc = d.proposal_open_contract;
      const sym = c2a[poc.contract_id] || ASSETS.find(a => poc.underlying === a);
      if (sym) {
        delete c2a[poc.contract_id];
        onResult(sym, parseFloat(poc.profit));
      }
    }

    if (d.error) addLog('⚠️ ' + d.error.message + ' (' + d.error.code + ')', 'll');
  };

  ws.onerror  = () => { addLog('❌ Error WebSocket', 'll'); stopBot(); };
  ws.onclose  = () => { if (running) { addLog('🔌 Conexión cerrada', 'll'); running = false; updateBtn(); } };
}

function stopBot() {
  if (!running) return;
  running = false;
  if (ws) { try { ws.close(); } catch(e) {} }
  document.getElementById('statusTxt').innerText = 'OFFLINE';
  document.getElementById('onlineDot').className = 'dot';
  document.getElementById('statusDot').className = 'dot';
  updateBtn();
  const tot = wins + losses;
  addLog(`🛑 Detenido | Ops:${tot} Wins:${wins} WR:${tot>0?((wins/tot)*100).toFixed(1):0}%`);
}

function updateBtn() {
  const btn = document.getElementById('toggleBtn');
  btn.innerText = running ? '⏹ DETENER' : '▶ INICIAR BOT';
  btn.className = running ? 'btn btn-st' : 'btn btn-go';
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.getElementById('toggleBtn').onclick = () => running ? stopBot() : startBot();
buildAssetCards();
updateStats();
ASSETS.forEach(updateAssetCard);

addLog('⚡ Z·BOT cargado — lógica única: Z-score puro sobre ticks en tiempo real', 'li');
addLog('📐 Z ≥ +umbral → PUT | Z ≤ -umbral → CALL', 'li');
addLog('⚙️ Configura umbral Z, ticks y duración por activo antes de iniciar', 'li');
addLog('🛡 Protección: stop 5% · bloqueo 2 pérdidas por activo · pausa global 3 pérdidas', 'li');
</script>
