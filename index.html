<!DOCTYPE html>
<html>
<head>
<title>🤖 BOT PRO FINAL IA</title>
<style>
body { background:#0d0d0d; color:#fff; font-family:sans-serif; text-align:center; }
button { padding:12px; margin:8px; font-size:16px; border:none; border-radius:5px; }
.start { background:green; }
.stop { background:red; }
select { padding:8px; margin:5px; background:#222; color:#fff; }
</style>
</head>
<body>

<h2>🤖 BOT PRO IA MULTI-ACTIVOS</h2>

<select id="accountType">
<option value="demo">🟢 Demo</option>
<option value="real">🔴 Real</option>
</select>

<select id="mode">
<option value="safe">🛡️ Conservador</option>
<option value="mid">⚖️ Balanceado</option>
<option value="sniper">🔥 Sniper</option>
</select>

<button class="start" onclick="startConfirm()">Iniciar</button>
<button class="stop" onclick="stopBot()">Stop</button>

<p id="status">OFF</p>
<p id="balance">Balance: 0</p>
<p id="profit">Profit: 0</p>

<script>

// 🔐 TOKENS
const tokens = {
  demo: "***********Hosg",
  real: "CR_TU_TOKEN_REAL"
};

// ACTIVOS
const symbols = [
"R_100","R_75","R_50","R_25","R_10",
"BOOM1000","CRASH1000","BOOM500","CRASH500"
];

let ws, running=false;
let balance=0, stake=0;
let profit=0, wins=0, losses=0;
let lastTradeTime=0;
let paused=false;

let dataMap={};

// IA simple
let weights=[0.3,0.4,0.3];

//----------------------------------
// 🔐 DOBLE CONFIRMACIÓN
//----------------------------------

function startConfirm(){
let type=document.getElementById("accountType").value;

if(type==="real"){
if(!confirm("⚠️ VAS A USAR DINERO REAL")) return;
if(!confirm("⚠️ CONFIRMAR OPERAR EN REAL")) return;
}

startBot();
}

//----------------------------------

function startBot(){

if(running) return;

let type=document.getElementById("accountType").value;
let token=tokens[type];

// VALIDACIÓN CORRECTA
if(!token || token.includes("TU_TOKEN")){
alert("Coloca tus tokens DEMO y REAL");
return;
}

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({authorize:token}));
document.getElementById("status").innerText="Conectando...";
};

ws.onmessage=(msg)=>{

let d=JSON.parse(msg.data);

// ERROR
if(d.error){
alert(d.error.message);
stopBot();
return;
}

// AUTORIZADO
if(d.msg_type==="authorize"){

document.getElementById("status").innerText="ON";

symbols.forEach(s=>{
ws.send(JSON.stringify({ticks:s,subscribe:1}));
dataMap[s]=[];
});

ws.send(JSON.stringify({balance:1}));
}

// BALANCE
if(d.balance){
balance=d.balance.balance;

// riesgo automático
let mode=document.getElementById("mode").value;

let risk=0.005;
if(mode==="safe") risk=0.003;
if(mode==="sniper") risk=0.01;

stake=parseFloat((balance*risk).toFixed(2));
if(stake<0.35) stake=0.35;

document.getElementById("balance").innerText="Balance: "+balance.toFixed(2);
}

//----------------------------------
// 📊 TICKS + IA
//----------------------------------

if(d.msg_type==="tick" && !paused){

let sym=d.tick.symbol;
let price=parseFloat(d.tick.quote);

dataMap[sym].push(price);
if(dataMap[sym].length>50) dataMap[sym].shift();

let t=dataMap[sym];
if(t.length<30) return;

// cálculos
let returns=[];
for(let i=1;i<t.length;i++) returns.push(t[i]-t[i-1]);

let mean=avg(returns);
let std=stddev(returns,mean);

let lastMove=Math.abs(returns[returns.length-1]);
let trend=returns.slice(-5).reduce((a,b)=>a+b,0);
let z=(returns[returns.length-1]-mean)/std;

// FILTRO (detector)
if(std<0.001 || std>0.02) return;
if(lastMove>std*3) return;

// IA score
let score = trend*weights[0] + z*weights[1] + std*weights[2];

// SNIPER
let mode=document.getElementById("mode").value;
if(mode==="sniper"){
if(Math.abs(score)<0.8) return;
if(Math.abs(z)<1.5) return;
}

// cooldown
let now=Date.now();
if(now-lastTradeTime<5000) return;

// decisión
let decision=null;

if(sym.includes("CRASH") && score>0.5) decision="CALL";
if(sym.includes("BOOM") && score>0.5) decision="PUT";

if(sym.includes("R_")){
if(score>0.6) decision="CALL";
if(score<-0.6) decision="PUT";
}

// ejecutar
if(decision){
trade(sym,decision);
lastTradeTime=now;
}

}

//----------------------------------
// RESULTADOS
//----------------------------------

if(d.msg_type==="proposal_open_contract"){
if(d.proposal_open_contract.is_sold){

let pnl=parseFloat(d.proposal_open_contract.profit);

profit+=pnl;

if(pnl>0){
wins++;
weights=weights.map(w=>Math.min(1,w+0.01));

// subir stake suave
stake=Math.min(balance*0.03, stake*1.02);

}else{
losses++;
weights=weights.map(w=>Math.max(-1,w-0.01));

// bajar riesgo
stake=balance*0.003;
}

// anti-ruina
if(losses>=5 || profit<-balance*0.1){
paused=true;
document.getElementById("status").innerText="PAUSA";

setTimeout(()=>{
paused=false;
losses=0;
document.getElementById("status").innerText="ON";
},120000);
}

document.getElementById("profit").innerText="Profit: "+profit.toFixed(2);

}
}

};

running=true;
}

//----------------------------------

function trade(symbol,type){

let amount=parseFloat(stake.toFixed(2));
if(amount<0.35) amount=0.35;

ws.send(JSON.stringify({
proposal:1,
amount:amount,
basis:"stake",
contract_type:type,
currency:"USD",
duration:5,
duration_unit:"t",
symbol:symbol
}));

window.pending=true;

}

//----------------------------------

function stopBot(){
if(ws) ws.close();
running=false;
document.getElementById("status").innerText="OFF";
}

//----------------------------------

function avg(arr){ return arr.reduce((a,b)=>a+b,0)/arr.length; }

function stddev(arr,mean){
return Math.sqrt(arr.map(x=>Math.pow(x-mean,2))
.reduce((a,b)=>a+b,0)/arr.length);
}

</script>
</body>
</html>
