<script>

// ================== CONFIG SNIPER ==================
const SNIPER_CONFIG = {
  R_10:  { zEntry: 2.5, ticks: 4 },
  R_25:  { zEntry: 2.8, ticks: 5 },
  R_50:  { zEntry: 3.0, ticks: 6 },
  R_75:  { zEntry: 3.2, ticks: 7 },
  R_100: { zEntry: 3.5, ticks: 9 }
};

// ================== VARIABLES ==================
let running = false;
let paused = false;
let lossStreak = 0;

let wins = 0;
let losses = 0;
let totalOps = 0;
let profit = 0;

// ================== API CONFIG ==================
// 🔥 AQUI COLOCAS TU TOKEN REAL
const API_TOKEN = "e1lRgxNoxWwBkzx";
const APP_ID = "1089"; // puedes cambiarlo

let ws;

// ================== CONEXIÓN ==================
function connectAPI(){

  ws = new WebSocket(`wss://ws.deriv.com/websockets/v3?app_id=${APP_ID}`);

  ws.onopen = () => {
    log("🔌 Conectado a Deriv", "lg");

    ws.send(JSON.stringify({
      authorize: API_TOKEN
    }));
  };

  ws.onmessage = (msg) => {
    let data = JSON.parse(msg.data);

    // 👉 aquí debes conectar tu feed real si ya lo tienes
  };

// ================== UTIL ==================
function log(msg, type="li"){
  console.log(msg);
}

// ================== FILTROS ==================
function sniperTrendOK(trend){
  return trend < 70;
}

function sniperReversal(ticks){
  if (!ticks || ticks.length < 3) return false;

  let a = ticks[ticks.length - 1];
  let b = ticks[ticks.length - 2];
  let c = ticks[ticks.length - 3];

  return (c > b && b < a) || (c < b && b > a);
}

function sniperShouldEnter({ zScore, trend, ticks, symbol }){

  let conf = SNIPER_CONFIG[symbol];
  if (!conf) return false;

  let zOk = Math.abs(zScore) >= conf.zEntry;
  let trendOk = sniperTrendOK(trend);
  let reversalOk = sniperReversal(ticks);

  return zOk && trendOk && reversalOk;
}

// ================== DIRECCIÓN ==================
function sniperDirection(zScore){
  if (zScore > 0) return "PUT";
  if (zScore < 0) return "CALL";
  return null;
}

// ================== CONTROL RIESGO ==================
function sniperOnResult(win){

  if (win){
    lossStreak = 0;
    wins++;
  } else {
    lossStreak++;
    losses++;
  }

  totalOps++;

  if (lossStreak >= 2){
    paused = true;
    log("⛔ PAUSA 10 MIN", "ls");

    setTimeout(()=>{
      paused = false;
      lossStreak = 0;
      log("✅ REACTIVADO", "lg");
    }, 600000);
  }

  updateUI();
}

// ================== EJECUCIÓN REAL ==================
function ejecutarTrade(symbol, direction){

  let conf = SNIPER_CONFIG[symbol];

  log(`🎯 ${symbol} ${direction}`, "lx");

  // ======================
  // 🔥 AQUI VA TU COMPRA REAL
  // ======================

  /*
  ws.send(JSON.stringify({
    buy: 1,
    price: 1,
    parameters: {
      amount: 1,
      basis: "stake",
      contract_type: direction === "CALL" ? "CALL" : "PUT",
      currency: "USD",
      duration: conf.ticks,
      duration_unit: "t",
      symbol: symbol
    }
  }));
  */

  // ======================
  // 🔥 SIMULACIÓN (BORRAR CUANDO USES API)
  let win = Math.random() > 0.35;

  if (win){
    profit += 0.95;
    log("✅ WIN");
  } else {
    profit -= 1;
    log("❌ LOSS");
  }

  sniperOnResult(win);
}

// ================== PROCESADOR ==================
function processSignal(data){

  if (!running || paused) return;

  let { zScore, trend, ticks, symbol } = data;

  if (!sniperShouldEnter({ zScore, trend, ticks, symbol })){
    log(`🚫 ${symbol} filtrado`, "linv");
    return;
  }

  let direction = sniperDirection(zScore);
  if (!direction) return;

  ejecutarTrade(symbol, direction);
}

// ================== UI ==================
function updateUI(){

  let wr = totalOps > 0 ? ((wins / totalOps) * 100).toFixed(1) : 0;

  document.getElementById("wr").innerText = wr + "%";
  document.getElementById("bal").innerText = profit.toFixed(2);
  document.getElementById("prof").innerText = profit.toFixed(2);
  document.getElementById("lossEl").innerText = losses;
}

// ================== BOT ==================
function toggle(){

  running = !running;

  let btn = document.getElementById("btnT");

  if (running){
    btn.innerText = "⛔ DETENER";
    btn.classList.add("stop");

    connectAPI();
    fakeFeed();

  } else {
    btn.innerText = "▶ INICIAR";
    btn.classList.remove("stop");
  }
}

// ================== SIMULADOR ==================
function fakeFeed(){

  setInterval(()=>{

    if (!running) return;

    let symbols = ["R_10","R_25","R_50"];

    let symbol = symbols[Math.floor(Math.random()*symbols.length)];

    let data = {
      symbol,
      zScore: (Math.random()*6 - 3),
      trend: Math.random()*100,
      ticks: [
        Math.random()*100,
        Math.random()*100,
        Math.random()*100
      ]
    };

    processSignal(data);

  }, 2000);
}

</script>
