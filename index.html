<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SNIPER PRO FX TERMINAL</title>

<style>
body{
  background:#02060d;
  color:#00ff9c;
  font-family:monospace;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
  background:#050a14;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,255,150,0.1);
}

.title{
  font-size:18px;
  margin-bottom:15px;
  color:#00ffc3;
}

.code-block{
  background:#000;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
}

.code-line{
  margin:3px 0;
}

.key{color:#00ffc3;}
.var{color:#ffcc00;}
.str{color:#00ff9c;}

input, select{
  width:100%;
  background:#000;
  color:#00ff9c;
  border:none;
  padding:8px;
  margin-top:5px;
  font-family:monospace;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#00ffc3;
  color:#000;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.status{
  margin-top:10px;
  padding:8px;
  background:#000;
  border-radius:6px;
}

.log{
  background:#000;
  height:140px;
  overflow:auto;
  margin-top:10px;
  padding:8px;
  font-size:11px;
}

.green{color:#00ff9c;}
.red{color:#ff4d4d;}
.yellow{color:#ffcc00;}
</style>
</head>

<body>

<div class="container">

<div class="title">[ SNIPER PRO FX TERMINAL ]</div>

<div class="code-block">
  <div class="code-line"><span class="key">const</span> API_TOKEN =</div>
  <input type="text" id="token" placeholder="e1lRgxNoxWwBkzx">
</div>

<div class="code-block">
  <div class="code-line"><span class="key">const</span> STAKE =</div>
  <input type="number" id="stake" value="0.5">
</div>

<div class="code-block">
  <div class="code-line"><span class="key">const</span> SYMBOL =</div>
  <select id="symbol">
    <option value="frxEURUSD">"EURUSD"</option>
    <option value="frxGBPUSD">"GBPUSD"</option>
    <option value="frxUSDJPY">"USDJPY"</option>
  </select>
</div>

<button id="toggle">[ START BOT ]</button>

<div class="status" id="mode">STATUS: IDLE</div>

<div class="code-block">
  <div>WINS: <span id="wins">0</span></div>
  <div>LOSSES: <span id="losses">0</span></div>
  <div>BALANCE: <span id="balance">0</span></div>
</div>

<div class="log" id="log"></div>

</div>

<script>
let ws;
let running=false;

let wins=0;
let losses=0;
let balance=0;

let candles=[];
let lastTradeTime=0;
let lossStreak=0;

document.getElementById("toggle").onclick=()=>{
 running=!running;

 if(running){
  start();
  toggle.innerText="[ STOP BOT ]";
 }else{
  ws.close();
  toggle.innerText="[ START BOT ]";
 }
};

function log(msg,type=""){
 let el=document.getElementById("log");
 let color = type==="win"?"green":type==="loss"?"red":"yellow";
 el.innerHTML += "<div class='"+color+"'>"+msg+"</div>";
 el.scrollTop = el.scrollHeight;
}

function setMode(m){
 document.getElementById("mode").innerText="STATUS: " + m;
}

function start(){
 let token=document.getElementById("token").value;

 ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

 ws.onopen=()=>{
  ws.send(JSON.stringify({authorize:token}));
 };

 ws.onmessage=(msg)=>{
  let data=JSON.parse(msg.data);

  if(data.msg_type==="authorize"){
   log(">> conectado");
   getCandles();
  }

  if(data.msg_type==="candles"){
   candles=data.candles.map(c=>c.close);
   sniper();
  }

  if(data.msg_type==="proposal_open_contract"){
   if(data.proposal_open_contract.is_sold){

    let p=data.proposal_open_contract.profit;

    if(p>0){
     wins++;
     balance+=p;
     lossStreak=0;
     log("WIN +" + p,"win");
    }else{
     losses++;
     balance+=p;
     lossStreak++;
     log("LOSS " + p,"loss");
    }

    update();

    if(lossStreak>=2){
     setMode("STOP LOSS");
     running=false;
     ws.close();
     toggle.innerText="[ START BOT ]";
    }
   }
  }
 };
}

function getCandles(){
 let symbol=document.getElementById("symbol").value;

 ws.send(JSON.stringify({
  ticks_history:symbol,
  granularity:60,
  count:30,
  style:"candles"
 }));
}

function ema(p,d){
 let k=2/(p+1);
 let arr=[d[0]];

 for(let i=1;i<d.length;i++){
  arr.push(d[i]*k + arr[i-1]*(1-k));
 }

 return arr;
}

function sniper(){
 if(candles.length<15)return;

 let ema3=ema(3,candles).pop();
 let ema9=ema(9,candles).pop();

 let last=candles[candles.length-1];
 let prev=candles[candles.length-2];

 let diff=Math.abs(ema3-ema9);
 let now=Date.now();

 if(now-lastTradeTime<60000)return;

 if(diff<0.00008){
  setMode("LATERAL");
  return;
 }

 if(ema3>ema9 && last>prev){
  setMode("CALL");
  trade("CALL");
  lastTradeTime=now;
 }

 else if(ema3<ema9 && last<prev){
  setMode("PUT");
  trade("PUT");
  lastTradeTime=now;
 }

 else{
  setMode("WAIT");
 }
}

function trade(type){
 let stake=parseFloat(document.getElementById("stake").value);
 let symbol=document.getElementById("symbol").value;

 log(">> trade " + type);

 ws.send(JSON.stringify({
  buy:1,
  price:stake,
  parameters:{
   amount:stake,
   basis:"stake",
   contract_type:type,
   currency:"USD",
   duration:1,
   duration_unit:"m",
   symbol:symbol
  }
 }));
}

function update(){
 document.getElementById("wins").innerText=wins;
 document.getElementById("losses").innerText=losses;
 document.getElementById("balance").innerText=balance.toFixed(2);
}
</script>

</body>
</html>
