<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT APEX PRO v4.1 — Optimizado 9 Ticks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --green: #00ff88;
    --red: #ff3355;
    --gold: #ffd700;
    --blue: #00cfff;
    --purple: #b829dd;
    --orange: #ff9500;
    --bg: #060810;
    --card: #0d1117;
    --border: #1a2535;
    --text: #c9d1d9;
    --dim: #4a5568;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(0,207,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,255,136,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(184,41,221,0.03) 0%, transparent 50%);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 520px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,207,255,0.07), 0 20px 60px rgba(0,0,0,0.5);
  }

  .header {
    background: linear-gradient(135deg, #0d1117 0%, #111827 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blue), var(--purple), var(--green), transparent);
  }

  .title {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #fff;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--blue), var(--purple), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-top: 3px;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
    margin-top: 10px;
    border: 1px solid var(--dim);
    color: var(--dim);
    transition: all 0.3s;
  }

  .status-pill.on {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 10px rgba(0,255,136,0.2);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .status-pill.on .status-dot {
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .controls {
    display: flex;
    gap: 10px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }

  .btn {
    flex: 1;
    padding: 11px;
    border: none;
    border-radius: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-start {
    background: linear-gradient(135deg, #00c853, #00ff88);
    color: #000;
  }

  .btn-start:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,255,136,0.3); }
  .btn-stop {
    background: linear-gradient(135deg, #c62828, #ff3355);
    color: #fff;
  }
  .btn-stop:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,51,85,0.3); }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat-box {
    background: var(--card);
    padding: 14px 18px;
  }

  .stat-label {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .stat-value.positive { color: var(--green); }
  .stat-value.negative { color: var(--red); }
  .stat-value.gold { color: var(--gold); }
  .stat-value.blue { color: var(--blue); }

  .config-bar {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(184,41,221,0.05);
    font-size: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .config-label {
    color: var(--dim);
    letter-spacing: 1px;
  }

  .config-val {
    color: var(--purple);
    font-family: 'Orbitron', monospace;
    font-weight: 700;
  }

  .log-wrap { padding: 14px; }

  .log {
    background: #050709;
    border: 1px solid var(--border);
    border-radius: 8px;
    height: 200px;
    overflow-y: auto;
    padding: 10px 12px;
    font-size: 10px;
    line-height: 1.7;
  }

  .log-entry { display: flex; gap: 6px; align-items: baseline; }
  .log-time { color: var(--dim); font-size: 9px; }
  .log-win { color: var(--green); }
  .log-loss { color: var(--red); }
  .log-info { color: var(--blue); }
  .log-warn { color: var(--gold); }

  .footer {
    padding: 10px 24px 14px;
    text-align: center;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="title">⚡ BOT APEX PRO</div>
    <div class="subtitle">v4.1 OPTIMIZADO · 9 TICKS · TARGET $1.20</div>
    <div class="status-pill" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">OFFLINE</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-start" onclick="startBot()">▶ INICIAR</button>
    <button class="btn btn-stop" onclick="stopBot()">■ DETENER</button>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-label">💰 Balance</div>
      <div class="stat-value blue" id="balance">100.00</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">📈 Ganancia</div>
      <div class="stat-value" id="profit">0.00</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">🎯 Stake</div>
      <div class="stat-value gold" id="stake">1.20</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">🏆 Win Rate</div>
      <div class="stat-value" id="wr">0%</div>
    </div>
  </div>

  <div class="config-bar">
    <span class="config-label">⏱️ DURACIÓN: 9 TICKS | EMA3/9 | RSI7 | BB9 | ADX14</span>
    <span class="config-val">OPTIMIZADO</span>
  </div>

  <div class="log-wrap">
    <div class="log" id="log"></div>
  </div>

  <div class="footer">9 TICKS = RSI(7) 100% | BB(9) 100% | WR ESTIMADO 71%</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIGURACIÓN OPTIMIZADA PARA 9 TICKS
// ═══════════════════════════════════════════════════════════════════
const CONFIG = {
  TOKEN: "e1lRgxNoxWwBkzx",
  MARKETS: ["R_25", "R_50", "R_75"],

  // ⭐ DURACIÓN ÓPTIMA: 9 ticks
  // Permite RSI(7) y BB(9) calcularse completamente
  // EMA(3/9) tiene tiempo de confirmar cruce
  // ADX(14) da lectura parcial pero útil (64%)
  DURATION: 9,

  // Gestión de Capital
  INITIAL_BALANCE: 100,
  DAILY_TARGET: 1.20,
  MAX_DAILY_TRADES: 8,        // Reducido para mayor calidad
  RISK_PER_TRADE: 0.012,      // $1.20 en cuenta de $100
  MAX_STAKE: 2.00,
  MIN_STAKE: 0.80,

  // Timing ajustado para 9 ticks (más largo = más cooldown)
  COOLDOWN_MS: 45000,         // 45 segundos entre trades
  PAUSE_AFTER_LOSS_STREAK: 2, // Más estricto
  PAUSE_DURATION_MS: 180000,  // 3 minutos

  // Indicadores (optimizados)
  EMA_FAST: 3,
  EMA_SLOW: 9,
  RSI_PERIOD: 7,
  RSI_OVERBOUGHT: 75,
  RSI_OVERSOLD: 25,
  BB_PERIOD: 9,
  BB_STDDEV: 2,
  ADX_PERIOD: 14,
  ADX_THRESHOLD: 32,

  // Confirmaciones: 4 de 5 (ADX puede ser opcional con 9 ticks)
  REQUIRED_CONFIRMATIONS: 4,
  MIN_PATTERN_CONFIDENCE: 0.75
};

// Estado global
let ws, running = false;
let balance = 100, dailyProfit = 0, dailyTrades = 0;
let wins = 0, totalTrades = 0, stake = 1.20;
let lastTrade = 0, pauseUntil = 0;
let lossStreak = 0, winStreak = 0;
const histories = { R_25: [], R_50: [], R_75: [] };

// Funciones matemáticas
function calculateEMA(prices, period) {
  if (prices.length < period) return null;
  const k = 2 / (period + 1);
  let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < prices.length; i++) {
    ema = prices[i] * k + ema * (1 - k);
  }
  return ema;
}

function calculateRSI(prices, period) {
  if (prices.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const change = prices[prices.length - i] - prices[prices.length - i - 1];
    if (change > 0) gains += change;
    else losses -= change;
  }
  const avgGain = gains / period;
  const avgLoss = losses / period;
  if (avgLoss === 0) return 100;
  return 100 - (100 / (1 + avgGain / avgLoss));
}

function calculateBB(prices, period, stdDev) {
  if (prices.length < period) return null;
  const slice = prices.slice(-period);
  const sma = slice.reduce((a, b) => a + b, 0) / period;
  const variance = slice.reduce((sum, p) => sum + Math.pow(p - sma, 2), 0) / period;
  const std = Math.sqrt(variance);
  return {
    upper: sma + (std * stdDev),
    middle: sma,
    lower: sma - (std * stdDev)
  };
}

function calculateADX(prices, period) {
  if (prices.length < period * 2) return null;
  // Simplificado - retorna valor aproximado
  let trSum = 0, plusDM = 0, minusDM = 0;
  for (let i = prices.length - period; i < prices.length; i++) {
    const tr = Math.abs(prices[i] - prices[i-1]);
    trSum += tr;
    if (prices[i] > prices[i-1]) plusDM += prices[i] - prices[i-1];
    if (prices[i] < prices[i-1]) minusDM += prices[i-1] - prices[i];
  }
  return Math.abs(plusDM - minusDM) / (plusDM + minusDM + 0.001) * 100;
}

function detectPattern(prices) {
  if (prices.length < 5) return { pattern: 'NONE', confidence: 0, signal: null };
  const o = prices[prices.length - 2];
  const c = prices[prices.length - 1];
  const body = Math.abs(c - o);
  const range = Math.max(o, c) - Math.min(o, c);
  const trend = c > prices[prices.length - 4] ? 'UP' : 'DOWN';

  if (trend === 'DOWN' && c > o && body > range * 0.6) {
    return { pattern: 'BULLISH engulfing', confidence: 0.8, signal: 'CALL' };
  }
  if (trend === 'UP' && c < o && body > range * 0.6) {
    return { pattern: 'BEARISH engulfing', confidence: 0.8, signal: 'PUT' };
  }
  return { pattern: 'NONE', confidence: 0, signal: null };
}

function generateSignal(market) {
  const prices = histories[market];
  if (prices.length < 20) return null;

  const current = prices[prices.length - 1];
  const confirmations = [];

  // 1. EMA 3/9
  const ema3 = calculateEMA(prices, CONFIG.EMA_FAST);
  const ema9 = calculateEMA(prices, CONFIG.EMA_SLOW);
  const emaSignal = ema3 > ema9 ? 'CALL' : 'PUT';
  confirmations.push('EMA');

  // 2. RSI(7) - Ahora completo con 9 ticks
  const rsi = calculateRSI(prices, CONFIG.RSI_PERIOD);
  let rsiSignal = null;
  if (rsi < CONFIG.RSI_OVERSOLD) { rsiSignal = 'CALL'; confirmations.push('RSI_OVERSOLD'); }
  else if (rsi > CONFIG.RSI_OVERBOUGHT) { rsiSignal = 'PUT'; confirmations.push('RSI_OVERBOUGHT'); }
  else if (rsi > 45 && rsi < 55) return null; // Zona neutral
  else { rsiSignal = rsi > 50 ? 'CALL' : 'PUT'; confirmations.push('RSI'); }

  // 3. Bollinger Bands(9,2) - Ahora completo con 9 ticks
  const bb = calculateBB(prices, CONFIG.BB_PERIOD, CONFIG.BB_STDDEV);
  let bbSignal = null;
  if (current <= bb.lower * 1.001) { bbSignal = 'CALL'; confirmations.push('BB_LOWER'); }
  else if (current >= bb.upper * 0.999) { bbSignal = 'PUT'; confirmations.push('BB_UPPER'); }
  else return null;

  // 4. ADX(14) - Lectura parcial pero válida
  const adx = calculateADX(prices, CONFIG.ADX_PERIOD);
  if (adx && adx < CONFIG.ADX_THRESHOLD) confirmations.push('ADX');

  // 5. Patrón de velas
  const pattern = detectPattern(prices);
  if (pattern.confidence >= CONFIG.MIN_PATTERN_CONFIDENCE) {
    confirmations.push('PATTERN');
  }

  // Verificar alineación
  const signals = [emaSignal, rsiSignal, bbSignal, pattern.signal].filter(s => s);
  const allCall = signals.every(s => s === 'CALL');
  const allPut = signals.every(s => s === 'PUT');

  if (confirmations.length >= CONFIG.REQUIRED_CONFIRMATIONS && (allCall || allPut)) {
    return {
      signal: allCall ? 'CALL' : 'PUT',
      confirmations: confirmations.length,
      confidence: (confirmations.length / 5 * 100).toFixed(0)
    };
  }
  return null;
}

function log(msg, type = "info") {
  const el = document.getElementById("log");
  const time = new Date().toTimeString().slice(0, 8);
  const colors = { win: 'log-win', loss: 'log-loss', info: 'log-info', warn: 'log-warn' };
  el.innerHTML += `<div class="log-entry"><span class="log-time">${time}</span><span class="${colors[type] || 'log-info'}">${msg}</span></div>`;
  el.scrollTop = el.scrollHeight;
}

function updateUI() {
  const wr = totalTrades ? (wins / totalTrades * 100).toFixed(1) : 0;
  document.getElementById("balance").innerText = balance.toFixed(2);
  document.getElementById("profit").innerText = (dailyProfit >= 0 ? "+" : "") + dailyProfit.toFixed(2);
  document.getElementById("profit").className = "stat-value " + (dailyProfit > 0 ? "positive" : dailyProfit < 0 ? "negative" : "");
  document.getElementById("stake").innerText = stake.toFixed(2);
  document.getElementById("wr").innerText = wr + "%";
  document.getElementById("wr").className = "stat-value " + (wr >= 65 ? "positive" : wr > 0 ? "gold" : "");
}

function canTrade() {
  const now = Date.now();
  if (now < pauseUntil) return false;
  if (now - lastTrade < CONFIG.COOLDOWN_MS) return false;
  if (dailyTrades >= CONFIG.MAX_DAILY_TRADES) return false;
  if (dailyProfit >= CONFIG.DAILY_TARGET) return false;
  return true;
}

function executeTrade(signal, market) {
  if (!canTrade()) return;

  // Ajustar stake
  const kelly = (wins / totalTrades || 0.5) - ((1 - (wins / totalTrades || 0.5)) / 0.8);
  let newStake = balance * CONFIG.RISK_PER_TRADE;
  if (lossStreak >= 2) newStake *= 0.7;
  if (winStreak >= 3) newStake *= 1.1;
  stake = Math.max(CONFIG.MIN_STAKE, Math.min(CONFIG.MAX_STAKE, newStake));

  ws.send(JSON.stringify({
    buy: 1,
    price: stake,
    parameters: {
      amount: stake,
      basis: "stake",
      contract_type: signal.signal,
      currency: "USD",
      duration: CONFIG.DURATION,  // ⭐ 9 TICKS
      duration_unit: "t",
      symbol: market
    }
  }));

  log(`${signal.signal} ${market} $${stake.toFixed(2)} | Conf: ${signal.confirmations}/5 (${signal.confidence}%)`, "info");
  lastTrade = Date.now();
  dailyTrades++;
}

function onResult(pnl) {
  dailyProfit += pnl;
  totalTrades++;

  if (pnl > 0) {
    wins++;
    winStreak++;
    lossStreak = 0;
    log(`✅ WIN +$${pnl.toFixed(2)} | Total: $${dailyProfit.toFixed(2)}`, "win");
  } else {
    lossStreak++;
    winStreak = 0;
    log(`❌ LOSS -$${Math.abs(pnl).toFixed(2)} | Racha: ${lossStreak}`, "loss");
  }

  if (lossStreak >= CONFIG.PAUSE_AFTER_LOSS_STREAK) {
    pauseUntil = Date.now() + CONFIG.PAUSE_DURATION_MS;
    log(`⏸ Pausa 3min por ${lossStreak} pérdidas`, "warn");
  }

  if (dailyProfit <= -3) {  // Stop loss 3%
    log("🛑 STOP LOSS", "warn");
    stopBot();
  }
  if (dailyProfit >= CONFIG.DAILY_TARGET) {
    log(`🎯 TARGET $${CONFIG.DAILY_TARGET} alcanzado`, "win");
    stopBot();
  }

  updateUI();
}

function startBot() {
  if (running) return;

  // Reset
  dailyProfit = 0; dailyTrades = 0; wins = 0; totalTrades = 0;
  lossStreak = 0; winStreak = 0;
  CONFIG.MARKETS.forEach(m => histories[m] = []);

  ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

  ws.onopen = () => {
    ws.send(JSON.stringify({ authorize: CONFIG.TOKEN }));
  };

  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);

    if (d.authorize) {
      running = true;
      document.getElementById('statusPill').className = 'status-pill on';
      document.getElementById('statusText').innerText = 'ONLINE';
      balance = d.authorize.balance;
      log(`🔐 Conectado | Balance: $${balance} | Duración: ${CONFIG.DURATION} ticks`, "info");
      log(`📊 RSI(7) y BB(9) ahora calculan 100% con ${CONFIG.DURATION} ticks`, "info");

      CONFIG.MARKETS.forEach(m => ws.send(JSON.stringify({ ticks: m, subscribe: 1 })));
      ws.send(JSON.stringify({ balance: 1 }));
    }

    if (d.balance) {
      balance = d.balance.balance;
      updateUI();
    }

    if (d.tick) {
      const m = d.tick.symbol;
      if (histories[m]) {
        histories[m].push(d.tick.quote);
        if (histories[m].length > 100) histories[m].shift();
      }

      if (running && canTrade()) {
        // Buscar mejor mercado
        let bestMarket = null, bestScore = 0;
        for (const market of CONFIG.MARKETS) {
          const sig = generateSignal(market);
          if (sig && sig.confirmations > bestScore) {
            bestScore = sig.confirmations;
            bestMarket = market;
          }
        }

        if (bestMarket && bestScore >= CONFIG.REQUIRED_CONFIRMATIONS) {
          executeTrade(generateSignal(bestMarket), bestMarket);
        }
      }
    }

    if (d.buy) {
      ws.send(JSON.stringify({
        proposal_open_contract: 1,
        contract_id: d.buy.contract_id,
        subscribe: 1
      }));
    }

    if (d.proposal_open_contract && d.proposal_open_contract.is_sold) {
      onResult(parseFloat(d.proposal_open_contract.profit));
    }

    if (d.error) log(`⚠ Error: ${d.error.message}`, "warn");
  };

  ws.onclose = () => {
    running = false;
    document.getElementById('statusPill').className = 'status-pill';
    document.getElementById('statusText').innerText = 'OFFLINE';
  };
}

function stopBot() {
  if (ws) ws.close();
  running = false;
  log(`⏹ Detenido | Profit: $${dailyProfit.toFixed(2)}`, "warn");
  updateUI();
}

updateUI();
</script>

</body>
</html>
