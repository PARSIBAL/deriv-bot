<script>
// 🔐 TOKEN
const DEMO_TOKEN = "e1lRgxNoxWwBkzx";
const REAL_TOKEN = "TU_TOKEN_REAL_AQUI";

const symbols = ["R_100", "R_75", "R_50", "R_25", "R_10"];

let ws = null;
let running = false;
let balance = 0;
let stake = 0.35;
let dailyProfit = 0;
let wins = 0;
let totalTrades = 0;
let paused = false;
let maxDailyLoss = 0;
let initialBalance = 0;
let lastTradeTime = 0;
let cooldown = 10000;
let currentMode = "safe";
let stopLossActivated = false;
let dataMap = {};

function addLog(msg, type) {
    let log = document.getElementById("logPanel");
    if (!log) return;
    let entry = document.createElement("div");
    entry.className = `log-entry log-${type || "info"}`;
    entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
    if (log.children.length > 100) log.removeChild(log.firstChild);
}

function updateUI() {
    let safeStake = (typeof stake === 'number' && !isNaN(stake) && stake > 0) ? stake : 0.35;
    document.getElementById("balance").innerHTML = `${(balance || 0).toFixed(2)} USD`;
    document.getElementById("profit").innerHTML = `${(dailyProfit || 0).toFixed(2)} USD`;
    if (dailyProfit < 0) document.getElementById("profit").style.color = "#f44336";
    else document.getElementById("profit").style.color = "#ffd700";
    document.getElementById("stake").innerHTML = `${safeStake.toFixed(2)} USD`;
    let wr = totalTrades > 0 ? (wins / totalTrades * 100).toFixed(1) : 0;
    document.getElementById("winrate").innerHTML = `${wr}%`;
    document.getElementById("trades").innerHTML = totalTrades;
    let remaining = ((maxDailyLoss || 0) + (dailyProfit || 0)).toFixed(2);
    document.getElementById("maxLossToday").innerHTML = `-${(maxDailyLoss || 0).toFixed(2)} USD | Restante: ${remaining} USD`;
}

function roundStake(val) {
    let num = Number(val);
    if (isNaN(num) || num <= 0) return 0.35;
    let r = Math.floor(num * 100) / 100;
    if (r < 0.35) r = 0.35;
    return r;
}

function stopBot() {
    if (ws) ws.close();
    running = false;
    let badge = document.getElementById("statusBadge");
    if (badge) {
        badge.innerHTML = "⚪ DESCONECTADO";
        badge.className = "status-badge status-off";
    }
    addLog("⏹️ Bot detenido", "error");
}

// 🔧 FUNCIÓN CORREGIDA - Sin toFixed en el log para evitar errores
function executeTrade(sym, type) {
    if (paused || stopLossActivated) return;
    
    // Obtener valor seguro del stake
    let currentStake = stake;
    if (typeof currentStake !== 'number' || isNaN(currentStake) || currentStake <= 0) {
        currentStake = 0.35;
    }
    
    let stakeAmount = roundStake(currentStake);
    
    // Log sin usar toFixed para evitar errores
    addLog(`💼 Enviando trade: ${sym} ${type} $${stakeAmount}`, "info");
    
    ws.send(JSON.stringify({
        proposal: 1,
        amount: stakeAmount,
        basis: "stake",
        contract_type: type,
        currency: "USD",
        duration: 5,
        duration_unit: "t",
        symbol: sym
    }));
    window.pendingTrade = { symbol: sym, type: type, stake: stakeAmount };
}

function startBot(accType) {
    if (running) {
        addLog("⚠️ Bot ya activo", "error");
        return;
    }

    let token = accType === "demo" ? DEMO_TOKEN : REAL_TOKEN;
    let mode = document.getElementById("mode").value;
    
    if (!token || token === "TU_TOKEN_REAL_AQUI") {
        addLog("❌ Token no configurado.", "error");
        alert("Pon tu token en el código");
        return;
    }

    currentMode = mode;
    if (mode === "safe") { cooldown = 10000; }
    else if (mode === "mid") { cooldown = 8000; }
    else { cooldown = 7000; }

    dailyProfit = 0;
    wins = 0;
    totalTrades = 0;
    paused = false;
    stopLossActivated = false;
    dataMap = {};
    initialBalance = 0;
    stake = 0.35;

    addLog(`🚀 Conectando ${accType.toUpperCase()}...`, "info");

    ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

    ws.onopen = () => {
        addLog("✅ WebSocket conectado", "success");
        ws.send(JSON.stringify({ authorize: token }));
    };

    ws.onmessage = (e) => {
        try {
            let d = JSON.parse(e.data);

            if (d.error) {
                addLog(`⚠️ Error: ${d.error.message}`, "error");
                if (d.error.message.includes("Invalid") || d.error.message.includes("authorize")) {
                    addLog("❌ Token inválido", "error");
                    stopBot();
                }
                return;
            }

            if (d.authorize) {
                addLog(`✅ Autenticado: ${d.authorize.loginid}`, "success");
                running = true;
                let badge = document.getElementById("statusBadge");
                if (badge) {
                    badge.innerHTML = "🟢 CONECTADO";
                    badge.className = "status-badge status-on";
                }
                let accountDisplay = document.getElementById("accountDisplay");
                if (accountDisplay) accountDisplay.innerHTML = accType === "demo" ? "DEMO" : "REAL";
                let accountBadge = document.getElementById("accountBadge");
                if (accountBadge) {
                    accountBadge.innerHTML = `<span class="account-badge ${accType === "demo" ? "demo-badge" : "real-badge"}">${accType === "demo" ? "🟢 DEMO" : "🔴 REAL"}</span>`;
                }
                
                symbols.forEach(s => {
                    ws.send(JSON.stringify({ ticks: s, subscribe: 1 }));
                    dataMap[s] = [];
                });
                ws.send(JSON.stringify({ balance: 1 }));
                addLog(`📡 Suscrito a: ${symbols.join(", ")}`, "success");
            }

            if (d.balance) {
                balance = d.balance.balance;
                if (initialBalance === 0) {
                    initialBalance = balance;
                    maxDailyLoss = initialBalance * 0.03;
                    let risk = currentMode === "safe" ? 0.0035 : (currentMode === "mid" ? 0.005 : 0.0075);
                    stake = roundStake(balance * risk);
                    addLog(`💰 Balance: $${balance.toFixed(2)}`, "success");
                    addLog(`🛡️ Límite pérdida: $${maxDailyLoss.toFixed(2)} (3%)`, "warning");
                    addLog(`🎯 Apuesta: $${stake.toFixed(2)}`, "info");
                }
                updateUI();
            }

            if (d.proposal && window.pendingTrade) {
                let price = d.proposal.ask;
                addLog(`💼 Comprando contrato: $${price.toFixed(2)}`, "success");
                ws.send(JSON.stringify({ buy: d.proposal.id, price: price }));
                window.pendingTrade = null;
            }

            if (d.tick && running && !paused && !stopLossActivated) {
                let sym = d.tick.symbol;
                let price = parseFloat(d.tick.quote);
                
                if (!dataMap[sym]) dataMap[sym] = [];
                dataMap[sym].push(price);
                if (dataMap[sym].length > 50) dataMap[sym].shift();
                
                let arr = dataMap[sym];
                if (arr.length < 30) return;
                
                let ret = [];
                for (let i = 1; i < arr.length; i++) ret.push(arr[i] - arr[i-1]);
                let mean = ret.reduce((a,b)=>a+b,0)/ret.length;
                let std = Math.sqrt(ret.map(x=>Math.pow(x-mean,2)).reduce((a,b)=>a+b,0)/ret.length);
                if (std < 0.002 || std > 0.02) return;
                
                let lastMove = Math.abs(ret[ret.length-1]);
                if (lastMove > std * 2.5) return;
                
                let trend = ret.slice(-5).reduce((a,b)=>a+b,0);
                let z = (ret[ret.length-1] - mean) / std;
                
                let now = Date.now();
                if (now - lastTradeTime < cooldown) return;
                
                let decision = null;
                if (sym.includes("R_")) {
                    if (z > 1.0) decision = "CALL";
                    if (z < -1.0) decision = "PUT";
                }
                
                if (decision) {
                    addLog(`🎯 SEÑAL: ${sym} ${decision} | z: ${z.toFixed(2)}`, "trade");
                    let symbolEl = document.getElementById("symbol");
                    if (symbolEl) symbolEl.innerHTML = sym;
                    executeTrade(sym, decision);
                    lastTradeTime = now;
                }
            }

            if (d.proposal_open_contract && d.proposal_open_contract.is_sold) {
                let pnl = parseFloat(d.proposal_open_contract.profit);
                dailyProfit += pnl;
                totalTrades++;
                if (pnl > 0) wins++;
                updateUI();
                addLog(pnl > 0 ? `✅ GANANCIA: +$${pnl.toFixed(2)}` : `❌ PÉRDIDA: $${pnl.toFixed(2)}`, pnl > 0 ? "success" : "error");
                
                if (dailyProfit <= -maxDailyLoss) {
                    addLog(`🛑 STOP LOSS DIARIO! Pérdida: $${dailyProfit.toFixed(2)}`, "error");
                    stopBot();
                }
            }

        } catch(err) {
            addLog(`❌ Error: ${err.message}`, "error");
            console.error(err);
        }
    };

    ws.onerror = () => addLog("❌ Error WebSocket", "error");
    ws.onclose = () => {
        if (running) {
            addLog("🔌 Conexión perdida", "error");
            running = false;
            let badge = document.getElementById("statusBadge");
            if (badge) {
                badge.innerHTML = "⚪ DESCONECTADO";
                badge.className = "status-badge status-off";
            }
        }
    };
}

function mostrarModal() {
    if (running) { addLog("Detén el bot primero", "error"); return; }
    let modal = document.getElementById("modalConfirm");
    if (modal) modal.style.display = "flex";
}
function cerrarModal() {
    let modal = document.getElementById("modalConfirm");
    if (modal) modal.style.display = "none";
}
function confirmarStart(accType) { 
    cerrarModal(); 
    startBot(accType); 
}

addLog("🛡️ Bot listo - Solo índices R_", "warning");
</script>
