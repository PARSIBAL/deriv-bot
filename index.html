<!DOCTYPE html>
<html>
<head>
<title>BOT DERIV FIXED</title>

<style>
body{
    background:#0d0d0d;
    color:#fff;
    font-family:sans-serif;
    text-align:center;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.start{background:green;color:white;}
.stop{background:red;color:white;}

.log{
    background:#000;
    height:200px;
    overflow:auto;
    margin-top:10px;
    padding:10px;
    text-align:left;
    font-size:12px;
}
</style>
</head>

<body>

<h2>🤖 BOT DERIV FIXED</h2>

<button class="start" onclick="startBot()">INICIAR</button>
<button class="stop" onclick="stopBot()">STOP</button>

<p id="status">OFF</p>
<p>Balance: <span id="balance">0</span></p>
<p>Profit: <span id="profit">0</span></p>

<div class="log" id="log"></div>

<script>

// 🔐 TOKEN (PON EL TUYO REAL)
const TOKEN = "e1lRgxNoxWwBkzx";

// ACTIVOS
const symbols = ["R_100","R_75","R_50"];

let ws;
let running=false;
let balance=0;
let profit=0;
let stake=0.35;
let lastTradeTime=0;

let dataMap={};
let pending=false;

// LOG
function log(msg){
    let el=document.getElementById("log");
    el.innerHTML += "["+new Date().toLocaleTimeString()+"] "+msg+"<br>";
    el.scrollTop=el.scrollHeight;
}

// START
function startBot(){

    if(running) return;

    if(!TOKEN || TOKEN.includes("PON")){
        alert("Coloca tu token");
        return;
    }

    ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

    ws.onopen = ()=>{
        log("Conectado");
        ws.send(JSON.stringify({authorize:TOKEN}));
    };

    ws.onmessage = (msg)=>{

        let d;

        try{
            d = JSON.parse(msg.data);
        }catch(e){
            log("Error parseando");
            return;
        }

        // ERROR API
        if(d.error){
            log("ERROR: "+d.error.message);
            stopBot();
            return;
        }

        // AUTORIZADO
        if(d.msg_type==="authorize"){
            running=true;
            document.getElementById("status").innerText="ON";

            log("Autorizado");

            symbols.forEach(s=>{
                ws.send(JSON.stringify({ticks:s,subscribe:1}));
                dataMap[s]=[];
            });

            ws.send(JSON.stringify({balance:1}));
        }

        // BALANCE
        if(d.msg_type==="balance"){
            balance = d.balance.balance;
            document.getElementById("balance").innerText = balance.toFixed(2);

            stake = Math.max(0.35, (balance*0.003).toFixed(2));
        }

        // PROPUESTA → COMPRAR
        if(d.msg_type==="proposal" && pending){
            ws.send(JSON.stringify({
                buy:d.proposal.id,
                price:d.proposal.ask
            }));
            pending=false;
        }

        // TICKS
        if(d.msg_type==="tick" && running){

            let sym = d.tick.symbol;
            let price = parseFloat(d.tick.quote);

            dataMap[sym].push(price);
            if(dataMap[sym].length>30) dataMap[sym].shift();

            let arr = dataMap[sym];
            if(arr.length<20) return;

            let last = arr[arr.length-1];
            let prev = arr[arr.length-2];

            let now = Date.now();
            if(now - lastTradeTime < 8000) return;

            let decision=null;

            if(last > prev) decision="CALL";
            if(last < prev) decision="PUT";

            if(decision && !pending){
                trade(sym,decision);
                lastTradeTime = now;
            }
        }

        // RESULTADO
        if(d.msg_type==="proposal_open_contract"){
            if(d.proposal_open_contract.is_sold){

                let pnl = parseFloat(d.proposal_open_contract.profit);

                profit += pnl;

                document.getElementById("profit").innerText = profit.toFixed(2);

                log(pnl>0 ? "WIN "+pnl : "LOSS "+pnl);
            }
        }
    };

    ws.onerror = ()=> log("WebSocket error");

    ws.onclose = ()=>{
        log("Desconectado");
        running=false;
        document.getElementById("status").innerText="OFF";
    };
}

// TRADE
function trade(symbol,type){

    log("Trade: "+symbol+" "+type);

    ws.send(JSON.stringify({
        proposal:1,
        amount:parseFloat(stake),
        basis:"stake",
        contract_type:type,
        currency:"USD",
        duration:5,
        duration_unit:"t",
        symbol:symbol
    }));

    pending=true;
}

// STOP
function stopBot(){
    if(ws) ws.close();
    running=false;
    document.getElementById("status").innerText="OFF";
}

</script>

</body>
</html>
