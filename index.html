<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HYBRID SNIPER V50</title>

<style>
body{
  background:#02060d;
  color:#00ff9c;
  font-family:monospace;
  padding:20px;
}
.container{
  max-width:520px;
  margin:auto;
  background:#050a14;
  padding:20px;
  border-radius:10px;
}
input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#000;
  color:#00ff9c;
  border:none;
}
button{
  background:#00ffc3;
  color:#000;
  font-weight:bold;
}
.log{
  height:150px;
  overflow:auto;
  background:#000;
  padding:8px;
  font-size:11px;
}
</style>
</head>

<body>

<div class="container">

<h3>[ HYBRID SNIPER V50 ]</h3>

<div>const API_TOKEN =</div>
<input type="text" id="e1lRgxNoxWwBkzx">

<div>const STAKE_TREND =</div>
<input type="number" id="stakeTrend" value="0.5">

<div>const STAKE_REVERSA =</div>
<input type="number" id="stakeRev" value="0.3">

<button id="toggle">START</button>

<div id="mode">STATUS: IDLE</div>

<div>
Wins: <span id="wins">0</span> |
Loss: <span id="losses">0</span> |
Balance: <span id="balance">0</span>
</div>

<div class="log" id="log"></div>

</div>

<script>
let ws, running=false;
let candles=[];
let wins=0, losses=0, balance=0;
let lastTradeTime=0;
let lossStreak=0;

document.getElementById("toggle").onclick=()=>{
 running=!running;
 if(running){ start(); toggle.innerText="STOP"; }
 else{ ws.close(); toggle.innerText="START"; }
};

function log(msg){
 let el=document.getElementById("log");
 el.innerHTML+="<div>"+msg+"</div>";
 el.scrollTop=el.scrollHeight;
}

function setMode(m){
 document.getElementById("mode").innerText="STATUS: "+m;
}

function start(){
 let token=document.getElementById("token").value;

 ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

 ws.onopen=()=> ws.send(JSON.stringify({authorize:token}));

 ws.onmessage=(msg)=>{
  let d=JSON.parse(msg.data);

  if(d.msg_type==="authorize"){
    log("Conectado");
    getCandles();
  }

  if(d.msg_type==="candles"){
    candles=d.candles.map(c=>c.close);
    logic();
  }

  if(d.msg_type==="proposal_open_contract"){
    if(d.proposal_open_contract.is_sold){

      let p=d.proposal_open_contract.profit;

      if(p>0){ wins++; balance+=p; lossStreak=0; log("WIN "+p); }
      else{ losses++; balance+=p; lossStreak++; log("LOSS "+p); }

      update();

      if(lossStreak>=2){
        setMode("STOP LOSS");
        ws.close();
        running=false;
      }
    }
  }
 };
}

function getCandles(){
 ws.send(JSON.stringify({
  ticks_history:"R_50",
  granularity:60,
  count:50,
  style:"candles"
 }));
}

function ema(p,d){
 let k=2/(p+1), arr=[d[0]];
 for(let i=1;i<d.length;i++){
  arr.push(d[i]*k + arr[i-1]*(1-k));
 }
 return arr;
}

function zScore(data){
 let mean = data.reduce((a,b)=>a+b)/data.length;
 let std = Math.sqrt(data.map(x=>Math.pow(x-mean,2)).reduce((a,b)=>a+b)/data.length);
 return (data[data.length-1]-mean)/std;
}

function logic(){

 if(candles.length<20) return;

 let z=zScore(candles);
 let ema3=ema(3,candles).pop();
 let ema9=ema(9,candles).pop();

 let last=candles[candles.length-1];
 let prev=candles[candles.length-2];

 let now=Date.now();
 if(now-lastTradeTime<60000) return;

 // 🔴 REVERSA
 if(Math.abs(z)>2.0){

   if(z>2 && last<prev){
     setMode("REVERSA PUT");
     trade("PUT","t");
     lastTradeTime=now;
     return;
   }

   if(z<-2 && last>prev){
     setMode("REVERSA CALL");
     trade("CALL","t");
     lastTradeTime=now;
     return;
   }
 }

 // 🔵 TENDENCIA
 if(Math.abs(z)>1.4 && Math.abs(z)<1.8){

   if(ema3>ema9 && last>prev){
     setMode("SNIPER CALL");
     trade("CALL","m");
     lastTradeTime=now;
     return;
   }

   if(ema3<ema9 && last<prev){
     setMode("SNIPER PUT");
     trade("PUT","m");
     lastTradeTime=now;
     return;
   }
 }

 setMode("WAIT");
}

function trade(type,mode){

 let stake = mode==="t"
   ? parseFloat(document.getElementById("stakeRev").value)
   : parseFloat(document.getElementById("stakeTrend").value);

 let duration = mode==="t"?3:1;
 let unit = mode==="t"?"t":"m";

 log("TRADE "+type+" ("+mode+")");

 ws.send(JSON.stringify({
  buy:1,
  price:stake,
  parameters:{
    amount:stake,
    basis:"stake",
    contract_type:type,
    currency:"USD",
    duration:duration,
    duration_unit:unit,
    symbol:"R_50"
  }
 }));
}

function update(){
 winsEl.innerText=wins;
 lossesEl.innerText=losses;
 balanceEl.innerText=balance.toFixed(2);
}
</script>

</body>
</html>
