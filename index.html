<script>
// 🔐 TOKENS - PON AQUÍ TUS TOKENS REALES
const tokens = {
    demo: "jTtP5pnqMXYvJlf",  // ← REEMPLAZA con tu token real
    real: "deriv-live-TU_TOKEN_REAL_AQUI"
};

// 🔥 ACTIVOS CONFIRMADOS PARA TRADING
const symbols = [
    "R_100", "R_75", "R_50", "R_25", "R_10",
    "BOOM500", "CRASH500"
];

let ws = null, running = false;
let balance = 0, stake = 0;
let profit = 0, losses = 0, wins = 0;
let lastTradeTime = 0;
let paused = false;
let pendingTrade = null;
let hedgeMode = false;
let lastDirection = null;
let dailyLossLimit = 0;
let initialBalance = 0;
let dataMap = {};

function avg(arr) { 
    if(arr.length === 0) return 0;
    return arr.reduce((a,b)=>a+b,0)/arr.length; 
}

function stddev(arr, mean) {
    if(arr.length === 0) return 0;
    return Math.sqrt(arr.map(x=>Math.pow(x-mean,2)).reduce((a,b)=>a+b,0)/arr.length);
}

function addLog(msg, type = "info") {
    let logPanel = document.getElementById("logPanel");
    if(logPanel) {
        let entry = document.createElement("div");
        entry.className = `log-entry log-${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logPanel.appendChild(entry);
        logPanel.scrollTop = logPanel.scrollHeight;
        if(logPanel.children.length > 100) logPanel.removeChild(logPanel.firstChild);
    }
    console.log(msg);
}

function updateUI() {
    let profitEl = document.getElementById("profit");
    if(profitEl) profitEl.innerText = profit.toFixed(2);
    
    let balanceEl = document.getElementById("balance");
    if(balanceEl) balanceEl.innerText = balance.toFixed(2);
    
    let stakeEl = document.getElementById("stake");
    if(stakeEl) stakeEl.innerText = stake.toFixed(2);
    
    let statusEl = document.getElementById("status");
    if(statusEl) statusEl.innerText = running ? (paused ? "PAUSA" : "ON") : "OFF";
    
    let statusBadge = document.getElementById("statusBadge");
    if(statusBadge) {
        if(!running) {
            statusBadge.innerHTML = "⚪ DESCONECTADO";
            statusBadge.className = "status-badge status-off";
        } else if(paused) {
            statusBadge.innerHTML = "⏸️ PAUSADO";
            statusBadge.className = "status-badge status-paused";
        } else {
            statusBadge.innerHTML = "🟢 CONECTADO";
            statusBadge.className = "status-badge status-on";
        }
    }
}

function stopBot() { 
    if(ws) ws.close(); 
    running = false; 
    pendingTrade = null;
    updateUI();
    addLog("⏹️ Bot detenido", "error");
}

function executeTrade(symbol, type) {
    let amount = Math.round(stake * 100) / 100;
    if(amount < 0.35) amount = 0.35;
    
    pendingTrade = { symbol, type, amount };
    addLog(`📡 Solicitando propuesta: ${symbol} ${type} $${amount}`, "info");
    
    ws.send(JSON.stringify({
        proposal: 1,
        amount: amount,
        basis: "stake",
        contract_type: type,
        currency: "USD",
        duration: 5,
        duration_unit: "t",
        symbol: symbol
    }));
}

function startBot() {
    if(running) {
        addLog("⚠️ Bot ya está activo", "error");
        return;
    }
    
    let type = document.getElementById("accountType")?.value || "demo";
    let token = tokens[type];
    
    if(!token || token.includes("TU_TOKEN") || token === "deriv-demo-TU_TOKEN_AQUI" || token === "deriv-live-TU_TOKEN_REAL_AQUI") {
        addLog("❌ ERROR: Token no configurado. Edita el código y pon tu token real.", "error");
        alert("❌ Configura tu token de Deriv en el código.\n\nDebe empezar con 'deriv-demo-' o 'deriv-live-'");
        return;
    }
    
    profit = 0;
    losses = 0;
    wins = 0;
    paused = false;
    hedgeMode = false;
    lastDirection = null;
    pendingTrade = null;
    dataMap = {};
    initialBalance = 0;
    dailyLossLimit = 0;
    
    addLog(`🚀 Conectando a ${type.toUpperCase()}...`, "info");
    
    ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");
    
    ws.onopen = () => {
        addLog("✅ WebSocket conectado", "success");
        ws.send(JSON.stringify({ authorize: token }));
    };
    
    ws.onmessage = (event) => {
        try {
            let d = JSON.parse(event.data);
            
            if(d.error) {
                addLog(`⚠️ Error API: ${d.error.message}`, "error");
                if(d.error.message.includes("Invalid") || d.error.message.includes("authorize")) {
                    addLog("❌ Token inválido", "error");
                    stopBot();
                }
                return;
            }
            
            if(d.msg_type === "authorize") {
                addLog(`✅ Autenticado: ${d.authorize.loginid}`, "success");
                running = true;
                updateUI();
                
                // Suscribirse solo a activos disponibles
                for(let s of symbols) {
                    ws.send(JSON.stringify({ ticks: s, subscribe: 1 }));
                    dataMap[s] = [];
                }
                addLog(`📡 Suscrito a: ${symbols.join(", ")}`, "success");
                ws.send(JSON.stringify({ balance: 1 }));
            }
            
            if(d.balance) {
                balance = d.balance.balance;
                
                if(initialBalance === 0) {
                    initialBalance = balance;
                    dailyLossLimit = initialBalance * 0.03;
                    let risk = 0.005;
                    stake = Math.round(balance * risk * 100) / 100;
                    if(stake < 0.35) stake = 0.35;
                    addLog(`💰 Balance: $${balance.toFixed(2)}`, "success");
                    addLog(`🛡️ Límite pérdida: $${dailyLossLimit.toFixed(2)} (3%)`, "warning");
                    addLog(`🎯 Apuesta: $${stake.toFixed(2)} (0.5%)`, "info");
                }
                updateUI();
            }
            
            if(d.msg_type === "proposal" && pendingTrade && d.proposal) {
                let proposalId = d.proposal.id;
                let askPrice = d.proposal.ask;
                addLog(`💼 Compra: $${askPrice.toFixed(2)}`, "success");
                ws.send(JSON.stringify({
                    buy: proposalId,
                    price: askPrice
                }));
                pendingTrade = null;
            }
            
            if(d.msg_type === "tick" && running && !paused && !pendingTrade) {
                let sym = d.tick.symbol;
                let price = parseFloat(d.tick.quote);
                
                if(!dataMap[sym]) dataMap[sym] = [];
                dataMap[sym].push(price);
                if(dataMap[sym].length > 50) dataMap[sym].shift();
                
                let best = null;
                let bestScore = 0;
                
                for(let s of symbols) {
                    let arr = dataMap[s];
                    if(!arr || arr.length < 30) continue;
                    
                    let returns = [];
                    for(let i = 1; i < arr.length; i++) returns.push(arr[i] - arr[i-1]);
                    
                    let mean = avg(returns);
                    let std = stddev(returns, mean);
                    
                    if(std < 0.0015 || std > 0.02) continue;
                    
                    let trend = returns.slice(-5).reduce((a,b)=>a+b, 0);
                    let z = (returns[returns.length-1] - mean) / std;
                    let score = Math.abs(trend * 0.4 + z * 0.6);
                    
                    if(score > bestScore) {
                        bestScore = score;
                        best = { sym: s, trend, z };
                    }
                }
                
                if(!best) return;
                
                let now = Date.now();
                if(now - lastTradeTime < 7000) return;
                
                let decision = null;
                
                if(best.sym.includes("CRASH") && best.trend > 0) decision = "CALL";
                if(best.sym.includes("BOOM") && best.trend > 0) decision = "PUT";
                if(best.sym.includes("R_")) {
                    if(best.z > 1.0) decision = "CALL";
                    if(best.z < -1.0) decision = "PUT";
                }
                
                if(hedgeMode && decision) {
                    decision = lastDirection === "CALL" ? "PUT" : "CALL";
                }
                
                if(decision) {
                    addLog(`🎯 SEÑAL: ${best.sym} ${decision} | score: ${bestScore.toFixed(3)}`, "trade");
                    executeTrade(best.sym, decision);
                    lastDirection = decision;
                    lastTradeTime = now;
                }
            }
            
            if(d.msg_type === "proposal_open_contract" && d.proposal_open_contract.is_sold) {
                let pnl = parseFloat(d.proposal_open_contract.profit);
                
                profit += pnl;
                
                addLog(pnl > 0 ? `✅ GANANCIA: +$${pnl.toFixed(2)}` : `❌ PÉRDIDA: $${pnl.toFixed(2)}`, pnl > 0 ? "success" : "error");
                
                if(profit <= -dailyLossLimit && dailyLossLimit > 0) {
                    addLog(`🛑 STOP LOSS DIARIO! Pérdida: $${profit.toFixed(2)}`, "error");
                    stopBot();
                    return;
                }
                
                if(pnl > 0) {
                    wins++;
                    hedgeMode = false;
                    let risk = 0.005;
                    stake = Math.round(balance * risk * 100) / 100;
                    if(stake < 0.35) stake = 0.35;
                } else {
                    losses++;
                    hedgeMode = true;
                    let risk = 0.007;
                    stake = Math.round(balance * risk * 100) / 100;
                    if(stake < 0.35) stake = 0.35;
                }
                
                updateUI();
                
                if(losses >= 3) {
                    paused = true;
                    updateUI();
                    addLog(`⏸️ PAUSA 2min (${losses} pérdidas)`, "warning");
                    setTimeout(() => {
                        if(running) {
                            paused = false;
                            losses = 0;
                            updateUI();
                            addLog("▶️ Reactivado", "success");
                        }
                    }, 120000);
                }
            }
            
        } catch(e) {
            addLog(`❌ Error: ${e.message}`, "error");
        }
    };
    
    ws.onerror = () => addLog("❌ WebSocket error", "error");
    ws.onclose = () => {
        if(running) {
            addLog("🔌 Conexión perdida", "error");
            running = false;
            updateUI();
        }
    };
}

window.startBot = startBot;
window.stopBot = stopBot;
</script>
