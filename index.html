<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ======================== CONFIGURACIÓN ========================
const DEFAULT_CONFIG = {
    appId: 1089,
    symbol: "R_10",
    riskPercent: 0.2,                // 0.2% por trade
    maxDailyTrades: 30,             // máximo 30 trades diarios
    maxDailyLoss: 0.05,             // 5% pérdida diaria
    explorationRate: 0.1,
    decayFactor: 0.99,
    persistenceBars: 3,             // confirmación 3 velas
    heartbeatInterval: 30,
    minConfidence: 0.7,             // confianza mínima para operar
    cooldownBars: 3,
    maxLatencyMs: 300,              // latencia máxima permitida
    maxPriceChangePct: 0.05,        // 0.05% cambio máximo antes de ejecutar
};

// ======================== UTILIDADES ========================
const calcEMA = (arr, period) => {
    const ema = new Array(arr.length).fill(0);
    if (arr.length < period) return ema;
    const k = 2 / (period + 1);
    ema[period - 1] = arr.slice(0, period).reduce((a, b) => a + b, 0) / period;
    for (let i = period; i < arr.length; i++) {
        ema[i] = arr[i] * k + ema[i - 1] * (1 - k);
    }
    return ema;
};

const calcATR = (bars, period = 14) => {
    const tr = [];
    for (let i = 1; i < bars.length; i++) {
        const h = bars[i].h, l = bars[i].l, pc = bars[i-1].c;
        tr.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
    }
    if (tr.length < period) return new Array(bars.length).fill(0);
    const atr = new Array(bars.length).fill(0);
    atr[period] = tr.slice(0, period).reduce((a,b) => a + b, 0) / period;
    for (let i = period + 1; i < bars.length; i++) {
        atr[i] = (atr[i-1] * (period - 1) + tr[i-1]) / period;
    }
    return atr;
};

// ======================== VELAS & AGREGADOR ========================
class Candle {
    constructor(open, startTime) {
        this.o = open; this.h = open; this.l = open; this.c = open;
        this.ticks = 0; this.start = startTime;
    }
    update(price) {
        this.h = Math.max(this.h, price);
        this.l = Math.min(this.l, price);
        this.c = price;
        this.ticks++;
    }
}

class TickAggregator {
    constructor(timeframeSec = 60) {
        this.timeframeMs = timeframeSec * 1000;
        this.current = null;
        this.candles = [];
        this.onCandleComplete = null;
    }
    addTick(timestampMs, price) {
        const start = Math.floor(timestampMs / this.timeframeMs) * this.timeframeMs;
        if (this.current && this.current.start === start) {
            this.current.update(price);
            return null;
        } else {
            const completed = this.current;
            if (completed) {
                this.candles.push(completed);
                if (this.candles.length > 500) this.candles.shift();
                if (this.onCandleComplete) this.onCandleComplete(completed);
            }
            this.current = new Candle(price, start);
            return completed;
        }
    }
    getCandles(count = 300) {
        const all = [...this.candles];
        if (this.current && this.current.ticks > 0) all.push(this.current);
        return all.slice(-count);
    }
}

// ======================== DERIV WEBSOCKET CLIENT (BINARY) ========================
class DerivAPI {
    constructor(appId, token, symbol) {
        this.appId = appId; this.token = token; this.symbol = symbol;
        this.ws = null; this.aggregator = new TickAggregator();
        this.onTick = null; this.onBalance = null;
        this.latestPrice = 0; this.balance = 0; this.currency = "USD";
        this.running = false; this.reqId = 0;
        this.subscriptionId = null; this.authDone = false;
        this.pendingRequests = new Map();
    }
    async connect() {
        this.running = true;
        const url = `wss://ws.deriv.com/websockets/v3?app_id=${this.appId}`;
        while (this.running) {
            try {
                this.ws = new WebSocket(url);
                await new Promise((resolve, reject) => {
                    this.ws.onopen = resolve;
                    this.ws.onerror = (e) => reject(e);
                });
                console.log("Deriv WS conectado");
                if (this.token) await this.authorize();
                await this.subscribeTicks();
                this.startHeartbeat();
                this.ws.onmessage = (msg) => this.handleMessage(JSON.parse(msg.data));
                this.ws.onclose = () => setTimeout(() => this.running && this.connect(), 5000);
                await new Promise(() => {});
            } catch(e) {
                console.error("Error conexión Deriv:", e);
                await new Promise(r => setTimeout(r, 5000));
            }
        }
    }
    async authorize() {
        const resp = await this.send({ authorize: this.token });
        if (resp.error) { console.error("Auth falló:", resp.error.message); this.authDone = false; }
        else {
            console.log("Autorizado. Balance:", resp.authorize.balance);
            this.balance = parseFloat(resp.authorize.balance);
            this.currency = resp.authorize.currency || "USD";
            this.authDone = true;
            if (this.onBalance) this.onBalance(this.balance);
        }
    }
    async subscribeTicks() {
        const resp = await this.send({ ticks: this.symbol, subscribe: 1 });
        if (resp.subscription) {
            this.subscriptionId = resp.subscription.id;
            console.log("Suscrito a ticks", this.subscriptionId);
        }
    }
    startHeartbeat() {
        this.heartbeatTimer = setInterval(() => {
            if (this.ws && this.ws.readyState === WebSocket.OPEN) this.ws.send(JSON.stringify({ ping: 1 }));
        }, 30000);
    }
    async send(request) {
        return new Promise((resolve) => {
            this.reqId++;
            request.req_id = this.reqId;
            this.pendingRequests.set(this.reqId, resolve);
            this.ws.send(JSON.stringify(request));
        });
    }
    handleMessage(data) {
        if (data.tick) {
            const tick = data.tick;
            const price = parseFloat(tick.quote);
            const epoch = parseInt(tick.epoch) * 1000;
            this.latestPrice = price;
            this.aggregator.addTick(epoch, price);
            if (this.onTick) this.onTick(price);
        } else if (data.authorize) {
            this.balance = parseFloat(data.authorize.balance);
            if (this.onBalance) this.onBalance(this.balance);
        } else if (data.error) {
            console.error("Deriv error:", data.error.message);
        }
        if (data.req_id && this.pendingRequests.has(data.req_id)) {
            this.pendingRequests.get(data.req_id)(data);
            this.pendingRequests.delete(data.req_id);
        }
    }
    // Contratos binarios: CALL/PUT con duración
    async buyContract(contractType, stake, duration) {
        const resp = await this.send({
            buy: 1,
            price: this.latestPrice,
            parameters: {
                amount: stake,
                basis: "stake",
                contract_type: contractType,
                currency: this.currency,
                duration: duration,
                duration_unit: "s",
                symbol: this.symbol,
            }
        });
        return resp;
    }
    disconnect() {
        this.running = false;
        if (this.heartbeatTimer) clearInterval(this.heartbeatTimer);
        if (this.ws) this.ws.close();
    }
}

// ======================== RÉGIMEN DE MERCADO (MEJORADO) ========================
class MarketRegimeDetector {
    constructor() { this.atrHistory = []; }
    detect(candles) {
        if (candles.length < 50) return { regime: "WARMING_UP", confidence: 0, direction: 0, tradeType: null };
        const closes = candles.map(c => c.c);
        const highs = candles.map(c => c.h);
        const lows = candles.map(c => c.l);
        const roc10 = (closes[closes.length-1] - closes[closes.length-11]) / closes[closes.length-11] * 100;
        const atrVals = calcATR(candles);
        const curATR = atrVals[atrVals.length-1];
        this.atrHistory.push(curATR);
        if (this.atrHistory.length > 200) this.atrHistory.shift();
        const sorted = [...this.atrHistory].sort((a,b)=>a-b);
        const atrPct = sorted.filter(v => v <= curATR).length / sorted.length;
        const structure = this.detectStructure(highs, lows);
        const adx = Math.abs(roc10) * 8;
        let regime = "RANGE", conf = 0.5, dir = 0, tradeType = null;

        // Clasificación refinada para binarios
        if (atrPct < 0.25 && structure === "CONTRACTION") {
            regime = "COMPRESSION"; conf = 0.75;
        } else if (atrPct > 0.75 && structure.includes("BREAKOUT")) {
            regime = "EXPANSION"; conf = 0.7; dir = structure === "BREAKOUT_UP" ? 1 : -1;
        } else if (adx > 24) {  // Fuerte tendencia
            regime = "MEDIUM_TREND"; conf = 0.85; dir = roc10 > 0 ? 1 : -1;
            tradeType = "MEDIUM_TREND";
        } else if (adx > 12) {  // Tendencia débil
            regime = "MICRO_TREND"; conf = 0.7; dir = roc10 > 0 ? 1 : -1;
            tradeType = "MICRO_TREND";
        } else {
            regime = "RANGE"; conf = 0.5;
        }
        return { regime, confidence: conf, direction: dir, atr: curATR, atrPct, roc10, tradeType };
    }
    detectStructure(highs, lows) {
        const w = Math.min(20, highs.length);
        const hSeg = highs.slice(-w), lSeg = lows.slice(-w);
        const range = Math.max(...hSeg) - Math.min(...lSeg);
        if (range === 0) return "FLAT";
        const prevHigh = Math.max(...hSeg.slice(0, -3));
        const prevLow = Math.min(...lSeg.slice(0, -3));
        if (hSeg[hSeg.length-1] > prevHigh) return "BREAKOUT_UP";
        if (lSeg[lSeg.length-1] < prevLow) return "BREAKOUT_DOWN";
        if (range < 0.6 * (Math.max(...highs.slice(-30)) - Math.min(...lows.slice(-30)))) return "CONTRACTION";
        return "NEUTRAL";
    }
}

// ======================== MOTOR DE SEÑALES (BINARY, SIN RRR) ========================
class SignalEngine {
    constructor(persistence = 3) { this.persistence = persistence; }
    evaluate(candles, regime, params = {}) {
        if (candles.length < 60) return null;
        // Solo operar en MICRO_TREND o MEDIUM_TREND, no RANGE
        if (regime.tradeType !== "MICRO_TREND" && regime.tradeType !== "MEDIUM_TREND") return null;
        if (regime.confidence < DEFAULT_CONFIG.minConfidence) return null;

        const closes = candles.map(c => c.c);
        const highs = candles.map(c => c.h);
        const lows = candles.map(c => c.l);
        const direction = regime.direction > 0 ? "LONG" : "SHORT";

        // Filtro anti-ruido: confirmación con últimas 3 velas
        if (!this.confirmTrend(closes, direction)) return null;

        // Validación de volatilidad mínima (no operar en velas con spread excesivo)
        const atrVals = calcATR(candles, 14);
        const curATR = atrVals[atrVals.length-1];
        if (curATR < params.minATR || 0) return null;

        // Definir duración según tipo de tendencia
        const duration = regime.tradeType === "MICRO_TREND" ? 60 : 300;

        return {
            direction,
            entry: closes[closes.length-1],
            setup_type: regime.tradeType,
            duration,
            atr: curATR,
            confidence: regime.confidence,
        };
    }
    confirmTrend(closes, direction) {
        if (closes.length < 4) return false;
        const last3 = closes.slice(-3);
        if (direction === "LONG") {
            return last3[0] < last3[1] && last3[1] < last3[2];
        } else {
            return last3[0] > last3[1] && last3[1] > last3[2];
        }
    }
}

// ======================== SISTEMA ADAPTATIVO (BINARIO, WINRATE) ========================
class AdaptiveSystem {
    constructor(decay = 0.99, explore = 0.1) {
        this.setups = {};  // { "MICRO_TREND": { count, wins }, ... }
        this.history = [];
        this.decay = decay;
        this.explore = explore;
        this.dailyTrades = 0;
    }
    getScore(setup) {
        const s = this.setups[setup];
        if (!s || s.count < 5) return 0.5; // neutro
        return s.wins / s.count;
    }
    shouldEnter(setup) {
        const s = this.setups[setup];
        if (!s || s.count < 3) return true; // explorar
        if (Math.random() < this.explore) return true;
        return (s.wins / s.count) >= 0.5;
    }
    recordTrade(setup, win, regime) {
        if (!this.setups[setup]) this.setups[setup] = { count: 0, wins: 0 };
        const s = this.setups[setup];
        s.count++; if (win) s.wins++;
        // Decaimiento
        for (let key in this.setups) {
            this.setups[key].count = Math.max(1, Math.floor(this.setups[key].count * this.decay));
            this.setups[key].wins = Math.floor(this.setups[key].wins * this.decay);
        }
        this.history.push({ setup, win, regime });
        if (this.history.length > 200) this.history.shift();
        this.dailyTrades++;
    }
    winStreak() {
        let streak = 0;
        for (let i = this.history.length - 1; i >= 0; i--) {
            if (this.history[i].win) streak++; else break;
        }
        return streak;
    }
    recentWinRate(n = 20) {
        const slice = this.history.slice(-n);
        if (slice.length === 0) return 0;
        return slice.filter(t => t.win).length / slice.length;
    }
}

// ======================== AUTO-OPTIMIZADOR (ADAPTADO A WINRATE) ========================
class AutoOptimizer {
    constructor() {
        this.params = { minATR: 0.00005, entry_threshold: 0.2 };
    }
    optimize(adaptiveSys, lookback = 20) {
        const recent = adaptiveSys.history.slice(-lookback);
        if (recent.length < 5) return this.params;
        const winRate = adaptiveSys.recentWinRate(lookback);
        const streak = adaptiveSys.winStreak();
        // Ajustar parámetros según racha
        if (winRate > 0.6 && streak >= 3) {
            // Mercado favorable: reducir filtros
            this.params.minATR = Math.max(0.00002, this.params.minATR - 0.00001);
        } else if (winRate < 0.4) {
            // Desfavorable: aumentar filtros
            this.params.minATR = Math.min(0.0001, this.params.minATR + 0.00002);
        }
        return this.params;
    }
}

// ======================== GESTIÓN DE RIESGO (0.2%, 30 trades) ========================
class RiskManager {
    constructor(baseRiskPct = 0.002, maxDailyLoss = 0.05, maxDailyTrades = 30) {
        this.baseRisk = baseRiskPct; // 0.2%
        this.maxLoss = maxDailyLoss;
        this.maxTrades = maxDailyTrades;
        this.startBalance = 0;
    }
    calculateStake(balance, adaptive) {
        if (!this.startBalance) this.startBalance = balance;
        const dailyPnl = (balance - this.startBalance) / this.startBalance;
        if (dailyPnl < -this.maxLoss || adaptive.dailyTrades >= this.maxTrades) return 0;
        let mult = 1.0;
        const dd = 1 - (balance / Math.max(this.startBalance, balance));
        if (dd > 0.15) mult = 0.5;
        else if (dd > 0.10) mult = 0.75;
        if (adaptive.winStreak() >= 5) mult = Math.min(mult * 1.2, 1.5);
        const riskAmount = balance * this.baseRisk * mult;
        // Para binarios, stake = risk amount aproximadamente, pero Deriv requiere un mínimo
        return Math.max(0.35, Math.min(riskAmount, balance * 0.02)); // mínimo 0.35 USD
    }
}

// ======================== COMPONENTE REACT ========================
function App() {
    const [token, setToken] = useState("");
    const [connected, setConnected] = useState(false);
    const [running, setRunning] = useState(false);
    const [price, setPrice] = useState(0);
    const [balance, setBalance] = useState(0);
    const [regime, setRegime] = useState({ regime: "DISCONNECTED", confidence: 0, direction: 0 });
    const [openTrade, setOpenTrade] = useState(null);
    const [trades, setTrades] = useState([]);
    const [log, setLog] = useState([]);
    const [symbol, setSymbol] = useState("R_10");

    const apiRef = useRef(null);
    const botRef = useRef({
        regimeDetector: new MarketRegimeDetector(),
        signalEngine: new SignalEngine(),
        adaptive: new AdaptiveSystem(),
        optimizer: new AutoOptimizer(),
        risk: new RiskManager(0.002, 0.05, 30),
        candles: [],
        currentTrade: null,
        cooldown: 0,
        trades: [],
    });

    const addLog = (msg) => setLog(prev => [...prev.slice(-200), `[${new Date().toLocaleTimeString()}] ${msg}`]);

    const handleConnect = async () => {
        if (connected) {
            apiRef.current?.disconnect();
            setConnected(false); setRunning(false);
            addLog("Desconectado");
            return;
        }
        if (!token) { alert("Ingrese API Token"); return; }
        const api = new DerivAPI(DEFAULT_CONFIG.appId, token, symbol);
        api.onTick = (p) => setPrice(p);
        api.onBalance = (b) => {
            setBalance(b);
            if (!botRef.current.risk.startBalance) botRef.current.risk.startBalance = b;
        };
        apiRef.current = api;
        api.connect().then(() => {}).catch(console.error);
        setConnected(true);
        addLog("Conectado a Deriv");
    };

    // Lógica al completar una vela M1
    useEffect(() => {
        if (!apiRef.current || !running) return;
        const aggregator = apiRef.current.aggregator;
        aggregator.onCandleComplete = (candle) => {
            const bot = botRef.current;
            const candles = aggregator.getCandles(100);
            if (candles.length < 60) return;
            bot.candles = candles;
            const regimeData = bot.regimeDetector.detect(candles);
            setRegime(regimeData);
            if (bot.cooldown > 0) { bot.cooldown--; return; }

            // Si no hay trade abierto, evaluar entrada
            if (!bot.currentTrade && bot.adaptive.dailyTrades < 30) {
                const signal = bot.signalEngine.evaluate(candles, regimeData, bot.optimizer.params);
                if (signal) {
                    const stake = bot.risk.calculateStake(balance, bot.adaptive);
                    if (stake > 0) {
                        executeTrade(signal, stake, regimeData);
                    }
                }
            }

            // Optimización periódica
            if (bot.trades.length % 20 === 0 && bot.trades.length > 0) {
                bot.optimizer.optimize(bot.adaptive);
            }
        };
        return () => { aggregator.onCandleComplete = null; };
    }, [running, price, balance]);

    const executeTrade = async (signal, stake, regime) => {
        const api = apiRef.current;
        if (!api || !api.authDone) return;
        // Control de latencia: medir tiempo antes de enviar
        const startTime = Date.now();
        const initialPrice = api.latestPrice;
        // Espera corta para verificar estabilidad
        await new Promise(r => setTimeout(r, 50));
        const latencia = Date.now() - startTime;
        const currentPrice = api.latestPrice;
        const pctChange = Math.abs(currentPrice - initialPrice) / initialPrice * 100;
        if (latencia > DEFAULT_CONFIG.maxLatencyMs) {
            addLog(`Trade abortado: latencia ${latencia}ms > ${DEFAULT_CONFIG.maxLatencyMs}ms`);
            return;
        }
        if (pctChange > DEFAULT_CONFIG.maxPriceChangePct) {
            addLog(`Trade abortado: cambio precio ${pctChange.toFixed(2)}% > ${DEFAULT_CONFIG.maxPriceChangePct}%`);
            return;
        }

        const contractType = signal.direction === "LONG" ? "CALL" : "PUT";
        const duration = signal.duration; // 60 o 300
        addLog(`Abriendo ${contractType} ${duration}s (${regime.tradeType}) stake=${stake.toFixed(2)}`);

        try {
            const resp = await api.buyContract(contractType, stake, duration);
            if (resp.error) {
                addLog(`Error buy: ${resp.error.message}`);
                return;
            }
            // Registrar trade abierto (local, sin seguimiento de cierre en binarios)
            const tradeId = resp.buy?.contract_id || Date.now().toString();
            botRef.current.currentTrade = {
                id: tradeId,
                direction: signal.direction,
                entry: currentPrice,
                setup_type: signal.setup_type,
                duration,
                stake,
                openTime: Date.now(),
            };
            setOpenTrade(botRef.current.currentTrade);
            addLog(`Trade abierto (${contractType} ${duration}s)`);
            // Programar cierre estimado (en realidad Deriv cierra automáticamente)
            setTimeout(() => handleTradeOutcome(tradeId, botRef.current.currentTrade), duration * 1000 + 5000);
        } catch(e) {
            addLog(`Error ejecutando: ${e.message}`);
        }
    };

    const handleTradeOutcome = (tradeId, tradeRef) => {
        const bot = botRef.current;
        // En producción real, usarías proposal_open_contract para resultado exacto.
        // Aquí simulamos con precio actual vs entrada para determinar ganancia.
        const currentPrice = apiRef.current?.latestPrice || tradeRef.entry;
        const direction = tradeRef.direction === "LONG" ? 1 : -1;
        const win = direction * (currentPrice - tradeRef.entry) > 0;
        const payout = win ? tradeRef.stake * 1.8 : 0; // típico 80% payout
        const profit = win ? payout - tradeRef.stake : -tradeRef.stake;
        const tradeRecord = {
            ...tradeRef,
            exitPrice: currentPrice,
            win,
            profit,
            reason: "BINARY_EXPIRY",
            streak: bot.adaptive.winStreak(),
        };
        bot.trades.push(tradeRecord);
        setTrades([...bot.trades]);
        bot.adaptive.recordTrade(tradeRef.setup_type, win, tradeRef.setup_type);
        bot.currentTrade = null;
        setOpenTrade(null);
        bot.cooldown = DEFAULT_CONFIG.cooldownBars;
        addLog(`Trade finalizado: ${win ? "GANANCIA" : "PÉRDIDA"} ${profit.toFixed(2)} USD`);
    };

    const toggleRunning = () => {
        if (!connected) return alert("Conecte primero");
        setRunning(!running);
        addLog(running ? "Bot PAUSADO" : "Bot ACTIVADO");
    };

    const wins = trades.filter(t => t.win).length;
    const winRate = trades.length ? (wins / trades.length * 100).toFixed(1) : 0;
    const pnl = trades.reduce((a,b) => a + (b.profit || 0), 0);
    const expectancy = trades.length ? (pnl / trades.length).toFixed(2) : 0;

    return (
        <div>
            <header>
                <h1>⚡ DerivAdaptiveBot Binary Hybrid</h1>
                <div className="controls">
                    <input type="text" placeholder="API Token" value={token}
                           onChange={e => setToken(e.target.value)} style={{width: 200}} />
                    <select value={symbol} onChange={e => setSymbol(e.target.value)}>
                        <option value="R_10">V10 (R_10)</option>
                        <option value="R_25">V25 (R_25)</option>
                    </select>
                    <button onClick={handleConnect} className={connected ? "danger" : "primary"}>
                        {connected ? "Desconectar" : "Conectar"}
                    </button>
                    <button onClick={toggleRunning} disabled={!connected}
                            className={running ? "danger" : "primary"}>
                        {running ? "⏹️ STOP" : "▶️ START"}
                    </button>
                </div>
            </header>
            <div className="dashboard">
                <div className="panel">
                    <h3>💰 Cuenta</h3>
                    <div className="status-row"><span className="label">Balance:</span><span className="value">{balance.toFixed(2)}</span></div>
                    <div className="status-row"><span className="label">Precio:</span><span className="value">{price.toFixed(5)}</span></div>
                    <div className="status-row"><span className="label">Régimen:</span>
                        <span className="badge" style={{background: regimeColor(regime.regime)}}>{regime.regime}</span>
                    </div>
                    <div className="status-row"><span className="label">Trades hoy:</span><span className="value">{botRef.current.adaptive.dailyTrades}/30</span></div>
                    <div className="status-row"><span className="label">Racha:</span><span className="value">{botRef.current.adaptive.winStreak()}</span></div>
                </div>
                <div className="panel chart-container">
                    <h3>📊 Actividad</h3>
                    {openTrade ? (
                        <div style={{padding: '10px', background: '#1a2436', borderRadius: 8}}>
                            <div>Trade activo: <span className={`badge ${openTrade.direction==='LONG'?'badge-buy':'badge-sell'}`}>{openTrade.direction}</span></div>
                            <div>Duración: {openTrade.duration}s | Stake: {openTrade.stake?.toFixed(2)}</div>
                        </div>
                    ) : <div style={{color: '#5a6880'}}>Sin posición abierta</div>}
                    <div className="log-area">
                        {log.slice(-15).map((l,i) => <div key={i}>{l}</div>)}
                    </div>
                </div>
                <div className="panel">
                    <h3>📈 Historial</h3>
                    <div className="status-row"><span>Winrate:</span><span>{winRate}%</span></div>
                    <div className="status-row"><span>P&L:</span><span>{pnl.toFixed(2)}</span></div>
                    <div className="status-row"><span>Promedio:</span><span>{expectancy}</span></div>
                    <div className="trade-list">
                        {trades.slice().reverse().map((t,i) => (
                            <div key={i} className="trade-item">
                                <span className={t.win ? "win" : "loss"}>{t.win ? "✅" : "❌"} {t.direction}</span>
                                <span>{t.setup_type} {t.duration}s</span>
                                <span>{t.profit?.toFixed(2)}</span>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        </div>
    );
}

function regimeColor(regime) {
    const map = {
        MICRO_TREND: '#4dffb4', MEDIUM_TREND: '#00e5a0', RANGE: '#607080',
        COMPRESSION: '#f0b90b', EXPANSION: '#7b5ea7', WARMING_UP: '#445566',
        DISCONNECTED: '#ff4d6d',
    };
    return map[regime] || '#607080';
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
