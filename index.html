<!DOCTYPE html>
<html>
<head>
<title>Bot R_50 Nivel Dios</title>
<style>
body { background:#0a0a0a; color:#fff; font-family:sans-serif; text-align:center; }
.card { background:#1a1a2e; padding:20px; border-radius:15px; max-width:420px; margin:auto; }
button { padding:10px; margin:5px; border:none; border-radius:8px; font-weight:bold; }
.start { background:#00c853; color:white; }
.stop { background:#d32f2f; color:white; }
.log { background:black; height:220px; overflow:auto; font-size:10px; text-align:left; padding:10px; }
</style>
</head>
<body>

<div class="card">
<h2>🤖 BOT R_50 NIVEL DIOS</h2>

<button class="start" onclick="startBot()">INICIAR</button>
<button class="stop" onclick="stopBot()">DETENER</button>

<h3 id="status">🔴 OFF</h3>

<p>💰 Balance: <span id="balance">0</span></p>
<p>📈 Ganancia: <span id="profit">0</span></p>
<p>🎯 Stake: <span id="stake">0</span></p>
<p>🏆 Winrate: <span id="wr">0%</span></p>

<div class="log" id="log"></div>
</div>

<script>
const TOKEN = "e1lRgxNoxWwBkzx";
const SYMBOL = "R_50";

let ws, balance=0, stake=0.35;
let running=false, wins=0, total=0;
let profit=0, winStreak=0, lossStreak=0;
let priceHistory=[], lastTrade=0;
let pauseUntil=0;

// 🔹 LOG
function log(msg){
 let el=document.getElementById("log");
 el.innerHTML += msg+"<br>";
 el.scrollTop=el.scrollHeight;
}

// 🔹 UI
function updateUI(){
 document.getElementById("balance").innerText=balance.toFixed(2);
 document.getElementById("profit").innerText=profit.toFixed(2);
 document.getElementById("stake").innerText=stake.toFixed(2);
 let wr = total? (wins/total*100).toFixed(1):0;
 document.getElementById("wr").innerText=wr+"%";
}

// 🔹 STAKE INTELIGENTE
function adjustStake(){
 let risk=0.004;

 if(lossStreak>=2) risk=0.0025;
 if(winStreak>=3) risk=0.006;

 let calc=balance*risk;

 if(calc>1) calc=1;
 if(calc<0.35) calc=0.35;

 stake=Math.floor(calc*100)/100;
}

// 🔹 FILTRO AVANZADO
function shouldTrade(z, trend, std){

 if(std < 0.003) return false;   // mercado muerto
 if(std > 0.018) return false;   // mercado loco

 if(Math.abs(z) < 1.6) return false; // señal débil

 if(z > 0 && trend < 0) return false;
 if(z < 0 && trend > 0) return false;

 return true;
}

// 🔹 BOT
function startBot(){
 ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

 ws.onopen=()=> ws.send(JSON.stringify({authorize:TOKEN}));

 ws.onmessage=(e)=>{
  let d=JSON.parse(e.data);

  if(d.authorize){
   running=true;
   document.getElementById("status").innerText="🟢 ON";
   ws.send(JSON.stringify({ticks:SYMBOL, subscribe:1}));
   ws.send(JSON.stringify({balance:1}));
  }

  if(d.balance){
   balance=d.balance.balance;
   updateUI();
  }

  if(d.tick && running){
   let now=Date.now();

   if(now < pauseUntil) return;

   let price=d.tick.quote;
   priceHistory.push(price);
   if(priceHistory.length>40) priceHistory.shift();
   if(priceHistory.length<25) return;

   let returns=[];
   for(let i=1;i<priceHistory.length;i++){
    returns.push(priceHistory[i]-priceHistory[i-1]);
   }

   let mean=returns.reduce((a,b)=>a+b,0)/returns.length;
   let std=Math.sqrt(returns.map(x=>(x-mean)**2).reduce((a,b)=>a+b,0)/returns.length);
   let last=returns[returns.length-1];
   let z=(last-mean)/std;

   let trend = priceHistory[priceHistory.length-1] - priceHistory[priceHistory.length-8];

   if(now-lastTrade<20000) return;

   if(!shouldTrade(z, trend, std)) return;

   let decision = z>0 ? "CALL" : "PUT";

   adjustStake();

   ws.send(JSON.stringify({
    buy:1,
    price:stake,
    parameters:{
     amount:stake,
     basis:"stake",
     contract_type:decision,
     currency:"USD",
     duration:5,
     duration_unit:"t",
     symbol:SYMBOL
    }
   }));

   log("📊 "+decision+" $"+stake+" | z:"+z.toFixed(2));
   lastTrade=now;
  }

  if(d.buy){
   ws.send(JSON.stringify({
    proposal_open_contract:1,
    contract_id:d.buy.contract_id,
    subscribe:1
   }));
  }

  if(d.proposal_open_contract && d.proposal_open_contract.is_sold){
   let pnl=parseFloat(d.proposal_open_contract.profit);

   profit+=pnl;
   total++;

   if(pnl>0){
    wins++;
    winStreak++;
    lossStreak=0;
    log("✅ +"+pnl);
   } else {
    lossStreak++;
    winStreak=0;
    log("❌ "+pnl);
   }

   updateUI();

   // 🔴 PROTECCIONES NIVEL DIOS
   if(lossStreak>=3){
    pauseUntil = Date.now() + 60000; // pausa 1 min
    log("⏸️ Pausa por pérdidas");
   }

   if(profit <= -(balance*0.03)){
    log("🛑 STOP LOSS");
    stopBot();
   }

   if(profit >= (balance*0.05)){
    log("🎯 TAKE PROFIT");
    stopBot();
   }
  }
 };
}

function stopBot(){
 if(ws) ws.close();
 running=false;
 document.getElementById("status").innerText="🔴 OFF";
 log("Bot detenido");
}
</script>

</body>
</html>
