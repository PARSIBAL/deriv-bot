</style>

<body>

<script>
// ============================================================
// 🔑 PON AQUÍ TU TOKEN (copiado EXACTAMENTE de Deriv)
// ============================================================
const TOKEN = "e1lRgxNoxWwBkzx";  // <--- REEMPLAZA ESTO

const SYMBOL = "R_50";

// Configuración (igual que antes)
const CONFIG = {
  stake: 0.50,
  takeProfit: 5,
  stopLoss: 3,
  zThreshold: 2.2,
  baseCooldown: 90,
  lossCooldown: 120,
  maxLossStreak: 3,
  pauseAfterStreak: 300,
  maxOperations: 20,
  maxDailyLoss: 3,
  maxDailyProfit: 5,
  throttleMs: 500
};

// Estado
let ws = null;
let running = false;
let balance = 0;
let dailyProfit = 0;
let wins = 0, losses = 0, totalOps = 0, invalidOps = 0;
let lossStreak = 0;
let lastTradeTime = 0;
let pausedUntil = 0;
let prices = [];
let lastResults = [];
let currentTrade = null;
let lastTickProcess = 0;

// UI (simplificada para este fix)
function addLog(msg, type = 'info') {
  const logDiv = document.getElementById('log');
  if (!logDiv) return;
  const le = document.createElement('div'); le.className = 'le';
  const lt = document.createElement('span'); lt.className = 'lt'; lt.innerText = new Date().toLocaleTimeString();
  const lm = document.createElement('span');
  if (type === 'win') lm.className = 'lw';
  else if (type === 'loss') lm.className = 'll';
  else if (type === 'success') lm.className = 'lg';
  else if (type === 'warning') lm.className = 'lx';
  else lm.className = 'li';
  lm.innerText = msg;
  le.appendChild(lt); le.appendChild(lm);
  logDiv.appendChild(le);
  logDiv.scrollTop = logDiv.scrollHeight;
}

function updateUI() {
  const balEl = document.getElementById('bal');
  if (balEl) balEl.innerText = balance.toFixed(2);
  const profEl = document.getElementById('prof');
  if (profEl) profEl.innerHTML = (dailyProfit >= 0 ? '+' : '') + dailyProfit.toFixed(2);
  const wr = totalOps > 0 ? ((wins / totalOps) * 100).toFixed(1) : 0;
  const wrEl = document.getElementById('wr');
  if (wrEl) wrEl.innerText = `${wr}%`;
  const lossEl = document.getElementById('lossEl');
  if (lossEl) lossEl.innerText = `$${Math.max(0, -dailyProfit).toFixed(2)}`;
  const totEl = document.getElementById('totEl');
  if (totEl) totEl.innerText = totalOps;
  const invEl = document.getElementById('invEl');
  if (invEl) invEl.innerText = invalidOps;
  const mOps = document.getElementById('mOps');
  if (mOps) mOps.innerText = `${totalOps + invalidOps}/${CONFIG.maxOperations}`;
  const mProg = document.getElementById('mProg');
  if (mProg) mProg.innerText = `${dailyProfit >= 0 ? '+' : ''}$${dailyProfit.toFixed(2)}`;
}

function setOnline(online) {
  const badge = document.getElementById('badge');
  const bTxt = document.getElementById('bTxt');
  if (badge && bTxt) {
    if (online) {
      badge.classList.add('live');
      bTxt.innerText = 'ONLINE';
    } else {
      badge.classList.remove('live');
      bTxt.innerText = 'OFFLINE';
    }
  }
}

function calculateZScore(pricesArray) {
  const n = Math.min(20, pricesArray.length);
  if (n < 10) return 0;
  const recent = pricesArray.slice(-n);
  const mean = recent.reduce((a, b) => a + b, 0) / n;
  const variance = recent.reduce((sum, p) => sum + Math.pow(p - mean, 2), 0) / n;
  const stdDev = Math.sqrt(variance);
  if (stdDev === 0) return 0;
  const current = recent[recent.length - 1];
  return (current - mean) / stdDev;
}

function calculateVolatility(pricesArray) {
  if (pricesArray.length < 10) return 0.01;
  const returns = [];
  for (let i = pricesArray.length - 10; i < pricesArray.length - 1; i++) {
    returns.push(Math.abs(pricesArray[i+1] - pricesArray[i]) / pricesArray[i]);
  }
  return returns.reduce((a, b) => a + b, 0) / returns.length;
}

function updateZScore(z) {
  const zVal = document.getElementById('zVal');
  const zFill = document.getElementById('zFill');
  if (zVal) zVal.innerText = z.toFixed(2);
  if (zFill) {
    const zAbs = Math.min(1, Math.abs(z) / 4);
    const width = z > 0 ? 50 + (zAbs * 50) : 50 - (zAbs * 50);
    zFill.style.width = `${width}%`;
  }
}

function shouldTrade(zScore, volatility, timestamp) {
  if (!running) return false;
  if (currentTrade) return false;
  if (timestamp < pausedUntil) return false;
  let cooldown = CONFIG.baseCooldown;
  if (lossStreak > 0) cooldown = CONFIG.lossCooldown;
  if (timestamp - lastTradeTime < cooldown * 1000) return false;
  if ((totalOps + invalidOps) >= CONFIG.maxOperations) return false;
  if (dailyProfit >= CONFIG.maxDailyProfit) return false;
  if (dailyProfit <= -CONFIG.maxDailyLoss) return false;
  if (Math.abs(zScore) < CONFIG.zThreshold) return false;
  if (volatility > 0.018) return false;
  if (volatility < 0.002) return false;
  return true;
}

function executeTrade(direction) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addLog('⚠️ No hay conexión activa', 'warning');
    return;
  }
  const buyContract = {
    buy: 1,
    price: CONFIG.stake,
    duration: 2,
    duration_unit: 'minute',
    contract_type: direction,
    symbol: SYMBOL,
    basis: 'stake'
  };
  ws.send(JSON.stringify(buyContract));
  lastTradeTime = Date.now();
  currentTrade = { direction, stake: CONFIG.stake };
  addLog(`📊 ${direction} $${CONFIG.stake}`, 'info');
}

function processTradeResult(profit) {
  currentTrade = null;
  dailyProfit += profit;
  totalOps++;
  if (profit > 0) {
    wins++;
    lossStreak = 0;
    lastResults.push(true);
    addLog(`✅ WIN +$${profit.toFixed(2)} | Total: $${dailyProfit.toFixed(2)}`, 'win');
  } else {
    losses++;
    lossStreak++;
    lastResults.push(false);
    addLog(`❌ LOSS $${profit.toFixed(2)} | Total: $${dailyProfit.toFixed(2)} | Racha: ${lossStreak}`, 'loss');
    if (lossStreak >= CONFIG.maxLossStreak) {
      pausedUntil = Date.now() + (CONFIG.pauseAfterStreak * 1000);
      addLog(`⏸ Pausa de ${CONFIG.pauseAfterStreak/60} min por ${lossStreak} pérdidas`, 'warning');
    }
  }
  updateUI();
  if (dailyProfit >= CONFIG.takeProfit) {
    addLog(`🎯 TAKE PROFIT: +$${CONFIG.takeProfit}`, 'success');
    stopBot();
  }
  if (dailyProfit <= -CONFIG.stopLoss) {
    addLog(`🛡 STOP LOSS: -$${CONFIG.stopLoss}`, 'warning');
    stopBot();
  }
  if (totalOps + invalidOps >= CONFIG.maxOperations) {
    addLog(`🔁 Límite de ${CONFIG.maxOperations} ops alcanzado`, 'warning');
    stopBot();
  }
}

// ============================================================
// CONEXIÓN CORREGIDA - CON MANEJO DE ERRORES ESPECÍFICO
// ============================================================
function connectDeriv() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  
  addLog('🔌 Conectando a Deriv...', 'info');
  ws = new WebSocket('wss://ws.binaryws.com/websockets/v3');
  
  ws.onopen = () => {
    addLog('🔌 WebSocket abierto, autenticando...', 'info');
    ws.send(JSON.stringify({ authorize: TOKEN }));
  };
  
  ws.onmessage = (event) => {
    try {
      const res = JSON.parse(event.data);
      
      // Manejo específico de autorización
      if (res.authorize) {
        addLog(`✅ Conectado: ${res.authorize.loginid}`, 'success');
        setOnline(true);
        ws.send(JSON.stringify({ ticks: SYMBOL, subscribe: 1 }));
        ws.send(JSON.stringify({ balance: 1 }));
        return;
      }
      
      // Manejo específico de error de autorización
      if (res.error) {
        if (res.error.code === 'AuthorizationRequired' || res.error.message.includes('authorize')) {
          addLog(`❌ ERROR DE AUTENTICACIÓN: Token inválido`, 'warning');
          addLog(`   Verifica que el token en el código sea correcto`, 'warning');
          setOnline(false);
          return;
        }
        addLog(`❌ API Error: ${res.error.message} (${res.error.code || 'sin código'})`, 'warning');
        return;
      }
      
      if (res.balance) {
        balance = res.balance.balance;
        updateUI();
      }
      
      if (res.tick && running) {
        const now = Date.now();
        if (now - lastTickProcess < CONFIG.throttleMs) return;
        lastTickProcess = now;
        
        const price = res.tick.quote;
        prices.push(price);
        if (prices.length > 100) prices.shift();
        
        const zScore = calculateZScore(prices);
        const volatility = calculateVolatility(prices);
        updateZScore(zScore);
        
        if (shouldTrade(zScore, volatility, now)) {
          const direction = zScore > 0 ? 'PUT' : 'CALL';
          executeTrade(direction);
        }
      }
      
      if (res.buy) {
        currentTrade = { id: res.buy.buy_id, direction: res.buy.contract_type };
      }
      
      if (res.proposal_open_contract && res.proposal_open_contract.is_sold) {
        const profit = res.proposal_open_contract.profit_loss;
        processTradeResult(profit);
      }
      
    } catch (e) {
      addLog(`⚠️ Error procesando mensaje: ${e.message}`, 'warning');
    }
  };
  
  ws.onclose = (event) => {
    addLog(`🔌 Desconectado (código: ${event.code})`, 'warning');
    setOnline(false);
    if (running) {
      addLog('🔄 Reintentando en 5 segundos...', 'info');
      setTimeout(() => connectDeriv(), 5000);
    }
  };
  
  ws.onerror = (err) => {
    addLog(`⚠️ Error de conexión: ${err.message || 'desconocido'}`, 'warning');
  };
}

// ============================================================
// CONTROL DEL BOT
// ============================================================
function startBot() {
  if (running) return;
  if (!TOKEN || TOKEN === "e1lRgxNoxWwBkzx") {
    addLog('⚠️ CONFIGURA TU TOKEN: edita la variable TOKEN al inicio del código', 'warning');
    alert('Edita el código y pon tu token en: const TOKEN = "tu_token_aqui"');
    return;
  }
  
  running = true;
  lossStreak = 0;
  pausedUntil = 0;
  
  const btnT = document.getElementById('btnT');
  if (btnT) {
    btnT.className = 'btn-toggle stop';
    btnT.innerText = '■ DETENER';
  }
  const stateInfo = document.getElementById('stateInfo');
  if (stateInfo) stateInfo.innerText = 'Bot optimizado - Monitoreando';
  
  addLog(`🚀 Bot v17 iniciado | Stake $${CONFIG.stake} | TP $${CONFIG.takeProfit} | SL $${CONFIG.stopLoss}`, 'success');
  addLog(`📊 Z-Threshold: ${CONFIG.zThreshold} | Cooldown: ${CONFIG.baseCooldown}s`, 'info');
  
  connectDeriv();
}

function stopBot() {
  running = false;
  const btnT = document.getElementById('btnT');
  if (btnT) {
    btnT.className = 'btn-toggle go';
    btnT.innerText = '▶ INICIAR';
  }
  const stateInfo = document.getElementById('stateInfo');
  if (stateInfo) stateInfo.innerText = 'Bot detenido';
  addLog('⏸ Bot detenido', 'warning');
  if (ws) ws.close();
}

function toggleBot() {
  if (running) stopBot();
  else startBot();
}

// Inicializar UI
window.onload = () => {
  const assetSym = document.getElementById('assetSym');
  if (assetSym) assetSym.innerText = SYMBOL;
  const stakeEl = document.getElementById('stakeEl');
  if (stakeEl) stakeEl.innerText = `$${CONFIG.stake}`;
  const mGoal = document.getElementById('mGoal');
  if (mGoal) mGoal.innerText = `+$${CONFIG.takeProfit}`;
  const mStop = document.getElementById('mStop');
  if (mStop) mStop.innerText = `-$${CONFIG.stopLoss}`;
  const ftrTxt = document.getElementById('ftrTxt');
  if (ftrTxt) ftrTxt.innerText = `$${CONFIG.stake} · TP $${CONFIG.takeProfit} · SL $${CONFIG.stopLoss}`;
  updateUI();
  addLog('⚡ APEX v17 - Configura tu token y presiona INICIAR', 'info');
};
</script>
