<!DOCTYPE html>
<html>
<head>
<title>Deriv Bot HEDGE v5 - Ultra Conservador</title>
<style>
body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
.container { max-width: 600px; margin: 0 auto; }
.card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin: 20px 0; }
button { padding: 12px 24px; margin: 8px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
.start { background: #00c853; color: white; }
.stop { background: #d32f2f; color: white; }
select { padding: 10px; margin: 5px; background: rgba(255,255,255,0.1); color: #fff; border-radius: 10px; }
.status-on { background: #00c853; display: inline-block; padding: 5px 15px; border-radius: 20px; }
.status-off { background: #d32f2f; display: inline-block; padding: 5px 15px; border-radius: 20px; }
.stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-top: 15px; }
.stat-item { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
.stat-value { color: #ffd700; font-size: 20px; font-weight: bold; }
.log { background: #000; border-radius: 10px; padding: 10px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 11px; text-align: left; margin-top: 15px; }
.log-entry { margin: 3px 0; border-left: 3px solid; padding-left: 8px; }
.log-success { color: #4caf50; border-left-color: #4caf50; }
.log-error { color: #f44336; border-left-color: #f44336; }
.log-info { color: #aaa; border-left-color: #2196f3; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
.modal-content { background: #1a1a2e; border-radius: 20px; padding: 30px; text-align: center; }
.modal-btn { padding: 12px 24px; margin: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
.modal-demo { background: #2196f3; color: white; }
.modal-real { background: #f44336; color: white; }
.modal-cancel { background: #555; color: white; }
</style>
</head>
<body>
<div class="container">
    <h2>🤖 Bot HEDGE v5</h2>
    <div class="card">
        <select id="mode">
            <option value="safe">🛡️ Ultra Conservador (0.35%)</option>
            <option value="mid">⚖️ Conservador (0.5%)</option>
        </select>
        <br><br>
        <button class="start" onclick="mostrarModal()">▶️ INICIAR</button>
        <button class="stop" onclick="stopBot()">⏹️ DETENER</button>
        <br><br>
        <div id="statusBadge" class="status-off">⚪ DESCONECTADO</div>
        <div class="stat-grid">
            <div class="stat-item"><div>💰 SALDO</div><div class="stat-value" id="balance">0.00</div></div>
            <div class="stat-item"><div>📈 GANANCIA</div><div class="stat-value" id="profit">0.00</div></div>
            <div class="stat-item"><div>🎯 APUESTA</div><div class="stat-value" id="stake">0.00</div></div>
            <div class="stat-item"><div>🏆 WINRATE</div><div class="stat-value" id="winrate">0%</div></div>
        </div>
        <div class="log" id="logPanel"></div>
    </div>
</div>

<div id="modalConfirm" class="modal">
    <div class="modal-content">
        <h3>Selecciona modo</h3>
        <button class="modal-btn modal-demo" onclick="confirmarStart('demo')">🟢 DEMO</button>
        <button class="modal-btn modal-real" onclick="confirmarStart('real')">🔴 REAL</button>
        <button class="modal-btn modal-cancel" onclick="cerrarModal()">❌ Cancelar</button>
    </div>
</div>

<script>
// 🔐 PON AQUÍ TU TOKEN REAL (debe empezar con deriv-demo-)
const TOKEN_DEMO = "hT75KVvwfFYW8xZ";
const TOKEN_REAL = "AQUI_VA_TU_TOKEN_REAL";

let ws = null, running = false, balance = 0, stake = 0, dailyProfit = 0;
let wins = 0, totalTrades = 0, paused = false;

function addLog(msg, type) {
    let log = document.getElementById("logPanel");
    let entry = document.createElement("div");
    entry.className = `log-entry log-${type || 'info'}`;
    entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
}

function updateUI() {
    document.getElementById("balance").innerHTML = balance.toFixed(2);
    document.getElementById("profit").innerHTML = dailyProfit.toFixed(2);
    document.getElementById("stake").innerHTML = stake.toFixed(2);
    let wr = totalTrades > 0 ? (wins / totalTrades * 100).toFixed(1) : 0;
    document.getElementById("winrate").innerHTML = wr + "%";
}

function stopBot() {
    if (ws) ws.close();
    running = false;
    document.getElementById("statusBadge").innerHTML = "⚪ DESCONECTADO";
    document.getElementById("statusBadge").className = "status-off";
    addLog("Bot detenido", "error");
}

function executeTrade(symbol, type) {
    if (paused) return;
    
    // 🔧 REDONDEO FORZADO A 2 DECIMALES
    let stakeAmount = Math.floor(stake * 100) / 100;
    if (stakeAmount < 0.35) stakeAmount = 0.35;
    
    addLog(`📡 Trade: ${symbol} ${type} $${stakeAmount.toFixed(2)}`, "info");
    ws.send(JSON.stringify({
        proposal: 1,
        amount: stakeAmount,
        basis: "stake",
        contract_type: type,
        currency: "USD",
        duration: 5,
        duration_unit: "t",
        symbol: symbol
    }));
    window.pendingTrade = { symbol, type, stake: stakeAmount };
}

function startBot(accType) {
    if (running) return;
    
    let token = accType === "demo" ? TOKEN_DEMO : TOKEN_REAL;
    let mode = document.getElementById("mode").value;
    
    if (!token || token === "AQUI_VA_TU_TOKEN_DEMO") {
        addLog("❌ Token no configurado. Edita el código y pon tu token de Deriv.", "error");
        alert("Pon tu token de Deriv en el código (línea 95)");
        return;
    }
    
    let risk = mode === "safe" ? 0.0035 : 0.005;
    
    dailyProfit = 0;
    wins = 0;
    totalTrades = 0;
    paused = false;
    
    addLog(`🚀 Conectando a ${accType.toUpperCase()}...`, "info");
    
    ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");
    
    ws.onopen = () => {
        addLog("✅ Conectado", "success");
        ws.send(JSON.stringify({ authorize: token }));
    };
    
    ws.onmessage = (e) => {
        try {
            let d = JSON.parse(e.data);
            
            if (d.error) {
                addLog(`⚠️ ${d.error.message}`, "error");
                if (d.error.message.includes("Invalid") || d.error.message.includes("authorize")) {
                    addLog("❌ Token inválido. Verifica que copiaste el token COMPLETO de Deriv.", "error");
                    stopBot();
                }
                return;
            }
            
            if (d.msg_type === "authorize") {
                addLog(`✅ Autenticado: ${d.authorize.loginid}`, "success");
                running = true;
                document.getElementById("statusBadge").innerHTML = "🟢 CONECTADO";
                document.getElementById("statusBadge").className = "status-on";
                ws.send(JSON.stringify({ balance: 1 }));
            }
            
            if (d.balance) {
                balance = d.balance.balance;
                if (stake === 0) {
                    // 🔧 REDONDEO FORZADO
                    stake = Math.floor(balance * risk * 100) / 100;
                    if (stake < 0.35) stake = 0.35;
                    addLog(`💰 Balance: $${balance.toFixed(2)} | Apuesta: $${stake.toFixed(2)}`, "success");
                }
                updateUI();
            }
            
            if (d.msg_type === "proposal" && window.pendingTrade && d.proposal) {
                addLog(`💼 Comprando contrato ID: ${d.proposal.id}`, "success");
                ws.send(JSON.stringify({ buy: d.proposal.id, price: d.proposal.ask }));
                window.pendingTrade = null;
            }
            
            if (d.msg_type === "proposal_open_contract" && d.proposal_open_contract.is_sold) {
                let pnl = parseFloat(d.proposal_open_contract.profit);
                dailyProfit += pnl;
                totalTrades++;
                if (pnl > 0) wins++;
                updateUI();
                addLog(pnl > 0 ? `✅ GANANCIA: +$${pnl.toFixed(2)}` : `❌ PÉRDIDA: $${pnl.toFixed(2)}`, pnl > 0 ? "success" : "error");
                
                // 🔧 RECALCULAR STAKE con redondeo
                stake = Math.floor(balance * risk * 100) / 100;
                if (stake < 0.35) stake = 0.35;
                updateUI();
                
                // Stop loss 3%
                if (dailyProfit <= -balance * 0.03) {
                    addLog(`🛑 STOP LOSS (3%) alcanzado. Bot detenido.`, "error");
                    stopBot();
                }
            }
            
        } catch(err) {
            addLog(`❌ Error: ${err.message}`, "error");
        }
    };
    
    ws.onerror = () => addLog("❌ Error WebSocket", "error");
    ws.onclose = () => {
        if (running) {
            addLog("🔌 Conexión perdida", "error");
            running = false;
            document.getElementById("statusBadge").innerHTML = "⚪ DESCONECTADO";
        }
    };
}

function mostrarModal() {
    if (running) { addLog("Detén el bot primero", "error"); return; }
    document.getElementById("modalConfirm").style.display = "flex";
}
function cerrarModal() { document.getElementById("modalConfirm").style.display = "none"; }
function confirmarStart(accType) { cerrarModal(); startBot(accType); }

addLog("🤖 Bot listo. Pon tu token de Deriv en el código (línea 95)", "info");
</script>
</body>
</html>
